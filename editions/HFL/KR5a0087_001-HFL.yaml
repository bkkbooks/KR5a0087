front:
  text: 元始无量度人上品妙經四注卷之一
  hash: sha256:a30663a229143994298c9f5a82e856fd4d50cee1e8440ea7d9778551ca2314ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0087_HFL_001-001a, image: hfl/0038/0038-014.png}
body:
  text: 嚴東唐薛幽棲李少微成玄英註宋陳景元集註太上洞玄靈寳无量度人上品妙經幽棲曰太者至大之名上者尊崇之稱洞者通達也玄者微妙也靈即聖化也寳即珍尚也无量者不可稱數度人者從凡入聖欲明此經開度升仙无限制約且洞玄靈寳是品秩之名无量度人即一卷之目旣品位髙尊復言上品功用微妙故言妙經也少微曰太上極道之境洞玄能通之智皇皇元始萬帝之尊渺渺大羅三天之上旣至大而无外亦窮髙而不測故曰太上洞通也玄妙也探幽索明鉤深致逺通天下之至理窮萬物之妙數故曰洞玄變化无方曰靈欽崇貴愛曰寳眞文鬱秀五帝朝軒玉字垂芒諸天宗範於是刻書金簡注解流通寳愛靈文故曰靈寳元始天尊隨劫應化遊行三界出法度人得道成眞有如雨霧攷曆不知其筭故曰无量度人三洞天書靈歌要頌凡厥功行開度爲先作眞位之階梯爲種人之根本故曰上品妙經也道言幽棲曰即太上玉晨髙聖大道君之言也道君元始天尊之弟子太微天帝君之師也居上清上元玉晨宫即上清之境太清尊崇之位也旣受此經因篇其序故首題之始是即摽焉玄英曰按本行經云道君是西那玉國人蓋紫晨之流芳皇上之胄裔能尊承靈寳元始封爲鬱恱那林昌玉臺天帝位登髙聖治玄都玉京大洞經云上清髙聖大道君者一號玉晨君治蘂珠玉闕七瑛紫房受事虚皇虚皇即元始天尊也昔於始青天中碧落空歌大浮黎土受元始度人无量上品幽棲曰昔往也始青天即東方九炁青天也在圓羅之上出東極之表始者五方建首之名青者東方九炁之色故眞文曰東方九炁始皇青天既天蒼炁青則碧霞廓落故云碧落靈風瓊樹空中鼓歌故云空歌大浮黎土即浮黎大國名受者道君言我昔於此天之國受元始度人之文少微曰始青天者東北玉隆天也此天碧霞羅絡靈奏神風紫字鳴林自成歌詠此國土帝諱浮黎天尊降臨十方共㑹度人之際受得是經靈書云東極大浮黎國地皆碧玉常生碧霞又有青林之樹樹葉並有自然紫書風吹樹聲音皆作洞章璨爛朗徹太空故曰碧落空歌也玄英曰大浮黎土者大是廣逺之名浮黎是其帝諱土是國中之地元始天尊當說是經周回十過以召十方始當詣坐幽棲曰元者初也始者首也言元始天尊建萬化之初爲衆道之首居玉清上元之境綂大羅玄都之域植天地之根生萬物之母旣欲傳經說法先召十方天眞方各一周十方十過非復同於十方周歷十過周召旣畢然後登坐少微曰元始天尊是虚皇應號從眞起應則曰證修妙思幽源廼自性獨有故洞神經云妙象无形應感有體眞精之炁化成姿容于時十遍轉經十方萃止无逺不應方詣坐端也詣者就也天眞大神上聖髙尊妙行眞人无鞅數衆乗空而來少微曰鞅止也夫眞聖尊神部從洋溢千乗萬騎諸天盡來以此格量其數何止飛雲丹霄緑輿瓊輪羽蓋垂䕃流精玉光五色鬱勃洞煥太空幽棲曰鞅者央也古字少以鞅爲央央盡也巳也即无鞅數衆不可稱量皆䕃羽蓋而乗縁輿飛雲丹霄而捧瓊轂天眞无不咸集上聖一合齊至流精曜於十方玉光煥於空洞流精者即玉光之中有五色流精也玉光者即眞人身光也太空者在太清之上少微曰飛雲丹霄結成衣服緑輿瓊輪驂駕龍鳳皆精光倐𤐯綵色熒煌天尊法服科曰自梵天以上並飛雲流霄自然妙炁結成衣服玄英曰輿者車中之廂也旣以流霄爲衣乗駕緑與之輦又以靈鳳之羽爲車與之蓋參駕九色之龍鳳更相䕃映故云羽蓋垂䕃光煇夐煥故云流精玉光車服赫奕故云五色五色𠑽盛謂之鬱勃億乗萬騎浮空而來遍滿太虚之中悉往浮黎聽法故云洞煥太空七日七夜諸天日月星宿琁璣玉衡一時停輪神風静黙山海藏雲天无浮翳四炁朗清幽棲曰凡言諸天者皆三十二天也諸天之中各有日月其精光本化皆此境分根琁璣玉衡者北斗七星也四炁朗清者天地日月四象之炁也夫眞之傳眞聖之授聖故得三光息輪以駐照山海納炁而吞煙風伯不敢鳴條雲將理无翳景故得天地開朗日月清明七日七夜法事將畢旣稱停輪那復有夜即以常時凖量七日七夜之頃少微曰此三者天瑞也天文志曰北斗七星所謂琁璣玉衡魁四星爲琁璣杓三星爲玉衡夫日月星辰天官宫室時來聽法所以停輪也一國地土山川林木緬平一等无復髙下土皆作碧玉无有異色幽棲曰一國者即浮黎之大國也山有騫林瓊木川有神溪靈澗且坦然泯平一等理无髙下相傾旣皆碧玉爲地寧有異色之雜此即當時神變靈化自然使日月停輪山川自坦少微曰此二者地應也山川土府地祇所居感應虚无化成碧玉也衆眞侍坐元始天尊玄坐空浮五色師子之上幽棲曰師子在空虚之中玄坐置師子之上師子是獸中之王威伏衆獸一吼則邪魔皆伏天尊神德降伏衆魔復居師子之坐天尊旣登坐說經衆眞則列侍而聽少微曰此一者天尊道相也說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰幽棲曰初聞天尊之靈音開闡至聖之妙理故齊聲稱歎善莫大焉於是浮黎大國若男若女聞之者聾病皆聰此一遍之驗也玄英曰是時國中聽法之男女聞經一遍耳聞心悟名曰開聦亦云國者身也聞法即悟了入心宫是開聰也說經二遍盲者目明幽棲曰初使耳聞妙義次令目覩天尊此二遍之驗也玄英曰二遍漸識文字故云目明若據注意而言非形骸之病也說經三遍瘖者能言幽棲曰旣令目能覩聖容即使口得言經此三遍之驗也玄英曰三遍心識悟解自能傳說妙法故曰能言也說經四遍跛痾積逮皆能起行幽棲曰旣令口能言經即使足能行道此四遍之驗也玄英曰三遍雖能言說由未了達眞理乃至四遍即解㝷師問義故曰能行積逮者世傳之疾流引相及也說經五遍久病痼疾一時復形幽棲曰旣令足能行道即使舉體俱修此五遍之驗也玄英曰五遍即了悟在心功滋福潤能令久病痼疾盡得消除一時復形還如未病之時也說經六遍髮白反黒齒落更生幽棲曰旣舉體俱修故體蒙眞效此六遍之驗也玄英曰六遍功多福深能令白髮更黒落齒更生說經七遍老者反壯少者皆强幽棲曰初則從首示以靈效次則通體沐浴聖恩此七遍之驗也玄英曰七遍轉經老者皆成少壯少者更益康强說經八遍婦人懷姙鳥獸含胎已生未生皆得生成幽棲曰旣在生之者則還童却老未生之者則得其生此八遍之驗也玄英曰七遍功包七識化被三才八遍則通潤四生含靈有慶胎生者不殰卯生者不殈俱蒙飬育故云皆得生成說經九遍地藏發泄金玉露形幽棲曰人旣得性命之生復感地藏開見國人皆獲金玉之重寳此九遍之驗也玄英曰前明通化四生此則幽祇感慶發其地藏露出金玉之形遍滿山川人得足用故云金玉露形說經十遍枯骨更生皆起成人幽棲曰旣獲祕藏之珍寳次即變臭腐爲神竒此十遍之驗也玄英曰九遍旣通於地理十遍則上感諸天故得太一回骸靈符起死積年枯骨更起成人是時一國是男是女莫不傾心皆受護度咸得長生幽棲曰當此之時浮黎之國若男若女无老无少皆受聖恩普得濟度生者不死死者更生故咸得長生也玄英曰傾盡也天尊說經之時浮黎一國男女皆在坐側聞說妙法各自盡心諦聽故云莫不傾心也一國之人受此度人妙法故云皆受護度度得成眞之道故云咸得長生凡諸天人病有輕重修道之法隨功深淺病輕則遍少而瘥病重則功多而愈故知誦經十遍上達諸天起死回骸長生久視少微曰夫龍虎嘯而風雲生聖人作而三才應此自然之數必至之符是以十遍說經百痾立愈非元始之大聖孰能與於此乎而舊學之法以爲心智之病非形骸之病謬亦甚矣或曰按種人四天斷諸結習人皆靈洞不受胎生今天尊說經於碧落則種人第三天也何因一國疾病同於天下凡夫今所不取以威制所行則稱一國若諸侯以境内爲國天子以四海爲國三十二帝各以三十二天爲國然則天尊道无不周化无不及則可以八圓世界總爲一國若以此爲國則誰非天尊之國哉男女有病亦何怪也空洞靈章云風動八圓回浮更朗幽遼舊說云八方諸天謂之八圓玄都爲中宫八方各有五億五萬五千五百五十億重如此衆天是元始一化之境域也道言是時元始天尊說經一遍東方无極无量品至眞大神无鞅之衆浮空而至幽棲曰是時者即明初說經之時也初說一遍即東方之衆傾城而至旣尊卑升降品位殊多故云无極无量品又如隙中細塵不可勝數故云无鞅之衆也皆乗虚駕浮自空而至鞅者央也義已明上此即初說一遍聾病耳皆開聰之時也玄英曰此章復述天尊周回說經以召十方之事前文通召十方未顯指其方所此文重出使學者深知天尊召集諸天非无次敘故說經一遍感得東方无極无量品至眞大神无鞅數衆浮空而至鞅猶止也眞聖心无止著有感即應故聞經一遍浮空所召廣逺故至於无極眞聖无限故云數衆俱來證法傳度天人說經二遍南方无極无量品至眞大神无鞅之衆浮空而至幽棲曰諸義十方並同此初說二遍盲者目明之時也說經三遍西方无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說三遍瘖者能言之時也說經四遍北方无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說四遍跛痾積逮皆能起行之時也說經五遍東北无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說五遍久病痼疾一時復形之時也說經六遍東南无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說六遍髮白反黒齒落更生之時也說經七遍西南无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說經七遍老者反壮少者皆强之時也說經八遍西北无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說經八遍婦人懷姙鳥獸含胎巳生未生皆得生成之時也說經九遍上方无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說經九遍地藏發泄金玉露形之時也說經十遍下方无極无量品至眞大神无鞅之衆浮空而至幽棲曰此初說經十遍枯骨更生皆起成人之時也十遍周竟十方无極天眞大神一時同至幽棲曰說經一遍召集一方十遍旣周十方俱至卽三十二天與四維上下謂之十方少㣲曰此復序周回說經以召十方之事也天尊至神延保自在說經十遍不頓召十方者何哉將以鄭重慇勤使人曉悟也一國男女傾心歸仰來者有如細雨宻霧无鞅之衆迮國一半土皆偏陷非可禁止幽棲曰迮者充塞也重說國人歸仰靈範回心眞化來如細雨之飛空集若宻霧之四合充塞旣遍致令偏陷此是明其甚多之時耳推理不應偏陷也靡靡而順風復安可逆止故聖人无心方圓任物也少㣲曰此國是浮黎大國也迮國一半者言聚㑹之處占國半境迮占也於是元始懸一寳珠大如黍米在空玄之中去地五丈元始登引天眞大神上聖髙尊妙行眞人十方无極至眞大神无鞅數衆俱入寳珠之中幽棲曰寳珠者喻道也故懸於空玄之中亦同玄珠之義大如黍米者即五榖之首米即生人之本言人得經如命之資米又欲得寳珠之内傳授靈寳之文則寳中更寳玄中又玄眞中之眞道中之道於是引十方之衆納一珠之中更示以神化无方非物理所測去地五丈者欲令人出五濁之世脫五行之用五濁旣出自无衆患之𠎝五行不用永離相刻之患是故五行不相刻萬物悉可全自然長生久視得道成眞也天人仰看唯見勃勃從珠口中入玄英曰勃勃者无量衆多同於雨霧之狀入於珠口之中亦明眞智无窮也旣入珠口不知所在國人廓散地還平正无復欹陷幽棲曰天人即始青天中人也國人即浮黎大國之人也旣非天眞大神上聖髙尊故不隨入珠口之内引例復不與監度之盛事所以於下仰觀唯見勃勃而入入而不閡珠之小殊不妨人之多多少自容小大相納故不知所在也前云偏陷此云欹陷者偏傾髙者偏低初塞半國似如偏陷及乎廓散還似復平也少微曰舊說以珠表清虚圓極之體黍表馨香百榖之長納人入珠明妙道包容也處在空中不累諸有也去地五丈離於五欲也地還平正示大道平夷元復欹陷明正性得復也皆背文生義妄作異端駭其常情謂无此事嘗試論之曰夫无始開圖法敎非一或无爲端寂示物歸根或變化威靈使人慴伏而神通自在眞應无窮珠納天人何容不可且謫仙小術猶隱現壷中豈虚皇大聖礙行藏於珠内也元始即於寳珠之内說經都竟玄英曰竟猶畢也了也悟道之者巳得升珠入妙天尊說經旣畢乃於寳珠之内傳此眞經於太上道君謂下文也衆眞監度以授於我玄英曰此明道君得經之事也衆眞者監領度人眞官之職也元始說經巳畢勑此監度衆眞令將此經傳授道君道君受得此經故云以授於我當此之時喜慶難言法事粗悉諸天復位玄英曰道君自稱受得眞經略巳悟解其中法事旣得悟解故諸天衆聖各歸本位復其常處倐欻之間寂无遺響幽棲曰我即道君自稱也旣於珠中傳寳後是以聖授眞千眞共監萬聖齊度衆慶斯㑹何可勝言法事旣畢天㑹將復怳爾之頃冥寂无聞少微曰聖人无心眞應隨機遇感則興縁離便息是時天人遇值經法普得濟度全其本年玄英曰旣得聞此妙經大衆俱蒙濟度保其全福故得終其本命之年也无有中傷傾土歸仰咸行善心幽棲曰當此之時天人國人若男若女因茲聞經見法莫不罄竭丹心度災難之流无夭閼之患三業旣静六根不生衆惡俱消萬善齊起不殺不害不嫉不妒不婬不盜不貪不欲不憎不𡜍言无華綺口无惡聲幽棲曰不殺不害者謂除身業罪不嫉不妒者謂除心業罪不婬不盜者謂除身業罪不貪不欲者謂除心業罪不憎不𡜍者謂復除心業罪也華綺者飾妄浮辭也惡聲穢罵毒語也此都遣十二之惡行然後乃至大順齊同慈愛異骨成親玄英曰人皆十惡不生動合眞常之理故得齊同慈愛異骨成親古人不獨親其親不獨子其子堯舜授禪能令天下歸心況天尊說經一國歸仰自然異骨成親也國安民豐欣樂太平幽棲曰齊同慈愛之如一等萬物之若己保國民之豐盛樂太平之永日也少微曰斷命曰殺殘傷爲害惡他勝己曰嫉憎同儔曰妒男女不以禮交爲婬竊人之物曰盜无猒曰貪嗜好曰欲嫌人曰憎猜疑曰𡜍十惡旣滅則異骨成親萬行玄同則聲无悖戾自然疾疫不作人无夭傷年榖豐登而國太平也玄英曰齊同慈愛其國必安无有中傷人自饒足五榖成熟災害不生有此衆善之功故云忻樂太平也經始出敎一國以道預有至心宗奉禮敬皆得度世幽棲曰於是元始天尊覩國人之信善出眞範以導之若精誠修奉必升仙度世也少微曰言一方化而羣方得邇人順而逺人服也道言元始天尊說經中所言玄英曰謂說混洞赤文及以元洞玉曆此謂靈寳本章也並是諸天上帝内名隱韻之音幽棲曰經中所言者即後二章所說三十二天隱名三十二天帝之内諱皆大梵之言言非造次致詰故云隱韻也亦是魔王内諱百靈之隱名也非世之常辭幽棲曰魔王内諱即五帝大魔之諱字也百靈之隱名者即无英白元之名號旣皆隱名内諱故非世之常辭也上聖巳成眞人通玄究微能悉其章少微曰字林云悉詳盡也幽棲曰旣内名隱韻非世常辭故眞人之中有通玄之才究微之鍳者乃能悟其㫖耳誦之十過諸天遥唱萬帝設禮河海靜黙山嶽藏雲日月停景琁璣不行幽棲曰言上聖巳成眞人通玄究微者誦之十過則道契諸天故同聲而逺唱德齊萬帝故設禮而來賔河海息飊浪之飛騰山嶽攝雲煙而不起三光駐景七曜凝輝天地貞明晝夜燭也羣魔束形鬼精滅爽回尸起死白骨成人幽棲曰旣正道坦行即邪魔消匿故使朽骸歸再超之魄白骨復重形之魂旣能使死者更生固冝令生者不死此眞人之格者也至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼祅滅爽濟度垂死絶而得生幽棲曰至學之士者則心堅於鐵石操烈於水火天地不能逾鬼神不能惑行人之所不能行已有若无以此太極巳上有眞名者誦之十過則五帝翼侍於左右三界稽首而致敬邪魔喪其睛目垂死自然而得生五帝則五方之天帝三界則三界之魔王也少微曰上聖大道威能制天至學力微唯能御地制天能使三景停輪白骨復命御地能令三界稽首垂死却生大小之涯不可相越也所以爾者學士穢氣未消體未洞眞召制十方威未制天政少微曰天政謂日月五星天文七政也德可伏御地祇束縛魔靈但却死而已不能更生幽棲曰爾者然也夫至學之士名行旣登於眞格功用則蔑於世人所以然者爲骨體未眞穢氣仍在則十方未可召制諸天未得桭威止可攝御邪魔却垂死之死不能令朽骸枯骨復形更生此至士之格也少微曰學士即上至學之士也神力不弘功未圓備不能威制天象只可伏御地祇力能臨死却死未能回骸起朽也輕誦此章身則被殃少微曰五帝威神侍衞靈寳司察輕慢良爲險巇供奉尊禮門戸興隆世世昌熾與善因縁萬災不干神明護門幽棲曰輕誦者謂不整潔形服不依按科儀或行立坐卧聊耳妄誦豈但己身受考抑亦上累祖宗若唯敬禮尊崇則致門戸興盛一身受福昌系子孫惡根不生常與善㑹旣千神來護何萬災能干以此而言誦而不味者未若不誦而敬諸持經之士冝審詳焉斯經尊妙獨歩玉京少微曰言獨用此妙道可以飛歩玉京本相經云大羅天上有玉京之山无根而生據空而停其中有紫微上宫辟方三十萬里金樓玉臺七寳光飾玉室上有三十六所方圓八千里眞文大字滿在其中度人无量爲萬道之宗巍巍大範德難可勝少微曰爾雅云範法也幽棲曰旣諸天所崇不傳下世處紫微之祕藏在玄都之特用爲度人之最標衆道之首巍巍聖範殆崑崙之冠霄德量難勝若溟海之莫測斯之妙道也道言凡誦是經十過諸天齊到億曽萬祖幽魂苦爽皆即受度上昇朱宫幽棲曰此言凡誦者則不限髙下之格是能依法精心誦持十過者則諸天衆聖降集於房廟播祖禰之幽魂及昆宗之苦爽下離北府上入南宫朱宫者即南宫也格皆九年受化更生得爲貴人而好學至經功滿德就皆得神仙飛昇金闕游宴玉京也幽棲曰格皆九年者即九年之格也謂法三火之數旣三三如九朱宫是南方屬火以火鍊形故云三火九年受其鍊化然後更生貴族生即便修此經昔薰習之仍在萬遍之功旣滿三千之德復圓遂超然昇度逕得神仙登金闕而朝聖君游玉京而謁元始此十之格也少微曰此明能度先祖也按三元品戒朱陵度人之格凡有三等九年者中福之格大福則乃三年小福則二十四年皆更生下界得爲貴人籍其先縁而能好學不經生死便得神仙上學之士修誦是經皆即受度飛昇南宫幽棲曰上學之士者則聞道勤行見法必學始終不替寒暑无虧此太清九宫已下有仙名者旣修誦此經使身得道飛昇仙域受錬南宫夫魂魄昇仙則火鍊鬼質生身得道則火鍊垢穢初故皆入南宫然後登其本位此上士之格也世人受誦則延壽長年後皆得作尸解之道魂神蹔滅不經地獄即得反形游行太空幽棲曰世人者即常途之人也非出羣之士旣以祖因福淺身業功微故生前則享壽遐齡没後則解形蹔滅然不拘三官之制不受九府之艱期限數登則神歸形復旣改形容於三宫之館易童顔於九鍊之尸故不入南上之宫便歷太空之境太空在太清已上三域此世人之格也從眞至此凡有五等則階級差殊也少微曰又明世人誦之亦能自度也世人德薄功行未圓雖不能骨肉同飛亦能尸解而度本相經云前功不立後則骨肉不仙是故尸解而得道也按上經尸解有四種一者兵解若嵇康寄戮於市淮南託形於獄二者文解若次卿易質於履長房解形於竹三者水火鍊若馮夷溺於大川封子焚於火樹四者大隂鍊質視其已死足不青皮不皺目光不毀屈伸從人亦尸解也肉皆百年不朽更起成人眞誥裴君曰尸解仙者不得御華蓋乗飛龍登太極遊九宫但不死而已以弓劔曰兵解竹杖曰文解兼水火太隂爲四種解也此經微妙普度无窮一切天人莫不受慶无量之福生死蒙惠幽棲曰此經功力致用眇邈難思十轉則萬炁齊仙五級則度人无量天人沐解脫之慶生死頼拔度之恩也上天所寳不傳下世少微曰天尊說經之時不傳下世王母所請許保甲申之災因此流通人間始有也宋君曰此經度人凡有四種一者白日昇天即身而度二者尸解變易而度三者死而不朽後更起生四者魂神暫滅即昇南宫受化業有輕重故報有差殊兼度曽祖故曰生死蒙惠至士齎金寳效心盟天而傳輕泄漏慢殃及九祖長役鬼官幽棲曰旣稱祕於玄都固宜不傳下世今因太上流布方復降授人間故令至士齎金寳以效心約輕宣之重誓違盟則九祖獲考寳祕則億曽齊功少微曰夫靈文袐重授受良難豈得率爾輕傳殃延九祖侍經五帝玉童玉女各二十四人營衞神文保護受經者身幽棲曰此言五帝玉童玉女者是五帝之玉童玉女來侍非五帝與玉童玉女俱侍此五帝即五老帝君非五方之帝也童之與女都四十八人旣常營衛神經之文亦兼保護誦經之者則必薦舉精誠之功司察泄慢之過受誦之子宜愼之焉若出入遊行必宜携執則使持文而護身免災而无慮矣道言正月長齋誦詠是經爲上世亡魂斷地逮役度上南宫幽棲曰正月上元大慶之月也故能福及上世祖曽幽魂苦爽斷鬼神連逮之役受仙官拔度之慶夫言齋者謂身无雜務心不外想内外清虚抱元守一終乎此月故言長齋七月長齋誦詠是經身得神仙諸天書名黃籙白簡削死上生幽棲曰七月即中元大慶之月也故中及己身諸天上生名於白簡酆岱落死籍於黒簿身得神仙位登天府黄籙白簡者以黄金爲書以白玉爲簡也此獨不言十月下元者爲上元上延祖考中元中及己身下元下逮子息今旣皆明至學爲首則至學上有祖考而下无子息故十月下元略而不言經中亦不說下元功過至學之士詳而審之少微曰天官考時宜度先祖地官校月可度己身此先後之差尊卑之序黄籙白簡記仙之籍也録字回年經曰名書帝籙蓋有宿縁皆由勤慕非自然也玄英曰按三元品誡正月三陽炁生位在上元諸天校定之時冝度先祖七月是中元校定之月地官考校之辰宜度己身亦是先後之差尊卑順序之儀也謂修道之法普度无窮通濟死生動植咸潤上爲皇家宗廟下爲五苦幽魂豈獨先超七祖此乃便人追孝之心故云爲上世亡魂十月長齋誦詠是經爲帝王國主君臣父子安鎭國祚保天長存世世不絶長爲人君安鎭其方人稱太平八節之日誦詠是經得爲九宫眞人幽棲曰謂四立二分二至爲八節日也皆諸天大慶吉㑹之日檢勾學者功過之辰若於其日能齋而誦之則得爲九宫眞人也所以爾者其九宫除中央之尊位周回八宫以應八節旣與其日相符故誦之得登此境少微曰一元有三宫三元有九宫也又解夫八節之日皆有八史神下伺人善惡所以八節必須修誦何故八節之日爲九宫眞人明八節是八卦左三右七等并以中宫首足合於九宫故曰九宫眞人也本命之日誦詠是經魂神澄正萬炁長存不經苦惱身有光明幽棲曰本命即年辰之日唯檢勾一身之功罪故令其日齋誦之且人以炁爲根以神爲本炁存則神正本固則根深内神炁以相符外光明而自軫如此則萬憂不生苦惱奚入旣以我本命之日修誦故能存我之神炁聖人作則皆有由然以此推之則修眞之理自明矣少微曰夫神和而炁暢故聞靈音而澄正感虚白而光明也䟽曰本命日則有司命君下察人善惡所以亦須修此經人若爲惡則邪炁入身若其爲善則正炁歸己而永保長存不經苦惱也三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛昇上清幽棲曰三界侍衞者即三界魔王在右侍衞也五帝司迎者即五方天帝出入迎送也於是坐朝衆靈名書帝籙萬遍功備千行德圓即白日昇天飛登上清也少微曰陸先生云上清中都也按龍蹻經四梵以上次有三清太清十二天九仙所居次上清十二天九眞所居玉清十二天九聖所居今三十六天並不壞之境洞神經云三清天自然化也慿空而立七寳宫殿不生不滅百靈侍衞矣道言行道之日皆當香湯洗浴齋戒入室東向幽棲曰行道之日即持誦此經之日也恐人不得此長持故云行道之日亦是前所說𠮷日也每皆以香湯洗浴然後入别室齋心潔已清淨无爲若山居寡力者亦可於所寢之室常護令整潔先被服盥漱置經於桉然後又於經堂焚香禮請跪啓今修誦之㫖即取經於室中東向正坐焚香披讀注心歷目微聲吟詠若直爾念誦文多錯誤則却上三十字讀勿使怱速苟貪遍數翻爲失功悞人不小調聲誦詠令神和魂暢常令香炁緜緜不絶於室至此章則依法存叩之也叩齒三十二通上聞三十二天心拜三十二過少微曰眞誥云叩齒以集神咽津以和眞易曰帝出于震震長生之方諸天之尊也故東向也先想皇曽天而拜之以次天帝每一想一拜而取遍也閉目靜思身坐青黄白三色雲炁之中少微曰玄炁青也元炁黄也始炁白也想此三炁也内外蓊冥有青龍白虎朱雀玄武師子白鶴羅列左右日月照明洞煥室内項生圓象光映十方如此分明宻呪曰幽棲曰更焚香臨目臨目者半開也接手者兩手沓於膝上即叩齒三十二通每叩一通令響應一天訖存我起拜三十二天帝從東方北首而始以次周回四方每一拜存一帝而拜之訖閉目存我坐下自然有青黄白三色雲炁須㬰滿一室之中鬱鬱藹藹左有青龍右有白虎前有朱雀後有玄武師子左右各兩行行有其八對坐相望白鶴與師子同也日在前月在後明照室内項生光象照徹十方如此存訖更重覽所存者分明如覩也宻呪者即口動而无聲也无上玄元太上道君召出臣身中三五功曹左右官使者侍香玉童傳言玉女五帝直符真日香官各三十二人關啓所言今日吉慶長齋清堂修行至經无量度人臣及甲乙轉經受生願所啓上徹逕御无上三十二天元始上帝至尊几前少微曰元始上帝天尊之别號也畢引炁三十二過少微曰引炁者以口吸引之也非引出也仍想三十二天本天中炁色依次第而吸之從皇曽天爲始東向誦經幽棲曰旣發罏之祝不假悉注略言要用者耳直日香官即三十二天各一官也下來監察而復上奏今日吉慶者即三元八節之吉日也每皆云今某日吉慶旣屢言長齋即不得不齋也臣及甲乙者後日月天地星辰國主兆民等之所稱也若平常之時即言臣及祖考也元始上帝者即非元始天尊也夫上帝髙尊亦位齊元始故得稱焉是知元始之號非一尊之稱祝畢即以鼻吸三色雲炁入口而咽之三十二過畢洞徹一形之内良久誦經上香誦經初一遍從序誦因便存思其後遍直從元始洞玄題去每令一存周得十過爲佳若有急事暫起亦得若經時稍久即須却依前新從序續而復存思也少微曰自元始洞玄以下曰經也元始无量度人上品妙經四注卷之一
