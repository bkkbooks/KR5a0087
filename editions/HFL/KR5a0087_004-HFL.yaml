body:
  text: 齊嚴東唐薛幽棲李少微成玄英註陳景元集道言凢有是經能爲天地帝主兆民行是功德有災之日發心修齋燒香誦經十過皆諸天記名萬神侍衞幽棲曰記名者記其善名也若人能受持此經依按前條一一發心修齋自效則上消天地之災中益帝主之福下救兆民之苦則諸天記名於黄籙白簡萬神侍衞於行住坐卧也右别至人剋得爲聖君金闕之臣東曰右别者亦如文牒右件分别也幽棲曰若有玄解體眞之士能依經格按而修行必得輔佐聖君列侍金闕金闕者即聖君所居也少微曰聖君者金闕後聖太平李眞君也諱弘來劫下爲人主故預稱後聖君也尹氏玄中記曰太上老君常居紫微宫一號天皇大帝一號太乙天尊一號金闕聖君天地萬物莫不由其造化焉若能精誠齋戒誦詠靈文剋得飛昇紫微爲其臣佐也玉籙云不存二十四神不知三八景名字者不得爲金闕聖君之臣也諸天記人功過毫分無失幽棲曰諸天司察報對區分記録人之善惡紏舉學者之功過也旣毫分無失亦纎芥無遺天中魔王亦保舉爾身得道者乃當洞明至言也東曰其五天三界至靈魔王當保爾身必舉爾功有骨相挺分之子應得道成眞之人乃當洞鑒經言深體眞㫖也少微曰凡人但當勤修齋戒得道之日自明至言將慮凡人未通深義中道懈怠退志故發此言也諸天中大梵隱語无量音道君撰東曰隱者有四也一隱名二隱諱三隱事四隱語也幽棲曰此是題目也梵者道也言此篇乃是三十二天中大道隱諱語不可測量也少微曰大梵者元始大梵之炁離合以成音也梵之言汎六合無處不同隱語者謂隱祕天中世人不解也无量音者言殊方異類普聞妙義無有限極也凡二百五十六字分置三十二天天各八字又書玄都宫闕及諸天樓觀若能服其字則隨人所習乘炁各歸其處也玄英曰學者能服其字則隨人所習功滿之日乘炁各歸其處其法在内音玉訣元始靈書中篇東曰此篇之文有二百五十六言字方一丈八角垂芒也一者分置三十二天天有八字以消不祥成濟一切二者將書玄都及天宫門戸樓觀之上若有修服其字則昇其處攝召十方衆仙也此道君自標於題目之下也元始靈書者即元始天尊靈書八㑹之音也在三十二天之中旣事理關渉故編撰此少微曰今所注者一依天眞皇人内音訓釋或刪繁取要或加字益明回互經文不依輪次者務使人速見其意也亶婁阿薈无惒觀音少微曰此八字黄曽天内音也亶者坦然廣逺貌婁者玉京山下長樓之名也上承玄都宫亦謂之樓都言山樓互聳亶然廣逺阿者玄都中阿那之神名也掌樓之監主大梵之炁炁數交周阿那之神則鳴樓都之鼓以集衆眞上朝元始日三周而一鳴以爲常節薈者帝君遊臺之名薈蔚華秀故曰薈无者太无言太无之中自然能生眞聖太霄琅書曰无形生眞眞從无中生也惒者日月門戸之名言天中日月㑹於惒門觀者觀覺也是天中帝君之諱主長夜之録音者八字之音也能誦八字之音則眞人乘金輪以開冥玉女揚華旛以披鈕觀覺主長夜之録四冥拔九幽之府七祖披朗朽骸還生玄英曰天眞皇人曰此八字並飛玄自然之書字方一丈文彩煥耀洞明八方元始下敎使我撰其字解其音合成皇曽天中大梵隱語无量之音以付道君使敎皇曽天中宿有仙名者應得道之人其章以皇曽天中合五方飛玄之炁以和八字自然之音名曰无量洞章已下諸天義同此說須延明首法攬菩曇少微曰此八字玉完天内音也須延者王完西北闕名也大劫數交須延而開玉眞上聖於是而回明首者元始之都候也元始開運則都候啓道梵行諸炁倐忽自朗法者法輪羅福之場攬覺也是天中帝君之諱主度魂更生菩者菩提也執九色之麾曇者曇頥也把十絶之旛並上元眞人也人能常誦洞章則法輪引籍於司命攬覺度魂於更生菩提轉九色以輪運曇頥旋十絶以停椿天地得之以不傾萬物得之以長存也稼那阿奕忽訶流吟少微曰此八字何童天内音也稼那者天中主圖先生之號也領人生死圖録總主神仙治金華之宫金華與龍山連字煒燁玉清之上鬱勃洞虚之中阿奕者七寳林中樹名也彌覆四方實上聖之遊圃乃眞人之戲園也忽者覺也飛天神人名也主大小劫㑹訶者訶摩也天中呼元始天尊爲訶摩流吟者流布歌吟也劫運旣終訶摩則開化敎法普度天人天人歡樂萬道流行於時天度炁促人道轉喪將來劫壞眞經隱藏天尊已知故預爲歌吟也人能常誦洞章主圖先生則削罪録於長夜註生名於南宫也華都曲麗鮮菩育臻少微曰此八字平育天内音也華都者天中太極宫青華門之别名也曲者天中有梵天神人飛行太極之上爽靈風之炁歌洞章之曲也麗是太和玉女之名鮮者鮮雲即慶雲也菩者菩樓也天中樓名也玉女於華都之門詠神人之歌則慶雲應時以敷舒散菩樓之上育者天中帝君之隱名臻至也育帝常乘八景之輪逰觀八極之外至於鬼神之家回十絶之旛以召天魔舉度天人人能常誦洞章飛天遥唱三界司迎七祖出離長夜上昇南宫也答落大梵散煙慶雲少微曰此八字文舉天内音也答者天中玉闕名也是三界便門也落者宫闕落落然也大者大宥也天尊開運之初皆放大赦謂之大宥使三惡道空九幽罷對與之更始也梵者梵行之炁能開龍漢之劫運赤明之辰也散煙者眞人散香於玉闕也慶雲者五色備也謂之揚薰以拂上眞慶雲接乎紫館飛天舞乎空輪者也飛灑玉都明魔上門少微曰此八字摩夷天内音也飛者飛天神人之號也天地改運淪於延康冥冥炁開飛天啓光於是散暉諸天受炁也灑者龍漢一㑹倐忽而迴也玉者玉眞主開長夜之聖號都者九幽之酆都人有善功則玉眞開長夜之戸酆都度八難之場七祖於是而還生幽魂於是而揚光也明者解八字之義魔者魔王上者上帝門者門下也人能明識八字之義則魔王敬伏上帝育養於始生之神門門下有轉君司命司録度筭於南宫慶流九族生死蒙㤙也无行上首回蹠流玄少微曰此八字越衡天内音也无者上道也言元始之炁開明无上之道也行者天元之綱紀維羅八極梵炁彌布流行不息也上首者北斗之罪宫也轉運天關推㑹度數數極則大劫交也回轉也蹠履也劫運之初元始則履空而輪轉布化於十方流者流晨之光也又使流晨之光照長夜之府玄者空也越衡天上玄都之景有空峯之山乃萬聖之所逰生死之所歸道未足備身應滅度魂升空峯受鍊而度南宫也阿陁龍羅四象吁員少微曰此八字濛翳天内音也阿者天中有九折之山連何相屬陁者山上之樓上通玉清之炁以望三界之郷帝君常乗三素之雲駕九龍之輿上遊阿丘之嶺下監萬生之罪龍者龍山與阿陁相去九億萬里羅者日月之名也玉緯曰上清九天眞人呼日爲濯曜羅言山勢相交日月明於峯上四者四極之宫謂東華南極西靈北眞也四極眞人主生死命籍象者象輪之車也眞人常乗象輦遊行三界校人生死罪録開度學道之人吁者育也是天帝之諱爲南宫度命君主煉度朽魂員者童也是日中生童主灌津於天人人能誦詠洞章則玉名入於帝録生死度於南宫四極給自然之羽車七祖歡遊於福堂也右東方九炁青天自然玉字玄英曰天有八字合成六十四音亦名六十四篇按内音玉字東方八天宻呪曰靈音八書六十四篇是也修學之人隨所服佩天中之音假如修學皇曽天即服佩其天八字按内音玉字訣第一云皇曽天中第一第二第三三字皆仰書玄都長樓之上其文以正天之度數主召十方衆眞天神其次第四第五二字則書帝君遊臺南軒之上主空无之中能生自然神眞其次第六第七第八此三字書日月之門主通幽之光開長夜之府其字皆方一丈八角煥明於皇曽天中天眞皇人曰修飛仙之道當以月十齋日朱書皇曽天中第一第二第三三字向壬服之呪如法百日萬神朝身以月十五日三十日朱書第四第五二字向東服之呪如法服之二十四年神眞並生生死皆得上昇帝君遊臺之上以月上下弦望之日朱書第六第七第八三字向月服之八年身内有光面作金色生死皆得上昇日月之館受鍊而成仙佩其文三官无復惡對之録名書皇曽天中隨運生死億劫无窮其法妙重飛天齊功右畧舉一天以明其理已下服佩諸天一依内音玉訣也南爓洞浮玉眸詵詵少微曰此八字和陽天内音也南爓者南方有流火之庭廣七萬里飛熖煥乎八方也洞浮者洞陽之宫流火之炁炎而浮流也玉眸者流火之膏也鍊身體則生玉光明如眸子故曰玉眸南極眞人理於宫内諸學人始得道者皆詣流火之庭南極眞人則以火膏洗鍊蕩除塵垢得與眞人爲侣詵詵然衆多也梵形落空九靈推前少微曰此八字恭華天内音也梵形者元始天尊在龍漢時號也至赤明世號无名君上皇開運號元始丈人梵炁化形隨劫化生以一神而見不受胎生故曰梵形落空者元始自空中而生故曰落空九靈者九華眞人也理於南上宫中主九幽之下宿對死魂推前者九華眞人主命録推筭死魂前生功德天中有散花之臺四斗眞人所處焉有善功者四斗真人書延生之符授之則得拔度九幽也澤𠗂菩臺緑羅大千少微曰此八字宗飄天内音也凙者天中山名也其山上有衆龍之窟中有黄房之室一名玉容之堂也𠗂者眞晨道君之内名也理於黄房之内混大劫而不終經龍漢而更明故幽中有恱焉菩者飛天眞人之隱號有无數之衆臺者玉臺也處於澤山之陽緑羅者月中夫人字羅英容色如玉著緑帔青衣故曰緑羅理在日月之宫上乗大羅之天梵行之炁運度之門以應天地之數終於大劫旣受交日月則㑹於玉臺之上也大千者世界之數陸先生云以千數至千即千千爲小千小千數至千爲中千中千數至千爲大千千中之大故曰大千人能誦詠洞章則得駕羽輪之車昇黄房之室遊玉臺之上覽大千之境也眇莽九醜韶謡縁邅少微曰此八字皇笳天内音也眇者眇眇然也元始昔淪於延康之中天書玉字翳而不彰眇眇然也莽者龍漢開運其文復明莽莽然也遇其道男女並皆壽三萬六千歳其運之極又經一劫九炁各生一獸以害惡民其劫旣開而九獸號爲九醜之鬼北帝上眞主生死圖籙故立九醜以輔三官數極九九八十一萬度天炁之交九醜當得輔號爲九都使者韶者皇笳天神霄王之内名神霄王是魔王之神主常試學道之人正與不正魔王恒作謡歌以亂人心心固者王即保舉徑昇皇笳天中縁邅者南北二斗君之内諱也人有善功列言於南斗南斗即度三界之難拔九幽之苦告下魔王不敢敗害之也人行惡則三宫列罪於北斗北斗即告下魔王滅魂付九幽之下𠑽長夜之役萬劫无期皇笳天上有金華之山山有五帝之宫常生五色之雲日月俠於左右飛仙翼其華軒學成得道皆詣金華之山受太一之信以制神霄之王滅大魔之試然後得乗景輪之車遊宴八方九炁者按三天正法經始炁生三炁一曰赤洞二曰白章三曰清浩元炁生三炁一曰緑昺二曰黄景三曰蒼混又曰白遁玄炁生三炁一曰紫融二曰碧炎三曰黒演謂之九炁也雲上九都飛生自騫少微曰此八字堂曜天内音也雲上者飛天神王内諱也開龍漢之劫啓赤明之運敷自然之書立天地之根也九都者三象旣分而有九層之臺處乎玉京之山煥乎空玄之上飛天神人常散百和之香流五雲之華以觀飛天眞人臺上有太眞玉郎一日三回十絶之旛回旛一周則諸天上帝三朝玄臺繞臺三帀誦詠洞章也飛生者南上更生之神名也學士能誦洞章聲叅上宫諸天稱慶飛生即爲開不死之路流長生之炁下鍊五魂五魂旣錬則八景存焉自從也騫者騫林也旣共舉人身上昇九層玄臺遊於騫林之下身佩天書口誦洞章二十四年即得上朝玄都之宫也那育郁馥摩羅法輪少微曰此八字端靖天内音也那者天王侍郎之内名也主天四時之炁𣑽行虚无之綱以正端靖天中分度也育者天關空輪之名郁馥者斗中靈童之名常運育輪於太无之中回十轉以召眞天關十轉則十方大聖上朝玉帝萬神齊到而郁馥唱禮焉摩羅者天中大魔之内諱郁馥一唱魔王束形學者知四時之炁十轉之關則入法輪之門乘八景之輿升乎玉清之中上朝紫微之臺也霐持无鏡攬姿運容少微曰此八字恭慶天内音也霐者天中都監神内名也持者龍淵之名衆龍蟠乎其中常䘖金甖而運東井之華以灌天眞也華者日中黃華之精沃注東井之流津无窮之源也无鏡者飛天神王諱也遊乎大羅之上出无色之光總生死之籍開度學道之人攬姿者三界之門名也人知此號神王則開長夜之府拔九幽之魂以度三界之門也運容者玄和玉女之名也人得度三界之門運容則以朱靈之炁導之于形太和之津灌之于神上昇福德之堂保劫運而无窮矣馥朗廓奕神纓自宫少微曰此八字極瑶天内音也馥朗者天中玉京玄臺之别號西靈眞人常誦洞章以遊其上廓奕是天中神公之内名與元始同生爲玄炁之範敎學仙之人能明八字之音則神公爲開長冥之戸昇入更生之門上登玉京之臺神纓者紫微宫靈童也主滅度之尸若得神纓歌无量之章則及形於三鍊之房受自然之炁歡享无窮之齡也右南方三炁丹天自然玉字刀利禪猷婆泥咎通少微曰此八字孔昇天内音也刀利者南方无極世界之號禪是刀利之國亦曰禪黎其國上有洞陽之宫浮爓爲流火之庭靈文始於流火受鍊瑩飾光芒旣明之後刀利之國改爲福德之堂苦魂皆得度入洞陽之宫猷者南上好生君之内名婆泥則火鍊池之靈童也咎通是刀利世界魔神常遏人生路若人知好生君名得度洞陽之宫及詣火池受鍊即更生福德之國則魔神奉焉人能誦八字之音則刀利世界无極靈官侍衞其身徑造南宫仙人司迎三年必能䇿丹霄之輪上昇三炁之天也宛藪滌色太渺之堂少微曰此八字皇崖天内音也宛藪者皇崖天帝之内名也主開太漠之經以明八字之文明道旣彰大羅之上鬱然澄清也條色者是色界上飛天眞人名也常乘景雲之車駕九色之龍遊乎色界之上出入玉清之中蕩除穢氣開度善根之人太渺之堂者化生堂也空洞之化結自然之章坦然廣大開度萬生之曆也學人通八字之音則飛天眞人降景雲之車載兆上昇化生之堂也流羅梵萌景蔚蕭嵎少微曰此八字極風天内音也流者天王之内名也處乎紫霄之上遊觀玉京之山羅者月女之諱主王遊宴之儀流暉極風之天洞照九玄之眞也梵者飛天眞人名也主回九天之關萌者元始天神也固極風之根景者景皇是四極上真人也蔚者鬱秀景霄仙人也並理玉京臺常乘三色之雲歷校長夜之中開度善根之魂蕭者蕭仭也是白素元君之宫嵎者蕭仭之嵎對賔之所也人能常誦洞章乃得駕九色之雲上昇景黃之臺矣易邈无寂宛首少都少微曰此八字孝芒天内音也易邈者孝芒天中天王之號无者虚无寂者寂寂是虚无寂寂之庭言此天王從龍漢而來至赤明而出居乎虚无之内處乎寂寂之庭也宛首者太上道君之内號道君常駕八景玉輿䇿三素飛雲開元始玄奥演大法以度人少都者日中靈童名也常散日精以灌眞流飛華以拂塵學人知八字之音則天王飛景雲之輿降三素之軿度身三界之上進入寂寂之庭也阿繿郁竺華漠延由少微曰此八字翁重天内音也阿繿者天帝諱也常乘景霄之輪遊觀九層之臺處玉樓之上唱洞章以伏魔王郁者郁黙天中魔王隱名竺者欲也是魔王都伯恒在欲界之上誦詠空謡之歌華者言色界光華也漠者言欲界渺漠不可㝷也延者求鬼之庭由者禁鬼之房天王登雲樓之上詠无量之章則天魔應響而束身羣鬼詣由而伏形奉之者九祖開泰修之者灰骸更生也九開自辯阿那品首少微曰此八字江由天内音也九開者大演之初天地未判輪轉三炁開爲九分九度旣明九位乃列隂陽萬品於是而生自然明辯也阿者阿丘天皇之古名也常乘九色之龍駕三素之軿上登龍山之嶺遊觀九玄之中那者那邪飛天神人之隱名也飛行三界之上歷校長夜之中拔度善人之魂也有知八字之音則天王品度兆身入飛天之衆首化枯骨成童子之顔矣无量扶蓋浮羅合神少微曰此八字阮樂天内音也无量者天中无量大聖之始神也總綂飛天神人皆受其品量而得昇遷也扶者更生眞人之内名常校幽夜之録簡善惡之根蓋者玄中福堂之號也浮者幽夜之魂受眞人開度謂之浮也乘運而歸上昇福堂也羅者大羅也開大千世界召更生之賔詣大羅之天定籍諸宫削死三官合者合慶也神者神公也是大羅丞相人能知八字之音與神公合慶受度爲更生之賔故曰合神也玉誕長桑栢空度仙少微曰此八字曇誓天内音也玉誕者曇誓天中玉都名也長桑者天中騫林亦名桑林騫木覆䕃東華之宫葉上有大洞之章紫書玉字煥乎上清下有扶桑之樹上森騫木之叢碧雞鳴其蓋青霞翠其峯神風流反香之草鼓桑林百籟之音神風一鼓洞章成音故曰栢空也度仙者飛天神人也常以雞鳴之始登玉臺之上來取五方雲牙仰咽三辰之光簡學仙之人生死録籍開度九幽之魂昇入法輪之門也右西方七炁素天自然玉字玃无自育九日導乾少微曰此八字霄度天内音也玃无者龍漢時飛天之神也元始始開之炁溟涬无色之中玃无乘運而出凝炁而立霄度旣立自抗不終之劫育者霄度天王之内名也九者育王乘象輪之車遊九玄之門轉九機之度應劫㑹之期日者天中日童導者導引和炁天運之終日童停光拔度學者灌以水母之精導以太和之炁洗鍊五神進入朱宫故曰導乾坤母東覆形攝上玄少微曰此八字元洞天内音也坤母者太隂之都候九靈之母也理東海扶桑湯谷之淵常總地機轉輪元炁上應天關天關轉地軸動周天一度水則涌溢三千三百度天地炁交九海冥一水則彌天東者東海受㑹制期河源也覆者水神也理於崐崘之山塡固巨海遏斷東井則地機不淪保劫長存形攝者災交之時坤母形出東河之上攝召鳥母以鳳車迎學仙之人上崐崘之墟鳥母乃水之候神上者坤母上詣帝君申劫㑹之期度學仙之人言名於玄都之宫也或云上玄者帝司命也水之欲出司命料校學仙之人名言上宫也陁羅育邈眇炁合雲少徴曰此八字妙成天内音也陁者天帝内名也與妙成俱生在雲阿之嶺羅是月始生之名陁在雲嶺之上抱月而明育者妙成天神王名育生也總綂十方飛天之神也邈者天中羽林監神名也神王常使匡御三界簡人生死之籍令魔王保度得道之人眇者眇眇髙逺也人得保度詣羽林受符而升天眇眇行於雲宫也炁者雲炁也合者合景也旣入羽林結雲炁以成衣飛升朱宫受福天堂遂與諸天合景而上昇也飛天大醜總監上天少微曰此八字禁上天内音也飛天者十方飛天神王也天上有飛玄之炁結成大洞之經十方神王常在空霄之上而誦此經以和自然之炁接引學道之人大者三界之都録主生死圖籙醜者伯也是三界之魔王受事於大醜學士識其音則魔王保眞而身騰三清也總是飛天都綂之官常攝八㑹之炁以促天地之運監領長夜之官開度九幽之魂學士知天中之音則天魔列言大醜勒録仙部而上昇天中也沙陁劫量龍漢瑛鮮少微曰此八字常融天内音也沙者天中有沙蘭之宫是紫微之别館處乎玉清之上煥乎紫虚之中陁者陁丘也陁丘之衆有巨億萬人皆是新得道受度者也功德未備停散其中劫量者每至劫運一交此陁丘之衆計功之量得昇朱陵之宫受福而仙也龍漢者初劫之名是時大道淳朴徒有其化難可爲雜也瑛者龍漢時飛天神名也常開度九幽之魂昇蘭宫之中鮮者南宫之童學人得度而鮮童鍊其形容度於朱陵之上也碧落浮黎空歌保𤤽少微曰此八字玉隆天内音也碧者玉隆天中常生碧霞之炁以䕃玉隆之天落者空中飛天神名常乗碧霞之輦遊玉隆之天一日三時引天中衆聖上朝七寳之宫浮黎者天王内名也衆聖上朝而天王稱慶也空者天中侍晨之名歌者洞章之曲侍晨一嘯靈風旣奏音成洞章故曰空歌保𤤽者學人知八字之音則上昇南宫爲飛天之賔保此不終之劫𤤽其自然之文故曰保𤤽按此義與章首不同者若得道无形則與雲炁混合空有之妙惡能辯之故洞章云騰勝碧重雲羅落耀上玄又靈書云靈書燦爛朗徹太虚故知落之與空歌不獨人名也惡奕无品洞妙自眞少微曰此八字梵度天内音也惡奕者天王之内名也昔於龍漢之中諸縁並盡而過度三界之庭昇入太虚之館受九仙之籙登大聖之號赤明開運元始鍚爲梵度天王无者太无真人受天王之符度長夜之魂品者品量幽魂之罪福洞者洞明宿對也妙者妙化之堂也宿對旣解乃入妙化之堂自者與也眞者天眞也太无眞人度九幽之魂洞識宿命惡縁並盡度入妙化之堂與飛天而合眞也元梵恢漠幽寂度人少微曰此八字賈奕天内音也元梵者元始大梵風澤之炁抗舉澄漢之精髙而洞浮懸而不落也恢漠者逺而无礙有而若无微而不可名妙而不可㝷也幽寂者幽𠔃寂𠔃不可聞見其中有眞眞中有精冥度天人也天眞皇人曰諸天内音自然玉字者皆結飛玄之炁合五方之音生於元始之上挺於空洞之中其文宛奥難可㝷詳天尊奬勸而勑令解義夫玄科有制不敢違命按筆之日神沖太霄精之與粗極乎心慮皇道旣明諸天稱慶寳之者眞降修之者形遷威靈恢廓難可名焉右北方五炁玄天自然玉字道言此諸天中大梵隱語无量之音幽棲曰三十二天各有八字合成諸天中大梵隱語无量之音故云諸天内音此飛玄自然眞文生於元始之上出於空洞之中匠成天地應運劫數天眞皇人亦粗解其㫖舊文字皆廣長一丈天眞皇人昔書其文以爲正音東曰道言太上之言諸天三十二天也大梵隱語者是天帝之名皆隱而不顯无量之音者其洞章自然響徹諸天故曰无量之音舊文是也本文八角之字廣長一丈者四面共方一丈爲萬善之長天眞皇人者是上古髙眞也昔以龍漢之劫書寫此文以爲諸天之善長者也幽棲曰本文舊字各方一丈八角垂芒文彩光煥洞朗八方元始天尊遂命天眞皇人使撰其字解釋其義以付道君使敎諸天應得道成眞有仙名録籍者皇人即考校焉大帝使領峩眉洞者少微曰按内音經元始天尊於赤明世界栢陵舍座是時雲霧鬱勃三日三夜玄隂不解五老上白天尊曰今日侍座所未曽見天尊演敎則河海靜黙山嶽藏煙今白日晝隂天人惶懼不審何故天尊告曰今日諸天發瑞靈應自然玉字煥爛障蔽天光咸令四座瞑目伏聽俄須天炁啓冥愔豁消五色光明洞照十方忽有靈書字方一丈見於空玄之上文彩煥爛八角垂芒精光亂目不可得看天尊普告曰此靈書八㑹字无正形其趣宛奥難可㝷詳可注筆解之於是天眞皇人受天尊明命注解其音分其分度三十二天天各八字並飛玄自然之書合五方飛玄之炁以和八字之音名曰大梵隱語此即无量之音是也眞一五牙經曰皇人者不知其得道之始也身長九尺玄毛被體皆長尺餘黃帝時在峩眉山絶隂之下以蒼玉爲屋黃金爲座張華羅之旛然千和之香侍者仙童玉女座賔三人皆稱太清仙王黃帝再拜問道授以五牙三一之文云有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天幽棲曰有知大梵隱祕之音能㓗身齋心持誦之者即三十二天帝召命十方无極飛天神王下詣房室觀其身心列書功勤聞於諸天也萬神朝禮地祇侍門大勲魔王保舉上仙道備剋得遊行三界昇入金門東曰金門者在太霞九宫之中中有騫林之樹上有金翅之鳥冶鍊之池金翅鳥以毛羽結爲仙衣上登九宫也幽棲曰旣得萬神朝禮地祇侍門以衛護三界五帝之大魔共相保舉以仙度遂得名書帝簡位列眞編及至萬遍道備千功行圓必乗雲車以上造金闕之帝前也此音無所不辟無所不禳無所不度無所不成天眞自然之音也東曰辟除鬼賊禳却不祥濟度窮魂成就萬物皆眞文祕音之力也幽棲曰言此无量之音能辟逐一切精邪消禳一切災害度脫一切生死成就一切天人故謂之天眞靈書自然玉字之内音也故誦之致飛天下觀上帝遥唱萬神朝禮三界侍軒羣祅束首鬼精自亡幽棲曰若能誦之者則致十方神王下觀三十二天帝遥唱萬神衆靈以禮敬三界魔王以翼轅羣邪自然束首諸鬼爽固冝消亡也琳琅振響十方肅清少微曰天書玉字故曰琳琅誦詠謳吟是謂振響河海靜黙山嶽吞煙東曰並此經之神力萬靈振伏招集羣仙少微曰於是瓊林振天籟之響十方晏三景之明河海風浪而澄靜山嶽吞納乎雲煙伏萬靈而震懾招羣仙而詣室天无氛穢地无祅塵㝠慧洞清大量玄玄也東曰冥者冥靈也慧者智慧也洞者通洞也清者清澄也大量者平等也兼濟度人大无不包度一切物玄玄者深逺也明此无量經功德深逺故云玄玄也幽棲曰當此之時天无氛穢之炁地无祅塵之災若更混智冥慧以天光之凝寂空洞之明瑩則妙中之妙玄中又玄隱祕莫測故云大量玄玄也少微曰冥修慧命逺洞三清大量至深至妙也玄英曰此明諸天内音冥通慧照之力冥者幽深不測慧者通照无窮慧能照空故云冥慧髙而不極謂之爲洞煥耀三清之上謂之洞清洞者空也清者淨也无邊无際謂之大量大量之内唯有眞空眞中有精其中有信能生眞聖非有非无常住湛然微妙莫測究竟其理不可㝷詳玄中更玄故云大量玄玄也上聖慈憐下界降此眞經列以玄科開人度物誦詠之者上感諸天服佩靈文即隨炁所至功圓行滿升爲金闕之臣是知積學成眞通眞入聖生天生地應用無窮能知玉字之音骨肉同飛有日上學之士勤而勉之元始无量度人上品妙經四注卷之四經說此經太上道君受之於元始天尊傳敎於世道君爲前序後序中序凡有三序焉前序自道言昔於始青天中至東向誦經是也中序自三界之歌章之後此二章並是至洞明至言也是也後序自此諸天中至大量玄玄也是也經有二章自元始洞玄至列言上清且後章自元洞玉暦訖禍及七祖公羽是也其大梵隱語非二章之數或以經爲一章隱語爲二章此亦誤矣中序云誦經萬遍乃能得道洞明至言此則隱語玄奥不在經文二章之列可知矣讀經之士當恭信無疑功滿道備自當洞曉人天同福存殁受廕可不志哉可不勉哉玄門靈驗記道門集驗記持此經得驗記皆有傳載通眞之士勤敬誦之釋音浮黎土音杜妙行于孟切无鞅音央䕃於禁切瘖音隂跛博我切痾音阿痼音固姙汝鴆切地藏自浪切迮音責勃勃音拂𡜍音自妬也尸解音賈謂託形隱化内身成仙斷地徒短切三華平離便方便之便梵行下孟切鬱繿音藍懀烏外切皇笳音加阿𨚧音茄揲音牒阮樂音嶽勃勃音沛秀樂音洛溟音茗涬胡頂切泥凡音完馘古栢切不樂五孝切得過音戈亶丹上聲惒音和去聲觀音貫總監音鍳下觀音官嘿音墨
