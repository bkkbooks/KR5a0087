body:
  text: 右街道録眞靖大師陳景元撰夫空洞浮光渾淪未判大道之將化故玄文發于中天虚无之乍凝迺妙炁結乎碧落字方一丈之廣勢垂八角之芒粲粲煌煌光華暐曄是時元始之降含栢陵五老之環侍雲坐遽命天眞皇人規模槃屈仿像奪眞䟽成諸天隱書編作五方靈範紀混元龍漢之載藏鬱羅紫微之宫演爲三十六部尊經分爲萬二千圖籙天章雲篆八㑹之書莫不祖焉昔在始青天中寳珠之内講集靈寳之敎拯拔天人之倫玉晨君㖟之以序其首尾祕于上館約四萬劫一傳誓不輕泄于下世於是龜臺金母憫陽九百六之災親禮玉京懇請流布洎乎軒轅黃帝問道于峨嵋之隂稽首皇人載傳寳訓至吳有句曲葛玄訪道㑹稽郡祈眞上虞山遇太極誥使之駕降靈寳衆經之帙斯爲上品最先㖟焉厥後修誦之士浹于寰區隱韻祕音世莫能究齊之嚴東首爲註解仰推梵炁之旋箕俯測酆都之泉曲布諸方冊表裏煥然若非洞闡幽微曷由條達宗㫖遂使嚮風之客抉塞啓窽隨性發明及有唐道士薛幽棲揮紱青城毓眞衡嶽眞解序說明白存修繼有太清供奉李少微西華法師成玄英各撰註䟽援引内音而拾遺補闕事理悉備景元總角慕道少探玉經不揆蔽蒙輒敢編綴今於四家之說刪去重複精選宻義纂成四卷庶免多惑云爾治平四年歳次丁未仲秋望日序夫道者在於寂黙虚无心冥神契經者資於書寫傳授誦詠弘暢非寂黙則莫能契道非敷誦則無以弘經雖宗轍有殊而體貫齊一張之則異域混之則同歸因道所以立經因經所以明道道爲經之本體經即道之迹用本迹相明體用玄合是以煥眞文於空洞之上開洪源於紫極之館則三品眞目析羣方飛天之書七部衆經播雲篆光明之迹於是元始天尊坐於玄都玉京紫微上宫以三洞正經居前三大副經居後道德二篇爲輔弼玉清隱書爲敎主且洞玄靈寳則三洞中洞之一部无量度人則中洞一部之一卷修習之法則一部多門諷誦之篇則此卷爲首上消天災保鎭帝王下禳毒害以度兆民中拔祖宗己身得道斯則巍巍大範獨歩三清者哉此經義㫖冥奥音韻隱祕皆申明大梵之理非化誘常途之辭故云上聖巳成眞人通玄究微能悉其章所以誦讀者多焉精達者鮮矣今不揆蠛蠓之力强舉千鈞之重直以凡下裁斷聖意儻親承玄師必冀蒙詢誨時甲午歳庚午月也衡嶽道士薛幽棲序
