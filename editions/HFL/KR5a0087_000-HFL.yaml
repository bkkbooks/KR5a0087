front:
  text: 宋眞宗御製靈寳度人經序寒一夫太易垂敎先於至神混元著書本於妙道契隂陽之不測摽沖黙之難名蓋以闡無爲之爲著無象之象範圍幽賛藏用而顯仁恍惚窈㝠化民而育物雖古今而異制誠訓導以同歸若乃藏室靈文昭臺祕籍紛綸玉笈𠑽溢丹函龜闕墉城自髙眞而降授赤明龍漢應運劫以流傳斯固超視聽之先在名言之表弼成至治漸漬羣生首出於九流抗行於百代干戈俶擾之際用之而豈遑蟲魚咸若之辰捨之而孰可太上靈寳度人經者元始之妙言玉晨之寳誥浮黎眞境紀談受之初紫微上宫顯緘藏之迹實諸天之隱韻爲大梵之仙章八角垂芒本由於神翰千祇列衞普度於人靈其或育質圓方禀和霄壞少私寡欲背僞歸眞端慮以㓗齋洗心而成誦精專外積純粹内𠑽信可以自晦而明無幽不燭類虚室之生白同温泉之盪邪熈熈而陟春臺濟濟而登壽域至誠所極介福何窮朕祗紹慶基茂承元貺席緜昌之寳緒幸集隆平頼燕翼之丕祥用康普率固絶畋遊之樂務宣清淨之風嘗以此經久傳中夏近觀注誼頗極該詳爰命所司特加摹印正魯魚之訛謬廣寰海之流通凡百羣倫庶同歸嚮咸臻善利以副憂勤聊述斯文冠於篇首云爾度人經集註序
