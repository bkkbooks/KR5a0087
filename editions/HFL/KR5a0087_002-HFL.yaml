front:
  text: 元始无量度人上品妙經四注巻之二寒二
  hash: sha256:e9c047095bf32873dd5a32bcf4dc466169cdceeeeb0e92836b18be77af4150ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0087_HFL_002-001a, image: hfl/0038/0038-080.png}
body:
  text: 齊嚴東唐薛幽棲李少微成玄英註宋陳景元集元始无量度人上品妙經幽棲曰前題兼稱太上洞玄靈寳此題直云元始无量度人序題太上欲明太上所序經前則都總部秩之名後則單指一經之目上品妙經義同首注少微曰前是道君序經故以道言標首此是天尊自說故書元始爲題又自然已前亦是道君小序混沌已後方是天尊本章也元始洞玄靈寳本章東曰元者先也先天而生故曰先也亦曰大也大无不包故曰大也亦曰炁也細无不入故曰炁也亦曰无也无形无影故曰无也亦曰靈也能變能化故曰靈也亦曰道也經曰道可道非常道也明常道无形不可得而名故略云其狀始結也元炁始結故言結也亦初也玉字初開故曰初也亦化也化生天地故曰化也亦端也爲萬物之首故曰端也亦終也終乎无終故曰終也經曰无名天地始又曰天下有始以爲天下母又曰始制有名故曰始生一一天也天從始而生明始亦元也㑹歸於元元生之時无天无地无神无鬼溟涬濛鴻无所分别元炁始結而成玉字玉者自然之精精出而發光以成天地日月星辰所以化成元始尊神者明其有靈也所以化生天地日月星辰者欲以生養萬物也所以天地萬物生後而有號者明元始造化也所以號元始者示人知始終之歸趣也洞明也洞照无極故曰明也亦通也通達无窮故曰通也玄空也杳然空洞故曰空也元炁始結而成玉字在空玄之中通達照乎四方顯乎龍漢隱乎延康先乎赤明耀乎開皇逺至上皇也靈者衆聖之通稱也寳者衆聖之所珍也章者文章也玉字始出本形如印八角垂芒文彩煥耀洞應无窮在天曰靈在地曰寳空玄爲靈入藏爲寳故曰靈寳太上道君說其所由也少微曰元始微言通同玄妙靈文寳貴音韻成章上品妙首十迴度人東曰上品者元炁始凝結青黃白三炁置上元三宫其第一宫名玄都元陽七寳紫微宫始陽之炁總主上眞自然玉虚髙皇上帝諸天帝五上聖大神其宫皆五億五萬五千五百五十五萬重青陽之炁其中官寮亦有五億五萬五千五百五十五萬衆皆結自然青陽之炁而爲人也衣則青羽飛衣宫中有延生符八方之炁欻然而到便成人也毀符焚身即隨煙而化還爲炁也太玄上府紫微宫有左右中三府左府主生宫太陽火官考右府主死宫太隂水官考中府主生死罪録風刀之考三府各領官寮九千萬衆總綂生死罪福一十二曹其左宫名太玄都元黃太極左宫則元黃之炁總主上眞已得道及未得道修眞男女生命録籍其宫有招靈之符右宫名太玄都洞白太極右宫則天元洞白之炁總主上眞已得道及未得道修眞男女滅度仙録及罪簿死籍宫中有明眞之府其中官寮品格具如紫微宫之儀也上元品天官凡有三宫宫有三府宫綂十二曹三宫合三十六曹並治元陽之上太空之中自然之號普綂上眞已得道三元日集校隂陽水火風刀三府考官三十六曹青黒二簿列奏紫微太微左右中三宫其事自具出三元品戒中今略舉一隅昔龍漢之年玉字始出日月始明天地亦分衆眞列位元始出法度人說經十遍周回十方度人无量之數元始因撰作十部妙經以紫筆書著空青之林衆聖所崇爲經之祖宗故曰上品妙首也幽棲曰此演經之時故亦都叙題目之㫖趣也明誦之十過即能度人故元始說之十過以召十方每以十過爲法所以前序言凡誦是經十過億曽萬祖皆即受度亦是回法輪十轉之義也少微曰即此章句言約事弘是謂上品眞經妙道之首十回輪轉廣度天人也玄英曰上品者群經品秩之中此品最爲第一也妙首者此經有度人之法爲衆妙之宗故稱妙首也十回度人者天尊誦經度人皆有遍數十遍爲一過百遍爲十過也百魔隱韻離合自然東曰百魔神霄王等隱玉字也韻調也魔王與諸炁俱生參於洞章隱其韻調合於自然之書以爲經也幽棲曰即諸魔王隱名及三界祕章隱顯離合同符自然也少微曰于時天人鬼神莫不服化故三界大魔率其羣魔隱括聲韻來朝元始離飛玄之炁合自然之音鼓以靈風皆成歌詠太上貴重列於經文也玄英曰此明天尊誦經感得三界羣魔飛行空中歌隱韻之音俱來朝㑹隱韻者明此靈章皆是諸天上聖自然隱祕之音非世所知謂之隱韻屬對成文曰韻五聲相和爲音合而言之謂之隱韻自然者言此靈文皆諸天妙炁靈風鼓奏自成歌詠之音非關造作而成故云自然也離合者謂三界魔王㕣自歌其天中自然妙炁以爲歌詠之曲謂之爲離其音與洞章相參理合自然之妙故云合參猶雜也音辭雖雜理合自然故云離合自然也又解云離者天尊所說魔王亦說各各自說謂之爲離說音不同理合眞妙謂之離合自然也混洞赤文无无上眞東曰混大也洞通也赤文赤書大洞之經通明龍漢淪於延康元始開運於洞陽之宫火鍊玉字洞陽炁赤故號赤文出法度人玉清治鍊眞中之眞故曰无无上眞也幽棲曰混者混沌之名洞者洞陽之炁赤文者赤書眞文也言赤書眞文齊混沌之初在天地之先凝化空洞之上鬱結太无之中太无之无亦无其无旣无其无是謂无无故云无无上眞也元始鍊之以洞陽之炁治之於流火之庭洞陽炁赤故曰赤書也少微曰混洞是髙上玉皇九億萬炁也言玉皇之炁混沌通同成其赤書眞文廼於无无未有之時分布五方元始用之度人皆登上眞之位也元始祖劫化生諸天東曰祖先也元始未受號之先已化生天地但龍漢久逺劫運始開天地亦分自此已前不可記識是故觀古可以知今則古今无異幽棲曰言赤書眞文開運祖始之劫化生三十二天祖劫者赤明之劫也少微曰祖始也玄元始炁於始劫之初欻然而造化能生五億諸天按天地一成一敗謂之一劫言始劫者是世界初生未經成敗也開明三景是爲天根東曰三景三光也三光旣明天地乃分萬物乃生神靈得治長爲天根也又能光明日月朗耀衆星少微曰二儀分形三光垂耀皆禀始炁故爲天根玄英曰景光也此明諸天位成即有三光列耀通照字宙謂之開明俱禀妙炁而成故爲天之根本也上无復祖唯道爲身東曰祖宗也上无所宗唯道炁結精而後成其身也幽棲曰旣齊混沌之物復在天地之先故云上无復祖也眞文之質即道眞之體爲文故云唯道爲身也玄英曰此舉眞文之體爲諸天之根本禀元始妙炁之自然而化成大道之法身妙炁自成不復更有先祖也西昇經云虚无生自然自然生道今云上无復祖者道以虚无爲宗以自然爲本以道爲身然此三者悉无形相㝷考其理乃是眞空眞中有精本无名稱聖人將立敎跡不可无宗故舉虚无爲道之祖其實三體俱㑹一眞形相都无能通衆妙故云上无復祖復猶别也别无先祖也五文開廓普植神靈幽棲曰五文者即眞文五篇也以應五方五老之所償録者旣開朗三光亦開廓五篇玉字眞文各植神靈者也少微曰妙本自成無復先祖括囊无外盡是道身五篇眞文開廓形狀普生天地安置神靈也无文不光无文不明東曰光三光也明分明也玉字不出則日月无光天地不分明也无文不立无文不成東曰立形也成生也玉文不出天地无以形萬物無以生也无文不度无文不生東曰度昇也生化也眞文不出魂神无以昇萬物无以化也少微曰若无眞文開廓則日月不得光星辰不得明乾坤不得立世界不得成幽魂不得度枯骨不得生玄英曰謂三塗八難五苦幽魂若不得此眞文則不得超度三界亦明修學之人无此眞文則不得成眞入道是爲大梵天中之天東曰大梵者則風澤大梵之炁結而成天在空虚之中抗舉澄清髙而洞浮懸而不落在衆天之上故謂天中之天也幽棲曰旣生成之功浩汗造化之用彌綸故云是爲大梵梵者道中之道也道即玄文故云道中之道玄中之玄天者玄也少微曰範法也所能開明三景安置五文皆元始天尊運行大法在諸天之上故曰天中之天也鬱羅蕭臺玉山上京東曰鬱盛也羅大羅也大羅之天上有玉京之山山有七寳玄臺臺在七寳城城中有玉清之殿髙上玉皇治乎其中也幽棲曰言玉清之上有九層之臺窮於髙際參於太无故映鬱大羅之上蕭然九層之臺太无即大羅也以玉爲山故云玉山山上有京故云上京亦有名玉京亦名玉清皆因玉以得名也此即通謂玄都玉京也少微曰自此十句皆說玄都境中宫殿壯麗玉京山在諸境之上故曰上京山有玉城城中有臺號曰蕭臺城闕山林鬱然羅布皆髙上玉皇所理之處也玄英曰鬱羅者謂蕭臺四面城闕山林鬱茂光華羅落其處故云鬱羅上極无上大羅玉清東曰大羅之天在衆天之上紫微之宫處乎玉清之上煥乎紫虚之中明道旣彰大羅之天則鬱然澄清七寳之樹各生一方彌覆一天八樹彌覆八天包羅衆天故曰大羅也幽棲曰言玉京之上極乎无極窮乎无窮唯大羅之玉清耳大羅即虚景玉清即宫闕者也少微曰大羅玉清境窮髙極逺更无一物在其上能包羅衆天故曰大羅其上无塵豁然太空無爲之道場也玄英曰本相經曰大羅之上无色无塵是无上也眇眇劫刄若亡若存東曰眇眇者髙逺也一劫者如有巨石方圓四百里又如空城方圓四百里上下齊等滿中芥子天人每百年一度取一芥子又羅衣拂巨石石消芥子盡名爲一劫七尺曰刄存有亡无也七寳玄臺臺髙芥子无數之仭歩虚云仰觀劫仭臺此之謂也七寳之臺非地仙所見而況凡人乎覩之則言有不見則言无故言若亡若存也幽棲曰刄者仭也古之字少以刄爲仭天眞以劫計仭世人以尺計仭即玉清九層之臺復謂之劫仭臺也旣髙逺眇邈隱化无方故云若亡若存非定相也亦雖有形而无其體眞精造化自然而然也少微曰按眞一自然經云玉山一名劫仭臺言以仭量之如彼劫數故曰劫仭形而不礙若存若亡也三華離便大有妙庭東曰三華者即太極宫青華門名也離布三便之殿則三界門名也三華在三界之上上有梵天神人飛遊太極之上玄歌无量洞章曲爽靈風之炁拂揚洞章之曲太和玉女於華都之門而和神人之歌慶大有於元始欣衆眞於妙庭不離三界故曰離便也幽棲曰夫入宴三清之宫則必逺離三便之門即三界門也三華宫即玉清三元宫也上元玉華中元金華下元九華皆三元上皇道君居之大有者大道也義同大塊理齊有物言三華之宫旣天尊大道君居之故云大有妙庭耳金闕玉房森羅淨霐東曰天中有金闕玉房以界三便之門森長也羅大羅也上有騫林之樹覆䕃東華之宮騫林之葉有大洞之章紫書玉字煥乎上清淨霐者都監之神内名也治紫微宫曲房之内下有扶桑之樹上有騫林之叢碧雞鳴其蓋青霞翠其峯神風流反香之草以鼓桑林百籟之音神風一鼓空生洞章之音也幽棲曰言玉清之境以黃金爲城闕以白玉爲宫室黃金之闕則森然煥邈以周羅白玉之房則精㓗嚴凝以霐瑩也少微曰言遶三便之殿循大有之宫皆金闕玉房騫林紫樹森聳羅列淨㓗霐澄也玄英曰闕者門也此明玉京成内華飾妙麗積金爲闕累玉爲房周繞大有之宫三便之殿又植騫林紫樹羅列森聳清淨霐澄安居其上勝妙殊絶故云淨霐也大行梵炁周迴十方東曰大行者天元綱紀也維羅八極總大梵之炁通明龍漢之闕龍漢推數而自開赤明待運而敷辰赤明旣開三十二天並有神靈置中元二品地官元洞混靈之炁凝黃之精置中元三宫其第一宫名洞靈清虚宫總主五帝五嶽諸眞人及地上神仙已得道一號明晨武成宫置左右中三府左府號耐犯明晨府主生官太陽火官考右府號紂絶隂天府主死官太隂水官考中府號七非恬照府主生死罪録風刀之考三府各領官寮五千萬人綂生死罪福一十四曹並治山洞空虚之中係大梵之炁也幽棲曰玉清眞道梵炁大行於十方之域周流於諸天之境也少微曰總五億之諸天混八圓之經緯下窮九壘上際大羅皆是梵炁流行周迴不息故得億千世界髙而洞浮懸而不落其狀似風非風似水非水維而持之若有情信中有度人不死之神東曰度人更生之神也名飛生學士能誦洞章諸天稱慶飛生即爲開不死之門流長生之炁下鍊三魂三魂之神被鍊八景存焉八景備守共舉人身上飛九層之臺遊於騫林之中上昇玄都之宫也幽棲曰謂諸天十方有此之神主司度世不死之事非言神不死者也中有南極長生之君東曰南極者南極眞人也中元二品左宫名洞陽宫一號宗天宫總主地上九土土皇四維八極諸靈官混黃之炁其中土府地上官寮九萬九千九百九十九萬衆皆是死者有功之魂受度而補其局其宫置左右中三府其左府號諒事府右府號宗靈府中府號靈如神府三府考官如上法主生死一十四曹中元二品右宫名北酆宫一號隂天宫總主地上諸靈官置左右中三府左府號連宛泉曲府右府號泰殺九幽府中府號罪氣咸池府主生死中元二品地上三官左右中各三府綂一十四曹並治山洞空玄之中皆自然之號地上五嶽四維八極神仙真人以八節日下詣清靈洞陽北酆三宫集校諸地上生死功過罪福衆官齊到三宫九府四十二曹考召官屬各操生死青黒二簿列言三宫南極眞人治洞陽宫中下有流火之庭學人得道者皆詣流火之庭受鍊而成眞然後進入洞陽宫中長生者宫中有度命之君字吁員得入南宫吁員即爲鍊度朽骸也幽棲曰南方主生故復有南極主司長生之名簡者也少微曰流火之庭廣八十萬里中有度世司馬大神東曰南宫中有度世司馬大神者十方飛天神王並治宫中也幽棲曰司馬大神主司度世之録籍司馬官位也少微曰南宫又有度世司馬亦有度世大神並治宫中長生不死也中有好生韓君丈人東曰好生君諱猷治南上宫中也韓君司命司録也治九幽酆都人有善功者大聖開玄夜之戸酆都度八難之場七祖於是而還幽魂於是而光上帝育飬始生之神司録則度筭於南宫也幽棲曰復有韓君丈人監長生籍與南極事同神中之尊謂之丈人韓君官司之號也少微曰韓君是上帝闕下司録仙籍度人南宫也玄英曰丈人長老之稱也好樂也明其南宫之中復有樂人長生不死之君録人善功出三界之苦中有南上司命司録東曰南上宫名也九華眞人治在其中主九幽之中宿對死魂司命主壽筭之神司録主簿録之神並南上帝君司官也常校學仙之名上言玄都之宫有知八字之音應得度者至災劫交之時則司命使鳥母迎以鳳車上登崐崘之墟也玄英曰南上者洞陽宫之别名也延壽益筭東曰延申也筭紀也九靈之母治東海扶桑湯谷之淵常總地機轉輪元炁上應天關天關轉地機動周天一度水則湧三千三百度九海溟合坤母出東海之上以召鳥母使申劫㑹於帝君延壽益其筭紀度學仙之人也度戹尊神東曰南上宫中有益壽延年度戹尊神上帝君也諱育常乗象輪之車遊行九玄之門轉九機之度以應劫㑹之期天運之終而日童停光拔度學仙之人灌以水毋之精導以太和之炁度其災戹鍊長夜之尸幽棲曰復有南方司命司録二尊神司命尊神主延壽益筭司録尊神主過災度戹也迴骸起死无量度人東曰无量則大衆之始神也總綂飛天之衆旣樂天中有无量品衆大聖衆皆受其品量而得昇度死骸受炁而更生爲人也幽棲曰夫延壽益筭過度災戹及迴死骸之形已死之尸者皆由乎司命司録之二君也故云无量度人也少微曰總彼眞官各司其職並能迴骸復命起死成生劫運頻交度人无量也玄英曰此二句通結上文從中有度人至此諸司眞官皆能迴骸起死度脫生靈迴骸者骨爲骸骸形也能令死骸白骨更起成人也起死者謂新死之人更令得活也无量度人者凡於劫劫之中度人成道非可筭數故云无量度人此明元始垂慈死生通濟置立金宫玉殿總彼眞官照臨三界之中弘度九天之内人則存亡獲慶萬物則動植銜㤙劫劫之中長生久視今日校録諸天臨軒東曰校録校生死之録也臨軒宴㑹也玉帝在南昌之宫中校度生死録籍普得開赦幽棲曰今日校録謂校量持誦之人建功立行之名簡應合昇度之録籍故諸天十方无量神眞乗輿御輦上詣帝前少微曰今日者赤明開圖日也校録者校死生録籍也凡校録之日皆可借言今日耳是時元始天尊校死生録籍諸天聖衆並臨軒宇而朝也東方无極飛天神王長生大聖无量度人東曰太上說玄都玊京山八方諸天有三千大千世界東方无極諸天安太堂郷大千納善之世界也幽棲曰即前序云說經一遍東方大神浮空而至也南方无極飛天神王長生大聖无量度人東曰南方无極諸天宛梨城境大千棄賢世界也幽棲曰此說經二遍南方大神浮空而至也西方无極飛天神王長生大聖无量度人東曰西方无極諸天福堂洲大千咸行世界也幽棲曰此說經三遍西方大神浮空而至也北方无極飛天神王長生大聖无量度人東曰北方无極諸天鬱亶野大千清淨世界也幽棲曰此說經四遍北方大神浮空而至也東北无極飛天神王長生大聖无量度人東曰東北方无極諸天福集都大千長安世界也幽棲曰此說經五遍東北大神浮空而至也東南无極飛天神王長生大聖无量度人東曰東南方无極諸天元福田大千用賢世界也幽棲曰此說經六遍東南大神浮空而至也西南无極飛天神王長生大聖无量度人東曰西南方无極諸天延福郷大千仁靜世界也幽棲曰此說經七遍西南大神浮空而至也西北无極飛天神王長生大聖无量度人東曰西北方无極諸天福德野大千延賢世界也幽棲曰此說經八遍西北大神浮空而至也上方无極飛天神王長生大聖无量度人東曰上方无極无巓玄都玉府紫微之中无鞅之衆飛天神王也幽棲曰此說經九遍上方大神浮空而至也下方无極飛天神王長生大聖无量度人東曰下方无極五嶽五帝洞陽清靈北酆都諸宫府之中也幽棲曰此說經十遍下方大神浮空而至也十方至眞飛天神王長生度世无量大神東曰十方大羅之天有玊京山山有八方上下合爲十方各有无極无窮飛天神王長生度世君无量大神无鞅之衆並到帝前也幽棲曰此十方眞神並主司監得道成眞長生度世之事故云長生大聖无量度人並乗飛雲丹輿緑輦羽蓋瓊輪東曰飛雲者三素雲也丹赤也緑碧也羽旄也蓋覆也瓊玉也十方大聖飛天神王各乗丹霞之輿碧霞之輦朱寉鳳凰以爲輿輦之蓋七寳輪轂也玄英曰丹是赤色之霞緑是碧霄之炁此明十方大聖來朝元始之時皆結太上三素飛雲丹霞碧霄爲其車乗故云丹輿緑輦參駕朱鳳五色玄龍東曰參雜也雜駕朱雀鳳凰五色之龍白虎玄武也幽棲曰羽蓋䕃輿輦之上飛雲騁輪轂之下未鳳則參輦玄龍則駕輿於是鳳輦雲輿雲炁𩀱邁羽蓋者仙禽靈鳥之羽爲蓋也瓊輪者以珪璧琬琰之寳爲輪玄英曰龍有五色而言玄者玄猶天也謂天龍也又云玄是衆色之主故特舉以明之建九色之節十絶靈旛東曰節蓋也旛華旛也九色者青赤白黃黒緑紅紫紺也上眞執九色之旄節玉女把十絶之靈旛幽棲曰夫上眞皆建三七九色節紫旄節靈旛節以十色間錯色各一絶故云十絶節在旛前皆左右持執以導前少微曰十方大聖並乗三素飛雲丹霄之輦鳳凰羽蓋瓊玉之輪參雜也又雜駕以朱鳳玄龍文耀五色玉女建九光之節眞人持十絶之旛文物威儀異方同軌玄英曰十絶靈旛者以十色之素橫幅剪斷謂之爲絶又分間其色接而縫之其幅通者十接謂之十絶繫於竿首謂之爲旛旛者以轉爲名令人轉禍爲福也執節使刑罰有度罪无濫刑持旛使悔過修眞化惡爲善大聖所建曉示愚迷使眞人執旛玉女持節其旌節貴賤隨法髙低如上清真人建紫毛之節其餘等級具列科儀此不兼載前嘯九鳳齊唱後吹八鸞同鳴東曰雄曰鳳雌曰凰赤色五彩曰鸞前導九部之鳳後從八部之鸞侍晨一嘯九鳳齊唱西靈眞人吹九鳳之簫則八鸞同鳴也幽棲曰前有嘯歌則九鳳與之齊唱後吹管籥則八鸞與之同鳴玄英曰八九者前部屬陽陽數竒故九也後部屬隂隂數偶故八也師子白鶴嘯歌邕邕東曰邕邕和鳴也鳳唱鸞鳴衆音並作也幽棲曰師子作虎嘯白鶴爲鳳歌和鳴諧合二音邕穆也少微曰此天鈞樂也前部嘯歌則九鳳齊唱後部流吹則八鸞同鳴洞神經曰天一左宫有天鈞樂器子日玉女能吹笙竽丑日玉女能嘯歌寅日玉女能鼓瑟卯日玉女能擊筑辰日玉女能鼓琴已日玉女能撞鐘擊磬午日玉女能吹簫未日玉女能吹笳申日玉女能爲九音之歌酉日玉女能爲六變之歌戍日玉女能作百獸鳴亥日玉女能爲天下新聲之曲天鈞樂器名也名與世同音與俗異俗音悽思以促命天音和暢以延生玄英曰此明師子白鶴從駕而行天樂一張則百獸率舞故得齊聲唱和嘯歌邕邕五老啓塗羣仙翼轅東曰五老五帝也啓開也塗道也翼侍也轅輿輦轅也十方飛天无極大神臨軒於始青天中五帝開道羣仙侍引也幽棲曰五老啓塗以前引羣仙則侍轅之左右五老即五老帝君掌領五篇眞文也少微曰五老五帝也十方大聖道位尊髙乃感五帝前驅羣仙驂乗五符本行經云東方安寳華林青靈始老號曰青帝姓閻諱開字靈威仰服色尚青駕蒼龍建翠旗從羣神九十萬人和春氣生萬物南方梵寳昌陽丹靈眞老號曰赤帝姓洞浮諱極炎字赤熛弩服色尚赤駕赤龍建朱旗從羣神三十萬人和夏氣長萬物中央玉寳元靈元老號曰黃帝姓通班諱元氏字含樞紐服色尚黃駕黃龍建黃旗從羣神十二萬人和土氣上載九天西方七寳金門皓靈皇老號曰白帝姓上金諱昌開字耀魄寳服色尚白駕白龍建素旗從羣神七十萬人和秋氣成萬物北方洞隂朔單鬱絶五靈玄老號曰黒帝姓黒節諱靈㑹字隱侯局服色尚黒駕黒龍建玄旗從羣神五十萬人和冬氣藏萬物五老帝君皆天眞自然之神故曰元始五老非後學而成眞者自受符命各治一方大劫交周其位仍易也億乗萬騎浮空而來東曰萬萬曰億也乗鳳車也騎龍麟也飛仙並乗龍駕无鞅之衆鳳車羽蓋浮空而到也幽棲曰億乗萬騎明其多也浮空而來非履地也傾光迴駕監眞度生東曰傾蓋也光日也度生眞人也字扶羲常主敎九幽之録善惡之因善者則受其開度惡者則極其對根爾時十方大聖蓋天而來下障翳日光迴駕於諸天之境傾光於上帝之前監諸修誦成眞之至士度祖考應生之魂魄者也玄英曰傾動也光者車輿章服輝耀也迴駕者衆聖臨軒旣受天尊符命訖遂乃傾動光儀迴其車駕各歸本國監領羣眞度脫得仙之人故云監眞度生也諸天丞相南昌上宫東曰丞相大羅天之神公也上宫朱陵宫也丞相爲受度更生之賔定命籍於朱宫削罪根於三官也幽棲曰九宫有上相二眞之位輔弼諸天之事故居於南昌上官即九宫之南赤明和陽天中者也韓司主録東曰韓司司命也應得度者司命即執主録筭度於南宫而得受鍊度者也監生大神東曰監生大神主領長夜之宫校學道簿録度九幽之魂大神者十方飛天神王也常在飛玄之上而誦洞玄之經以自然之炁拔度學道之人也幽棲曰韓司即前韓君之司也主録即主監長生之録故云監生大神也執録把籍齊到帝前東曰十方大神各領司録執持録籍以到玉帝之前玉帝諱廓奕治玉京玄臺之中與元始同生爲玄元之範開滅度之門敎學仙之人也幽棲曰十方至眞與諸天丞相及監生大神並抱執筭度之録籍俱㑹帝前以遷舉也少微曰韓司主録門下司録也主人録籍故曰主録監生大神更生眞人也字扶羲領長夜之府度九幽之魂是時諸天帝主各領丞相齊到陛下校度死生帝者天尊自謂也天尊一號玉帝按龍蹻經元始有十號一曰自然二曰无極三曰大道四曰至眞五曰太上六曰老君七曰髙皇八曰天尊九曰玉帝十曰陛下隨所應度嚴校諸天東曰學士若能明八字之音則神公開長明之戸十方幽魂並得度入更生之門上登玉京之臺歡樂紫極之宫中有神嬰之童一歌无量之章立得反形於三鍊之房身受自然之炁歡樂无極之齡幽棲曰隨所在修誦之人應合得度者校勘諸天之名簿籍句㑹功滿之録也少微曰皆隨功輕重應事開度嚴校諸天罔有遺失普告三界无極神郷東曰三界者欲界色界无色界也无極者十方无極世界也普告十方无極无窮之神普令知聞也幽棲曰告勑三界五帝之魔王逮及无極无窮之神域有司必告无幽不聞也少微曰玉帝告也三界者欲界六天色界十八天无色界四天諸神之郷无有限極故曰无極神郷泉曲之府北都羅酆東曰北都玉都也羅酆山名也羅酆之山在天地之北北海之外山髙二千六百里内外皆七寳宫室天地鬼神之所處三界六天北帝大魔王治乎其中凡六宫皆六天鬼神之治洞中有六宫亦相像如一下元三品水官結風澤之炁凝晨浩之精置下元三宫第一名湯谷洞泉宫一號清華方諸宫總主水帝湯谷神王九江水府河伯神仙諸眞人水中諸大神已得道過去及未得道有功之魂受度而昇其宫置左右中三府左號青元靈淵府右號九氷寒夜府中號朔單青靈府簿録並封九河洞室其下元左宫名清泠宫一號南水㑹宫總主水中萬精蛟龍鯨鯢入㑹水母龍門各五億萬重風澤金剛之炁其宫置左右中三府中號靈寳劫刃府左號齡劫府右號長夜寒庭府主水中萬靈下元右宫名北酆都宫一名羅酆宫總主水中積夜死魂謫役之劫其左府號開度劫量府右府號泉曲鬼神府中府號通靈大劫府下元三品水官三宫宫綂一十四曹三宫合四十二曹並治九江洞室皆自然之號並綂三河四海九江水府一切神靈已得道及未得道并地上五嶽眞仙玉女常以太歳甲子庚申之日下詣湯谷清泠北酆都三宫校集九府生死簿録昔天地改運淪於延康㝠㝠无開飛天啓光於是散暉諸天受炁灑靈玄都故云玉都亦大聖之號北帝上眞治乎玄靈之宫下有寒氷夜庭又有八難之場故曰泉曲府也幽棲曰泉曲府即九幽長夜之鬼府北都羅酆即酆都北帝之鬼都羅酆是北海九幽之山名鬼都即在羅酆幽山之上者也少微曰此下元右宫也按眞誥云北酆在天地之北外癸地一名酆都泉曲府酆都右府也羅酆是北都上山名也髙二千六百里周囬三萬里下有洞天周回萬五千里内外皆有七寳宫室有上中下三宫各八獄合二十四獄皆天地鬼神所處也三官九署十二河源東曰三官者天地水三官也上元天官有三宫宫綂一十二曹合三十六曹中元地官亦有三宫宫綂一十四曹合四十二曹下元水官亦有三宫宫綂一十四曹合四十二曹三官都合一百二十曹主領鬼神人天地水三官合爲九署及九海三河十二川源之中生死圖籍无淵无底无極神仙一切神靈普皆宣告也幽棲曰三官即酆都三官酆都有六宫二宫立一官六宫故立三官也一官有三署三官有九署左爲火官右爲水官中爲女官並隨事源主司考掠如世上之六曹十二河源即水府也事與三官九署相符三官九署亦十二也且屬北方與北俱是隂位故取二六之數以置十二官也此亦舉主宰耳其餘小位不復言也少微曰三官者上元天官中元地官下元水官主九署九府署司也十二河源者月爲太隂之精諸水之母井是天河之源衆水之泉一月一周天一年十二月每月皆過於東井沃黃水之華濯天人之容若先祖未生皆蒙鍊度以成仙眞事見三五順行經按三元品戒經說上元天官隷玉清境結青黃白三炁置上元三官玄炁爲中宫始炁爲左宫元炁爲右宫其中宫名元陽七寳紫微宫結青元始陽之炁總主上眞自然玉虚髙皇上帝諸天帝王上聖大神其宫皆五億五萬五千五百五十五億萬重其中神仙官寮亦有五億五萬五千五百五十五億萬衆皆結自然青元之炁而爲人也衣則青羽飛衣紫微宫中有延生之符出符以置八方則八方之炁欻然響應皆即成人藏符則復化爲炁宫置左右中三府左府主生官太陽火官考右府主死官太隂水官考中府主生死罪福風刀之考考者覈實其事大福三年考中福九年考小福二十四年考三府各領官寮九千萬衆總綂生死罪福一十二曹其左宫名太玄都元黃太極左宫即玉清左相宫也結元黃之炁而成總主千眞已得道及男女生命籙籍宫數官寮不異中宫亦結自然元黃之炁而爲人衣則黃羽飛衣太極左宫有招靈之符用之亦如延生符也左宫亦置三府主考罪福一同中宫也右宫亦名太玄都洞白太極右宫是清微宫也結天元洞白之炁而成總主上眞已得道未得道百姓男女仙籙罪籍宫數官寮亦不異中宫其人亦結自然洞白之炁而成衣則白羽飛衣宫中有明眞之符用之亦同延生招靈也左右中三府主考罪福一同中宫上元三宫宫綂三府府綂四曹九府共三十六曹並治元陽之上太空之中有功德滿足應合仙者言名紫微宫有敬信宗奉大法者言名太極左宫應死者言名右宫中元二品地官者隷上清境結元洞混靈之炁凝極黃之精而成其中宫名洞靈清虚宫總主五帝五嶽諸眞人及諸地神仙已得道者其宫皆五億五萬五千五百五十五億萬重其中神仙官寮有九萬九千九百九十九萬衆此皆死者有功德之魂非自然之炁也受度得神仙地官之任各有年限功滿德進昇爲天府仙官功未滿者還生人中中宫置左右中三府左號耐犯明晨府右號紂絶隂天府中號七非恬照府主考罪福隂陽年數不異上元也左宫名南極洞陽宫主地上九土土皇八極諸靈宫及生命籙籍宫數官寮不異清虚宫也宫置三府左號連宛曲泉府右號大煞九幽府中號罪氣咸池府主考罪福年數不異左宫中元三宫三府共綂一十四曹九府合四十二曹並治山洞空中言奏善惡不異上元也下元三品水官隷太清境結風澤之炁凝晨浩之精而成其中宫號湯谷洞泉宫一曰青華方諸宫總主水帝湯谷神王九江水府河伯神仙水中諸大神及仙籙簿籍宫數官寮與中元同也官寮亦是有功德之魂補之宫置三府左府號青元靈泉府右號九泉寒夜府中號朔單青靈府主考年限罪福不異中元左宫名清靈宫生水中萬精鮫龍鯨鯢又㑹水毋龍門度數之期及人命籙籍生死功過炁是風澤金剛之炁官寮宫數不異中宫右宫置三府左號靈劫府右號長夜府中號靈寳劫刃府主考罪福亦如中宫也總主水中精魂百鬼萬靈炁是風澤梵行之炁宫數官寮亦同中元也右名酆都宫置三府左號開度劫量府中號通靈大劫府右號泉曲鬼神府主考罪福亦同中元也下元三宫宫綂三府九府合四十二曹三府共一十四曹並治九室總綂八海四瀆水帝神王水中一切靈祇三元總九宫二十七府百二十曹左主生事右主死事有功書左府青簿有罪書右府黒簿若罪中渉福福中渉罪則不專一曹也得道奉中宫有功奏左宫有罪奏右宫毎到三元八節日絶滅惡根也玄英曰此明黃水月華鍊度死魂之事十二者年中十二月也河源者河即天河也天有二十八宿東井星是天河之源衆水之泉月爲太隂之精諸水之母月行則毎月一周天皆經東井吐水灌注故云十二河源若死魂受生皆蒙黃水鍊度以成眞仙此文開度死魂故舉十二河源以明其事且三元八節勸在修行學者若得輕昇亦能超度先祖謂下文上解祖考億劫種親幽棲曰解脫累代祖考之幽魂原宥億劫之宗親也少微曰毎三官校録因子孫有大功玉帝即爲上解億劫祖考一切種親度生諸天也疾除罪簿落滅惡根東曰疾速也簿録也速除罪録絶滅惡根也幽棲曰速除其罪謫之黒簿急落其惡對之深根者也不得拘留逼合鬼羣東曰拘閉也逼强也不得閉繫魂爽强聚鬼庭之中遏塞正敎也幽棲曰旣頼經功以拔度復沐道恩以解脫豈更有拘繫留滯之艱混合羣鬼之中少微曰約勑三官有功德者不得拘留魂爽逼合鬼羣也元始符命時剋昇遷北都寒池部衛形魂東曰元始天尊說經之時命召十方无極世界地獄之中一刻之時幽夜之中寒氷夜庭三官九府一時各部領鬼神侍衛將從得出長夜之府並皆開度得見光明也幽棲曰元始降符勑命畫時剋以昇超北帝告寒池受形之魂部領出泉曲之府寒池者刑罰之池也少微曰酆都下有寒池諸鬼神有舒慢者玉帝即用符命一時一刻寒氷夜庭三官九府各部領幽魂移出長夜之府並承開度得見光明制魔保舉度品南宫東曰三界魔王常作謡歌以亂學者之心心固者魔王保舉徑昇黃笳天中詣金華山受太一之信以制大魔之試然後得度當爾之時符制魔王使保度南宫也幽棲曰旣勑北帝出鬼魂於北府即制魔王度仙品於南宫死魂受鍊仙化成人東曰南宫者長生之宫也度命君治在其中諱吁員得入南宫之中吁員即鍊度朽骸生童即灌其生津著生契於四極給自然之羽童生童者日中靈童也幽棲曰死魂舉度於南宫則以流火之膏鍊其鬼質從茲改化便得仙也生身受度劫劫長存東曰生身者魂受鍊度而還得遷人值元始開化身昇長生之宫億劫長存者也隨劫輪轉與天齊年東曰輪轉不滅與天地等年也幽棲曰若即此生身便受昇度則與天齊久與道同存劫始劫終從劫至劫劫自成敗而我獨存者天地世界一期運終是名爲一劫也玄英曰隨劫輪轉者劫有大小若大劫交周即是天地敗壞劫火起時是也小劫是人之生死一期之盡謂之爲劫隨劫者謂度死魂受鍊成人不能无死死後託化更生爲人是隨劫也劫劫得生人道故云與天齊年永度三徒五苦八難東曰永長也三徒者三惡門名也第一名色欲門一名上尸道一名天徒界第二名愛欲門一名中尸道一名人徒界第三名貪欲門一名下尸道一名地徒界此爲三惡門一名三尸道一名三徒界常居人身中塞人三關之口斷人三命之根遏人學仙之路抑人飛騰之魂五苦者一名五道門第一名色累苦心門一曰太山地獄苦道第二名愛累苦神門一曰風刀苦道第三名貪累苦形門一曰提石負山苦道第四名華競苦精門一名塡海作河苦道第五名身累苦魂門一名吞火食炭鑊湯苦道故經曰吾所以有大患者爲吾有身及吾旡身吾有何患此五苦五道常居人身係人命根遏人招眞之路斷人修仙之門三徒五苦合爲八難爲罪之本而不解形於五道之上滅迹於五苦之下衆累不斷沈淪罪田夫學諸上道當先斷諸累絶滅苦道眞炁自降神仙自成剋得變形遊行三清身入長生之府无復八難之患也超凌三界逍遥上清東曰超昇也凌髙也飛昇南宫神王即勑羽林監簡上生簿受符而昇仙遊行雲宫之中身著結雲之衣徑入朱陵之宫受福於天堂與飛天合景飛行雲中神王妙成天王也字育生總綂十方飛天之神羽林監字邈學知天中之音三界所穪地祇奉迎洞明神鬼坐知自然飛行三界遊乎上清也幽棲曰旣與天齊年復與道合形永出三徒之役長離五苦之謫超八難於鬼都登九天之眞域三徒者一曰長夜徒二曰寒池徒三曰摙石徒五苦者一曰刀山苦二曰劒樹苦三曰鑊湯苦四曰鑪炭苦五曰考謫苦八難者三徒五苦共爲八難也少微曰三徒者三官徒役也一曰天官徒役奔雷走電二曰地官徒役擔山負石三曰水官徒役摙汲溟波五苦者登刀山履劒樹入鑊湯抱銅柱吞火食炭也八難者八門幽曠之難道君所問飛天對之也上清之天天帝玉眞无色之景梵行東曰上清之天有天帝玉眞字陁與五篇眞文結炁俱明在雲阿之嶺號曰妙成之天者是也玉眞在上清之天不參色界乗大梵之炁遊行入太黃皇曽之天也幽棲曰上清之天天帝即三十六天帝最尊極之位道齊元始位列玉清故云玉眞此即上清已下四境境有九天四九合三十六天此不同三十二天也无色天景則有景无色故云梵行此後即明後四方之天方有八天四八合三十二天謂之四梵天也景者身也色者質也言三十二天上帝髙尊形相宛然有景无質雖有眞相猶如虚空出入无間不閡於物故云梵行梵者道中之道也此三清五境三十六天謂之大羅四方四梵三十二天内種民四天謂之中羅其欲色无色三界二十八天謂之小羅也少微曰上清天帝名玉眞字陁與號曰紫晨天帝君不參色界无有三景故曰无色之景唯有大梵之炁流行混成圖云諸天各有一日一月上清至大羅自生九色光明不假日月故謂无色之景梵行也太黃皇曽天帝鬰繿玉明東曰東第一屬清微天帝位元陽之炁少微曰此天色黃炁係西北方梵炁帝諱觀覺主長生籙天中人壽九百萬歳六根俱染是名欲界玄英曰凡言梵炁者皆是四維之天維是角也其四方正面之天名係二十八宿之炁其四維之天不屬正宿但得兩邊宿炁相假而成故云梵炁梵是泛雜之名无係著之貌也如皇曽一天承奎壁二宿之炁故云梵炁已下三天倣此其三十二天之中天人壽命從此天向上每天皆一倍因之數可知矣又從皇曽已下三十二天經文之中從天字向上皆是其天之穪號從帝字向下即是天帝之號也太明玉完天帝須阿那田東曰東第二屬禹餘天帝位上陽之炁少微曰此天色緑炁係北方壁宿帝諱攬覺主度魂更生天中人壽一千八百萬歳一欲根麤淨五欲根麤染清明何童天帝元育齊京東曰東第三屬大赤天帝位太陽之炁少微曰此天色黒炁係北方室宿帝諱大覺主敷布政敎度脫天人天中人壽三千六百萬歳二欲根麤淨四欲根麤染玄胎平育天帝劉度内鮮東曰東第四屬元景天帝位九天第一清陽炁少微曰此天色赤炁係北方危宿帝諱育王主召魔舉仙天中人壽七千二百萬歳三欲根麤淨三欲根麤染元明文舉天帝醜法輪東曰東第五屬无量壽天帝位九天第二洞陽炁少微曰此天色蒼炁係北方虚宿帝諱梵雲主通行元炁天中人壽一萬四千四百萬歳四欲根麤淨二欲根麤染上明七曜摩夷天帝恬懀延東曰東第六屬上監天帝位通陽之炁少微曰此天色黒炁係北方須女宿帝諱玉眞主開度幽難天中人壽二萬八千八百萬歳五欲根麤淨一欲根麤染以上六天謂之欲界太眞科曰初下二天果報尚麤猶以身交爲欲次二天以執手爲欲第五天以口說爲欲第六天以眼視爲欲今縁六欲感此六天一根麤淨上進一天六欲總淨超出欲界上登色界宗君曰言有色欲交接隂陽人民胎生故爲欲界也虚无越衡天帝正定光東曰東第七屬兜術天帝位建陽之炁少微曰此天色碧炁係北方牽牛宿帝諱无上主明无上之道天中人壽五萬七千六百萬歳六色塵俱染初出欲界猶染色塵太極濛翳天帝曲育九昌東曰東第八屬不驕樂天帝屬東方極陽之炁少微曰此天色紫炁係北方斗宿帝諱吁員主鍊度朽骸天中人壽十一萬五千二百萬歳一色塵麤淨五色塵麤染赤明和陽天帝理禁上眞東曰南第一屬化應聲天帝位始陽之炁少微曰此天色白炁係東北方梵炁在箕斗之間帝諱煥明主鍊仙成眞天中人壽二十三萬四百萬歳二色塵麤淨四色塵麤染玄明恭華天帝空謡醜音東曰南第二屬梵寳天帝位陽暉之炁少微曰此天色黃炁係東方箕宿帝諱世元主應化一切天中人壽四十六萬八百萬歳三色塵麤淨三色塵麤染耀明宗飄天帝重光明東曰南第三屬摩夷迦天帝位洞陽之炁少微曰此天色緑炁係東方尾宿帝諱落覺王劫終納學仙之人天中人壽九十二萬一千六百萬歳四色塵麤淨二色塵麤染竺落皇笳天帝摩夷妙辯東曰南第四屬荅惒皇天帝位陽明之炁少微曰此天色青炁係東方心宿帝諱韶主魔試學仙之人天中人壽一百八十四萬三千二百萬歳五色塵麤淨一色塵麤染也玄英曰此前六天是色塵之天學者若修極此天即色塵俱盡超入細塵天中謂下文也細塵有六天虚明堂曜天帝阿𨚧婁生東曰南第五屬梵明天帝位陽演之炁少微曰此天色赤炁係東方房宿帝諱雲上主開度天地天中人壽三百六十八萬六千四百萬歳六色塵麤淨六細塵染觀明端靜天帝鬱宻羅千東曰南第六屬摩雜惒天帝位陽明之炁少微曰此天色蒼炁係東方氐宿帝諱淨生主度學者之身天中人壽七百三十七萬二千八百萬歳一細塵淨五細塵染玄明恭慶天帝龍羅菩提東曰南第七屬億羅天帝位陽浩之炁少微曰此天色黒炁係東方亢宿帝諱鏡主度得道之人天中人壽一千四百七十四萬五千六百萬歳二細塵淨四細塵染太煥極瑶天帝宛梨無延東曰南第八屬那首明天帝位陽極之炁少微曰此天色碧炁係東方角宿帝諱廓奕主敎學仙之人天中人壽二千九百四十九萬一千二百萬歳三細塵淨三細塵染元載孔昇天帝開眞定光東曰西第一屬染梨恭首天帝位少陽之炁少微曰此天色紫炁係東南方梵炁在軫角之間帝諱猷主鍊度死魂更生天中人壽五千八百九十八萬二千四百萬歳四細塵淨二細塵染太安皇崖天帝婆婁阿貪東曰西第二屬首來天帝位太陽之炁少微曰此天色白炁係南方軫宿帝諱宛王開度善人天中人壽一萬一千七百九十六萬四千八百萬歳五細塵淨一細塵染玄英曰此前六天是細塵之天學者修極此天即細塵都盡昇入輕塵天中謂下文也輕塵有六天顯定極風天帝招眞童東曰西第三屬首爲稽那天帝位浩陽之炁少微曰此天色黃炁係南方翼宿帝諱流主度有善功之魂天中人壽二萬三千五百九十二萬九千六百萬歳六細塵淨六輕塵染始黃孝芒天帝薩羅婁王東曰西第四屬阿那波邏迦天帝位洞隂之炁少微曰此天色緑炁係南方張宿帝諱易邈主披夜開幽天中人壽四萬七千一百八十五萬九千二百萬歳一輕塵淨五輕塵染太黃翁重浮容天帝閔巴狂東曰西第五屬波羅離和天帝位開隂之炁少微曰此天色青炁係南方星宿帝諱阿濫主召魔集眞天中人壽九萬四千三百七十一萬八千四百萬歳二輕塵浮四輕塵染无思江由天帝明梵光東曰西第六屬梵明元黃天帝位玄隂之炁少微曰此天色赤炁係南方栁宿帝諱阿丘主開度善魂天中人壽一十八萬八千七百四十三萬六千八百萬歳三輕塵淨三輕塵染上揲阮樂天帝勃勃監東曰西第七屬蔡濘元天帝位昊隂之炁少微曰此天色蒼炁係南方鬼宿帝諱无量主品𩔖天人等級天中人壽三十七萬七千四百八十七萬三千六百萬歳四輕塵淨二輕塵染玄英曰等級者貴賤貧富壽命也無極曇誓天帝飄弩穹隆東曰西第八屬天阿梨惒天帝位極隂之炁少微曰此天色黒炁係南方井宿帝諱曇主度一切仙人天中人壽七十五萬四千九百七十四萬七千二百萬歳五輕塵淨一輕塵染以上十八天謂之色界太眞科曰无色界之中至眞无情不交隂陽人民化生但噉香炁无復形質之患也玄英曰然此前一十八天通名色界若從此天昇上即至无色界天形色都无亦得同彼天人壽命前明色界天中猶有輕塵爲累此明无色之界形相都无學者修至此天唯存心識以入炁觀皓庭霄度天帝慧覺昏東曰北第一屬阿荅惒天帝位隂生之炁少微曰此天色碧炁係西南方梵炁在參井之間帝諱育主拔度學人天中人壽一百五十萬九千九百四十九萬四千四百萬歳色塵俱淨形相都如虚空也唯存心識以入炁觀炁觀道成即昇入元洞天也淵通元洞天帝梵行觀生東曰北第二屬扇明民天帝位隂化之炁少微曰此天色紫炁係西方參宿帝諱上主度學仙之人天中人壽三百一萬九千八百九十八萬八千八百萬歳尚有心識勞動便作捨識意修得生妙成天也玄英曰又以心識爲患若能捨除心識以至无爲即得昇入妙成天中也太文翰寵妙成天帝那育醜瑛東曰北第三屬梨那天帝位隂明之炁少微曰此天色白炁係西方觜宿帝諱陀主綂理神王天中人壽六百三萬九千七百九十七萬七千六百萬歳前因都忘心識即居此天此天不使都忘故應用即有不爲即无若有若无即昇禁上天也玄英曰此天不使兼忘若令空有都无即失眞中之應以其空中有眞眞中有應生成萬象皆出於空萬法在心亦无形相應用則有有即非无將令學者觀心若有若无即生禁上天也太素秀樂禁上天帝龍羅覺長東曰北第四屬明梵括大招天帝位隂洞之炁少微曰此天色黃炁係西方畢宿帝諱隗主領録魔王天中人壽一千二百七萬九千五百九十五萬五千二百萬歳炁觀轉妙結習都忘若洞入自然即昇居種民天也以上四天謂之无色界太眞科曰无色界中人身微妙無復形色或復形長數百丈而人不見唯眞人能見之以其无形可見故云无色但三界之人生死之根未斷隂陽之炁猶存故有壽盡之數或昇入上境或下生人中隨功厚薄輪轉无窮得道乃已也玄英曰此四天是无色界天修學之者若至此天更能進修即生四種民天也太虚无上常融天帝總監鬼神東曰北第五屬阿尼姤天帝位隂靈之炁少微曰此天色緑炁係西方昴宿帝諱極主校學者之功天中人壽二千四百一十五萬九千一百九十一萬四百萬歳初出三界清淨无染喜樂无爲也太釋玉隆騰勝天帝眇眇行元東曰北第六屬須達天帝位隂魂之炁少微曰此天色青炁係西方胃宿帝諱浮黎主召集仙聖天中人壽四千八百三十一萬八千三百八十二萬八百萬歳龍變梵度天帝運上玄玄東曰北第七屬元梵須帯太昏天帝位隂結之炁少微曰此天色赤炁係西方婁宿帝諱惡奕主進仙成聖天中人壽九千六百六十三萬六千七百六十四萬一千六百萬歳隨炁昇降无復結習太極平育賈奕天帝大擇法門東曰北第八屬釋繟自然天帝位隂極之炁少微曰此天色蒼炁係西方奎宿帝諱精上主度學者之身天中人壽一萬九千三百二十七萬三千五百二十八萬三千二百萬歳以上四天爲四民天亦謂之種民天一云此四天人出二炁之外无年壽之限喜樂清淨也本際經云結習已盡超種民位謂煩惱爲結學業爲習太眞科曰上昇四天洞入道境隨炁升降災所不及以上三十二炁及係星宿帝諱主掌皆見洞神經人壽歳數根塵染淨見龍蹻經三十二天三十二帝東曰四八三十二天也内名隱諱皆多相𩔖梵語難解别有訣解凡有三十二天各有一帝合爲三十二帝諸天隱諱諸天隱名東曰經中所說並是諸天内名隱諱者也幽棲曰此四方之天即東方九炁青天南方三炁丹天西方七炁素天北方五炁玄天一方八天四八三十二天也在三景之上九宫之下四極之方與四維上下通爲十方其天名帝號旣稱隱諱隱名不可注釋少微曰隱諱帝諱隱名天名也天中空洞自然靈章東曰空玄也洞虚也靈章玉字也玄虚之中有自然玉字故云靈章也幽棲曰言此經是太極空洞之眞詞虚无自然之靈奥者也少微曰空洞靈章即八㑹靈書自然玉字也本其所出皆結空洞之炁自然成章非世上言詞是諸天音韻也玄英曰空洞者謂諸天太空虚无之中也靈者即八㑹靈文自然玉字是也章者言詞合㑹䕃映成文謂之爲章八㑹者八方之炁也自然者明此靈章之本迹皆結空洞之中八方眞妙之炁靈風皷奏自然成此言章非因造作而成故曰自然靈章也諸天隱韻天中之音東曰韻調也音章也諸天各有八字之章隱其調韻文㫖玄奥難可㝷詳故曰隱韻也幽棲曰亦是諸天隱微之韻十方幽祕之音也玄英曰音䕃也單出爲聲五聲相䕃而成文謂之音禮記樂記曰聲成文謂之音天中之尊天中之神東曰天中亦有至尊又有大神也幽棲曰尊者即三十二天之帝尊神者即十方飛天之神王也天中大魔天中之靈東曰大魔者即三界魔王也靈即司命司録監度諸靈官也九和十合變化上清東曰和解也合㑹也天王昔在龍漢之中諸縁並盡而得過度三界之庭身入太虚之館受九仙鍊度而得進大聖之號赤明開運元始錫爲梵度天王奕奕而昇靈門上登玉清之宫也幽棲曰此明諸天神靈大魔皆是舉度之主録籍之司若九和十合共相保舉立能應時變化飛登上清也少微曰尊是上聖髙尊也神是飛天神王也大魔是三界魔王也靈是五帝靈章也玉字所出是尊神魔靈和九炁之精合十方之音變化上清之天流布三十二境玉訣云五帝靈章五帝眞文五老同生綂九天之炁也玄英曰此明眞文玉字之縁起皆是諸天上聖之髙尊及飛天大神三界魔王五方大帝等和九炁之精合十方之音變化上清天中之妙流布三十二天成其靈章之文也九炁者九天之炁也无量之奥深不可詳東曰奥隱也詳審也无量之文其義隱奥難可詳審也幽棲曰此經旣能變凡入聖鍊麤入妙乃出離五濁飛歩三清則幽奥難詳忘言理絶敷落神眞普度天人東曰敷布也落置也元始隨運度人布置神眞以立三十二天安鎭五嶽普度天人也幽棲曰敷張也落廓也敷張開設之貌廓落廣大之㫖言此經神眞仙化敷張廓落人間天上普度无窮玄英曰言天尊布落玉䇿眞文普度天人神鬼也今日欣慶受度歷關諸天東曰道君昔於始青天中寳珠之内受十部妙經元始爾時引十方大聖飛天神王无鞅之衆俱入寳珠之中說經都竟衆眞監度以授道君當爾之時喜慶難言三十二天普遍關盟十方國土並皆受度惡對罪根一時開赦也幽棲曰旣沐神眞監舉則永頼昇度之恩上關三十二天下告九幽之府此時欣慶何可勝言也請滅三惡斬絶地根東曰三惡三徒也第一色慾第二愛慾第三貪慾爲三惡門也地根地獄也請滅三惡之道斬絶地獄之根也飛度五戸名列太玄東曰五戸五道門也前章已說今重再解一色累苦心二愛累苦神三貪累苦形四華競苦精五身累苦魂出門由戸故云戸耳太玄太玄都也人禀自然隂陽淳和无慾不履三惡五慾飛度五苦之門徑昇玄都之宫也幽棲曰五戸者五道之門戸五道者以前三惡加以故炁人道共爲五道旣斬絶三惡之趨復超五道之門則酆都落鬼録之名太玄剋仙籍之簡太玄即玄中九宫上清之境魔王監舉无拘天門東曰拘礙也人得魔王保舉徑昇三清得經天門无所拘礙逍遥上清也少微曰天尊賜昇天之劵魔王保舉而奉之所到天門无敢拘礙執問也洞神經昇天劵出人皇文中第六十八字以青素書帯身道士臨昇天之日五嶽不得此劵則拘入魂魄不使同昇江河淮海不得此劵則留人血液不使同昇地官不得此劵則拘人之形不使昇度天官不得此劵則拘閉天門不使昇進天門吏士訶禁求劵得劵即前入太一紫府見大道君然後一切諸神不敢拘制也東斗主筭西斗記名東曰東華天中有散華之臺四斗眞人治在其中主録筭生死功德有功者西斗記其名也幽棲曰東斗者即斗之第一星主増筭壽西斗者即斗之第二星主記録其功名也北斗落死南斗上生東曰南北二斗主人生死有善功者三官列言南斗即度三界之難拔九幽之苦宣告魔王不使破敗人之行惡三官即列言北斗即告下魔王魔王即収人魂付九幽之役萬劫无期長淪惡縁當爾之時无善无應北斗除死籍南斗上生名幽棲曰北斗者即斗之第六星主落其死籍南斗者即斗之第五星主上其生録也中斗大魁總監衆靈東曰魁大也靈神也斗中有靈童字郁馥常運育輪於太无回十轉以召眞總綂十方天關十轉十方大聖上朝玉宫萬神髙眞衆靈同到則郁馥唱焉幽棲曰魁首也中斗者斗之第七星爲四斗之首總綂一身衆靈此五方之斗是北斗五星以主五方旣是斗星故言云東斗西斗非方方各有斗也少微曰此明五方斗宿各受元始職司東方七宿主人壽筭西方七宿記人罪名北方七宿落人死籍南方七宿上人生契中方即今人所謂北斗也天官書曰斗爲帝車運于中央臨制四郷以察妖祥又張衡靈憲曰一居中央故知是斗斗中極也以神州之人居極之南自北而視故謂北斗北極也論之寔同王命布於四方則天心於是乎見矣言中斗爲炁之大帥總監一切神靈生死罪福也䟽曰眞一口訣云斗中自有五斗陽明爲東斗隂精爲西斗丹元爲南斗北極爲北斗天關一星爲中斗恐非此也今解東斗即是東方七宿角亢等少陽之職主人生之筭今人上功名也西斗即西方七宿奎婁等太隂之職主記人善名也北斗即北方七宿斗牛等太隂之職又主死故削落死名南斗即南方七宿井鬼等太陽之職又主生故上生録也中斗即魁𩲃等七宿所謂中斗而緫監四斗一切衆靈生死罪福之事也青帝䕶魂白帝侍魄赤帝養炁黒帝通血東曰青帝君姓閻諱開明字靈威仰常主人魂白帝君姓上金諱昌開字耀魄寳常主人魄赤帝君姓洞浮諱極炎字赤熛怒主洞陽之炁在於心府黒帝君姓黒節諱靈㑹字隱侯局主於血氣綂於腎上清眞人云青帝君姓常諱精明白帝君姓混名蓐収赤帝君姓炎諱洞丹黒帝君姓玄諱明萌幽棲曰青帝位東主木管肝魂藏於肝故曰䕶魂白帝位西主金管肺魄藏於肺故曰侍魄赤帝位南主火管氣氣從火生故曰養氣黒帝位北主水管血血歸於水故云通血也黄帝中主萬神無越東曰黄帝君姓通班諱元成字含樞紐主土氣鎭於脾上清眞人云姓麻諱忠愼幽棲曰黄笳天中金華之山山上有五帝之宫五帝神王治宫中常生五色之雲日月俠乎左右飛仙翼其軒五帝在天主領飛仙在地鎭於五嶽主領鬼神在人主五藏主領五神肝藏魂肺藏魄心藏氣腎藏血脾處中宫主於肌肉故人法地地法天天法道道法自然神有所歸故云無越錯三合以成其德也少微曰此明五老帝君各受赤書符命在天則主領五方神仙在地則主領五嶽神鬼在人則主領五藏精神各有所主故無錯越告命次第具在眞文也青天魔王巴元醜伯東曰青天魔王姓斌諱齒成巴青天魔王與元始同生綂御九天醜伯亦三界之魔王也主領三界之中學人識其音則享福不識其音則被殃若得魔王保舉者身入三清也幽棲曰事連青帝上四言位號中二言諱下二言字其餘並同此義也赤天魔王負天擔石東曰赤天魔王姓弗諱由肅勢能掲天力能傾山飛空三界中遏人功德制伏衆魔也幽棲曰事連赤帝白帝魔王反山六目東曰白天魔王姓赤諱張市一頭六目能破山反石總綂六天鬼神斷人生生之路也幽棲曰事連白帝黒天魔王監醜朗馥東曰黒天魔王姓徐諱直事爲性凶醜而好殺害也幽棲曰事連黒帝黄天魔王横天擔力東曰黄天魔王姓天門諱波狂大魔王身衣玄文之衣頭戴横天之冠腰佩龍頭之劒常乘羽輪之車飛行雲中常作謡歌有三千言亂敗後學太上故書其曲在消魔寳經也幽棲曰事連黄帝其位號名字並同青帝主保護學人驅除魔試者也少微曰次明魔鬼亂人受命誅戮宗君曰天魔身者皆是前生持戒布施勇猛精進不免嫉妬勝己故斯報也五帝大魔萬神之宗東曰青帝魔王姓迫落諱萬刑赤帝魔王姓赭諱上栢白帝魔王姓鄧諱吁兒黒帝魔王姓梟諱公孫黄帝魔王姓宛躬諱産生各領官屬三萬八千人與六天同生也主領三界功等諸天爲鬼神之宗也幽棲曰此五方天帝五天大魔並綂領五天五方一切神祇故云宗也飛行鼓從總領鬼兵玄英曰此明五帝大魔常部領鬼兵飛行大虚之中以音聲鼓吹之從故云飛行鼓從也麾幢鼓節遊觀太空東曰導從鬼神麾幢曲蓋五色玄黄飛行雲中遊看十方周遊太空也幽棲曰飛天靈魔乘虚駕浮前導後從綂押鬼兵持幢執節鳴鼓把麾出入眞境遊歷太空少微曰玉清隱書云五帝魔王各帯虎頭鞶囊領官屬三萬八千人與天同生常惱亂學人不欲成道又自矜與諸天上帝齊其聖功後因龍漢開圖乃服於元始之化故歩虚頌云魔王敬受事故能朝諸天也玄英曰夫大聖遊行皆列威儀服飾麾者以指撝爲義注羽毛於竿首狀似旌旗之𩔖也王者執之以誓衆誓者宣勑約之詞如今之人君處分事是也幢者旗韣之𩔖也鼓節者擊鼓流吹以爲音樂節奏也此明五天魔王各自部領萬衆建立麾幢鼓節遊觀太虚之中騎從駢闐恣意所欲自號赫奕諸天齊功東曰導從赫奕威儀具足諸天敵勢故曰齊功玄英曰旣能備此威儀又自稱爲赫奕侍以尊貴上天度人嚴攝北酆東曰魔王在三界綂乘玄都常檢校北酆鬼府宿對死魂以上言玄都保應得度者幽棲曰旣前導後從即麾幢鼓節故自號赫奕也復舉學度者以制攝精魔故與諸天齊功也赫奕者貴盛貌也少微曰天尊在始青天度人時乃攝召北帝使宣告魔王斬馘鬼神勿行災害毎劫度人法令如此神公受命普掃不祥東曰神公者大羅天丞相也字廓奕在始陽之臺主品人神得度大千世界昇无量之堂不祥不善也爾時受天尊符命掃蕩萬魔之精不善之鬼拔三官之府度更生之賔定命籍於朱宫削死根於九祖受景福於眞人披幽夜於萬劫受更生於神公也幽棲曰神公即大羅之神公也受命即降五帝大魔之命也使防衞學者掃除不祥也八威吐毐猛馬四張東曰八威者龍麟虎豹師子丹蛇天馬猛獸吐毐四張也幽棲曰八威者八威之神龍也猛馬者即天靈之陸馬也神龍吐毐以攝祅氛陸馬奔張以逐邪魅也天丁前驅大帥仗旛東曰天丁五丁力士也大帥都督殺伐將軍也導從天兵節蓋仗旛威儀侍從左右前後誅除不祥翦滅鬼祅也幽棲曰天丁即天鄒甲卒也故導前以驅除大帥即大魔鬼帥故仗旛以辟斥也擲火萬里流鈴八衝東曰左右流金火鈴一擲萬里流光煥爛交錯八衝𠑽滿空虚之中消魔滅鬼也幽棲曰擲火流鈴者流金火鈴也擲之有聲聞乎太極光振千里故徹萬里以交煥達八方以衝擊則眞人常持之以制御魔精少微曰洞眞經曰火鈴有光而无質一擲萬里也敢有干試巨遏上眞東曰萬魔藏形百鬼豈敢當拒巨者拒也幽棲曰謂不遏上眞也持此經者則爲上眞也金鉞前戮巨天後刑東曰鉞者似斧也巨天者力士也則金鉞於前而斧戮巨天於後以刀刑金者亦鐵之總名或云以金飾鉞故云金鉞也又云天丁力士前誅後斬除滅鬼精者也少微曰若有鬼神敢行干觸自縱凶害塞我上眞則使彼天丁前誅後斬也屠割鬼爽風火無停東曰屠割破裂也爽魂也風火者風刀火山也破裂鬼魂於風刀火山也幽棲曰屠鬼之爽割魔之精其急如風其速如火故云風火無停千千截首萬萬翦形東曰首頭也形身也言其有罪鬼魂千千萬萬斬其頭首解剔身形也幽棲曰千千萬萬言其多也非即定數或斬其首或解其形以爾者夫有眞則有邪有善即有惡故邪能遏眞惡能喪善也魔无干犯鬼无妖精東曰百魔伏形萬妖喪精旣屠精割爽復截首翦形則何有能干豈敢更犯也幽棲曰用此威刑翦除鬼賊所以百魔伏匿羣妖喪精也二官北酆明檢鬼營東曰三官天地水三官也北酆北部剌姦也酆都九府之中有九部剌姦也又有九都使者本是龍漢後一劫九炁各生一獸以害惡民其劫旣開九獸改號爲九醜之鬼北帝上眞在酆都之上立九醜以輔三官數極九九八十一萬度天炁交九醜轉號爲九都使者常檢校三官九府之中善惡之魂不得隱匿也幽棲曰三官即六宫之三官也六宫在北酆之上三官綂萬鬼羣故令檢守營域不得干犯學仙者也不得容隱金馬驛呈東曰金馬金龍也檢校善惡驛馬飛馳以呈其事也幽棲曰有所容其隱匿即金馬驛來呈奏金馬者言堅勁如金剛之馬也故言金馬驛呈少微曰懼其威武明檢鬼營若有逃藏不敢容隱毎驛龍關奏急赴前呈者如世間驛馬有呈限也普告无窮萬神咸聽東曰普告天上地下一切神靈咸使聽伏幽棲曰天上天下无幽无冥有告遐邇莫不咸聽也三界五帝列言上清東曰神公受命之時普告三界五帝神王一切神靈解遣地獄之中惡對死魂並列言上清也幽棲曰三界即三界之魔王五帝即五帝與大魔並列言舉功保度學者上登上清之闕朝奏太上之前也少微曰神公耿介普告无窮五帝萬神咸來聽命魔軍已喪列奏上清玄英曰三界者此前色欲等天之界也元始无量度人上品妙經四注卷之二
