front:
  text: 元始無量度人上品妙經四注卷之三寒三
  hash: sha256:d0697d979669d27c15900ca5bddd31fad11bd2f968186b8fe0e38abe3e95fcc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0087_HFL_003-001a, image: hfl/0039/0039-005.png}
body:
  text: 齊嚴東唐薛幽棲李少微成玄英注宋陳景元集元洞玉曆東曰元元始也洞通也玉者玉字也曆記也元始結自然之精以成八角垂芒之文玄洞虛空光照四方二儀分判日月星宿於是列明衆聖所珍號為玉曆記天地之劫運推曆度數真人書記其事撰集成經故曰玉曆也少微曰元洞者元始天尊結元洞正真之氣為玉曆以紀功行注其九品仙階自九品仙階而遷九真至于九聖方出三界之外逍遙上清即與道合真永無淪墜矣龍漢延康東曰龍神也漢大也玉字始見出法度人示以神竒因名為之大福堂國長樂之舍蕩蕩大化號曰龍漢也延長也康安寧也龍漢運訖天書玉字隱其精光日月滅景天地冥然無所分别長寧久逺故號延康也幽棲曰元洞玉曆即天上空洞曆紀之名龍漢延康即杳杳冥冥億劫之號延康之劫在龍漢之前此並過去二劫也少微曰此章論劫運成壞也龜山玄籙曰元洞上皇氣也天尊結元洞之氣為玉曆之書其曆以龍漢劫為初劫開圖曰赤明劫終曰延康劫循環無窮終而復始延長也康安也劫終之後三界空壞萬物精爽長安在太虛故曰延康為壞劫之稱赤明是開圖之名二者交周是謂大劫故終際皆號延康中間開圖例曰赤明其餘開皇上皇小劫名也靈章云龍漢承延康界開號赤明開光天地復位此龍漢後延康赤明也玄英曰元者根元本始也洞者虛無空洞也玉是寶中之貴曆者以曆述為名此明元始天尊將此真文記録前代經曆劫劫運終之大數以其真文可貴曆數可憑寶而存之謂之玉曆眇眇億劫混沌之中東曰眇眇髙逺也億萬萬為億也劫者已解前章元始玉字淪於延康之中一淪億劫可謂塵沙之數者也混合也天地無分别混沌為一也幽棲曰言此二劫眇邈久逺莫知紀曆之數幽幽寥寥在於溟涬之中少微曰祖劫已來塵沙莫紀不可遍舉略以億劫明言見億劫數終皆成混沌萬物精爽在其中龍蹻經云三界劫壞混沌無形每劫重造三氣為宗上無復色下無復淵東曰色光青也淵深也積空成青積河成淵故天髙而青水深而淵人精而神故天有三光以垂明地有三河以納川人有三宫以舍神人得理則天地平寧仍值延康天無復色一時混然也幽棲曰夫每一劫運終則三光幽瞑天地世界混沌如初道歸本源萬物失一則上有何色下有何淵少微曰每至劫終上盡二十八天無復光色下終九壘三十六地無復泉源也風澤洞虛金剛乘天東曰風澤者元始梵風之氣也洞通也虛無也金真也剛強也風澤之氣強於真金故曰剛風包於九壘乃載九天通達虛無抗舉澄漢之精髙而洞浮懸而不落金剛真氣以乘於天致令空而懸立地係於金剛氣也幽棲曰風澤者道之氣也金剛者精之氣也道氣至柔則洞洽於虛精氣至剛則運成於天世劫自然天境常在但無光耳故猶呼為天也少微曰風澤第八壘氣也風澤之氣堅剛如金故曰金剛亦曰剛風劫盡之時能洞滿空虛承天不墜按九地內音素靈丹經地下深億萬里得潤澤地其氣黃又二十億萬里得色剛澤地其氣紫又二十億萬里得大風澤地其氣青又下無窮無極無邊無際洞淵綱維地其氣緑皆風梵綱維之故能擎持地輪懸而不落九壘各有四皇合三十六皇上應三十六天若學者不知天上內音則天帝不領兆名不知地下內音則土皇不奏兆籍終閉而不得仙也天上天下無幽無冥無形無影無極無窮東曰幽逺也冥近也天上天下無髙無下無逺無近不可區别皆冥然也形天地也影三光也極盡也窮終也天地無形日月無光極乎無盡窮乎無終幽棲曰在天之上無幽無冥不可測在天之下無影無形不可觀既在上下不知其窮極唯混成自然而獨立也溟涬大梵寥廓無光東曰溟涬長逺也大梵氣也寥廓空逺也元始淪於延康之中溟涬久逺寥廓空虛億劫無光也幽棲曰大梵者大道也言大道之氣玄冥而未分故云溟涬虛無之境汗漫而未朗故云無光也少微曰劫壞之時其狀如是言三界之上四民之下無有幽深冥逺空無形影曠無窮極唯有大梵之氣溟涬遼廓三景無光玄英曰溟涬者空虛不測之狀也寥者敻逺無窮也廓者空無邊際也此明三界之中無日月之光唯有大梵之氣溟涬寥敻洞滿太空之中故云寥廓無光也此上是前劫延康之際今劫龍漢之初二儀未有區分混沌空流梵氣次至赤明開運具列下文赤明開圖運度自然東曰赤者火也元始九鍊之氣也開啓也圖像也元始在於延康之中開啓赤明之運因禪黎世界與髙上大聖玉帝以火鍊真文瑩發光芒玉精流澳為洞陽之宫萬物立像號為赤明也幽棲曰是時赤書真文開圖籙之煥爛運隂陽之分度天因之以暉三光地因之以生萬物故知天地有成敗休廢非復此時草創開闢也於是四時遷謝萬化亭育不知所以故云自然也因此遂號赤明之劫少微曰自後明劫運將成也真文火鍊故號赤明度運數行自然之理也玄英曰此明劫運初開承龍漢之際列植宇宙致立三光赤明者即前玉曆真文也元始天尊以火鍊之真文明而色赤因號赤明用此真文開列天地運化乾坤三光運度有常各是自然之理非關造作之功也運度者運行也會數也赤書云劫運晝夜圓周三十日為一交十二交為一度三千三百度為小劫九千九百度為大劫又生神章云一度一年也元始安鎮敷落五篇東曰安立也鎮守也敷布也落置也五篇真文赤書玉字也幽棲曰敷施張也落廣廓也於是元始以赤書玉字敷張真文安天之根鎮地之源敷落五方之色位陶鑄隂陽之器物敷張元化靡有不備赤書玉字八威龍文東曰真文既受火錬號曰赤書也八威即八威玉策也龍文召龍之文也元始安立五嶽布置五篇真文鎮於五方五帝鎮守制神召龍以禳劫運之期也幽棲曰赤書即五篇真文也玉字即自然內音也八威龍文真符之類傳授於上真保制劫運使天長存東曰元始安鎮五嶽建天地之根以却衆災制神召龍以申劫運天髙而不傾地重而不淪始終安立故得長存也幽棲曰言此赤書真符龍文等並能制御劫運消劫否終使天地長久而無傾覆少微曰赤書五篇真文也玉字八會靈書八威玉策文也驅役八種之威因以為稱龍文召龍文也元始行道之初以赤書安鎮五方玉字布三十六天玉策以威制萬神龍文以召龍保劫所以天得長存不有傾覆也梵氣彌羅萬範開張東曰梵者大梵之氣也彌羅者包羅也範形也元始抗大梵之氣開赤明之運天地萬物一時受形也幽棲曰元始即安鎮二像敷落五篇又以玉字龍文保制劫運則布真梵之氣於十方開玄化之文於宇宙故天下品類觸物齊興少微曰梵氣彌布陶鑄萬形曲直方圓各有模範也元綱流演三十二天東曰元綱者元氣之綱紀也敷演三十二天中也幽棲曰元者星也綱者星綱也既二儀開朗三景齊明故星羅流轉上照三十二天日月遞明下朗百億世界少微曰元大也演布也梵氣為萬物大綱流布三十二境輪轉無色周回十方東曰元色者無形也十方者八方并上下合為十方也大梵之氣無所不布也幽棲曰輪光於三界周照於十方則無幽不明是物皆燭無色者即三界之上界者也旋斗歷箕玄英曰旋斗者旋是回轉之名斗箕是二十八宿之中星名也斗星在北方東上歷箕者歷猶履也箕星在東方北上故注云箕斗二星夾東北角也此明大梵之氣流行起自東北角扶搖臺其氣羊角而上從東左行向南先歷箕星中過故云歷箕從南向西從西向北經於賈奕皇曽二天中過又却東回經於斗星中過入扶搖臺中是梵氣周天一匝生長萬物成一歲之功故云旋斗歷箕注云賈奕天在角左者角星位在東方賈奕天在西方梵氣左行從東向西入賈奕賈奕是三十二天之極位故曰在角之左也皇曽處其右者皇曽是三十二天之初位在箕星之右故為始箕之分野始箕者梵氣始於箕星而行故云始箕旋斗歷箕義略如是回度五常東曰斗北斗也箕箕宿也回度運導也五常五行也以自然之氣運導五行也幽棲曰轉七辰於北方隨日時以杓建周歷箕畢之運經緯五常之度五常者五星也箕畢二十八宿之數也玄英曰明此梵氣流行繚繞三十二天回運五常之氣故得四時順序變化生成五常者五行金木水火土是也若歷而言之則木屬東方火南方土位在中宫金西方水位北方也此五行者生成萬物皆因梵氣之功為天地常行之道故云回度五常也三十五分總氣上元東曰三十五分者三十五天也分者分野也總統也氣者元始之氣也上元者元始開明無上之道總統羣仙包羅天地剖判隂陽運導五行諸天授位三象既分九層之臺煥然而明處乎玉京之山煥乎玄都之上飛天常散百和之香流五雲之華以灌飛天真人臺上有太真玉郎一日三回十絶之幡一周則諸天上朝繞臺三匝誦詠洞章三十二天位在四方方有八天合三十二天也三天羅其上大羅之上並皆空虛有自然五霞其色蒼黃號曰黃天黃天之上其色青蒼號曰蒼天蒼天之上其處玄空積空成青號曰青天凡有三十五天各有分野並總係元始之氣無上之道也故曰總氣上元也論三十五者三十五星也幽棲曰三十五分者即都明前日月五星二十八宿共為三十五分且二十八宿宿有數星日月二曜又非星類則不可呼為三十五星故謂之三十五分耳分者位也俱總受上元之氣上元即披稟之元也少微曰箕斗二星夾東北角賈奕天在角左為周斗之分野皇曽天處角右為始箕之分野梵氣先起於東北扶搖臺羊角而上左回向右歷箕而度旋斗而終繚繞三十二天回運五常之氣然後四時變化品物流形太極隱訣云香煙自然生玄階興扶搖言梵氣出扶搖之臺如香煙之狀也玄英曰三十五分者三十五天分界也三界有三十八天兼北斗七星星主一天是為三十五天也北斗以陽明隂精丹元北極此四星主種民四天以玄冥真人天關此三星主最上三天總為三十五天也最上三天曰玉清上清太清天是也一云以三台三星主上三天并前三十二天是為三十五天之分也總氣上元者上元即太上玉清玄都也明梵氣流行旋斗歷箕遍滿三十五天也其氣升上上清天中總入玄都之境故云總氣上元也八景冥合氣入玄玄東曰八景八色也冥合者洞體道氣也玄玄者深奧也太上道君乘八景之玉輿策三素之飛雲升玄都之上六合之臺開元始之玄奧演大法以度人至氣玄妙體道自然幽棲曰總而言之呼為八景謂二十八宿列於四方方有七星則四方之宿與日月五星北斗合為八景光氣自然冥合冥合光氣俱入玄玄此之玄玄即上元之玄既先稟上元之氣還復氣入玄玄則上下之氣相注故光津之曜不息也少微曰若人得道則三部八景之神冥然混合共舉兆身入重天之上玄玄者天天也玄英曰八景者景光也上元總氣為一景七曜合為八景七曜者日月五星是也冥合者明此八物光景冥然相合通照萬天故云冥合又解八景者八天光景之色氣入玄玄者即前大梵之氣周回旋輪升入太上天中故云氣入玄玄也玄玄者髙上無窮無極之貌也若世人得道則八景之神共舉兆身入重天之上重天者諸天上界之天即上清玄都之境也玄中太皇上帝髙真東曰太皇號易邈從龍漢而來至赤明而出在始開之中空虛之內遊乎遼遼之境處乎寂寂之庭神景玉秀為萬道之標也幽棲曰前云玄玄即玄中之上玄也此云玄中即二空三境之域也二空即太空空洞也三境者即玉清上清太極也太皇在玉清上帝在上清髙真在太極也凡稱皇者即天尊之號與元始之齊位即上皇髙皇虛皇玉皇之例是也上帝太微帝君三十六天帝最尊者髙真即中央黃老太極最尊之稱也泛景太霞嘯詠洞章東曰泛景者遊翔也太霞氣也飛玄之氣而誦詠空洞之經以和自然之氣拔度學道之人也幽棲曰泛者浮也景者身也言此三尊所行縱身於雲中泛景於霄漢發口則吟洞章之句詠髙上之篇洞章即大洞之章髙上篇亦洞章之篇名也少微曰太皇虛皇道君也上帝金闕上帝也髙真第三品真人上清天有虛無景之山山有太霞之氣虛皇上帝與此髙真泛八景玉輿飛太霞之上嘯詠空洞以棲學人也金真朗郁流響雲營東曰金真者自然之章梵天神人飛遊太極之上玄歌無量之音激爽靈風之氣拂揚洞章之曲太和玉女於華都之門而和神人之歌流響慶雲之宫故曰雲營也幽棲曰金真者即金真玉光也此是天尊之身光耳郁者光耀也營者凝聚也既泛景大霞之中故金真煥爛吟詠洞章之句雲合煙凝者也少微曰金真金簡真文也昔真文始現結於玄空瑩發光芒刻書金簡故明朗郁郁然也雲營雲宫也百玉容堂在玄都龍山之上言上帝髙吟金簡清音響亮流入雲宫玄英曰金真者刻金紀録真文朗者真文書字明朗也郁者明盛之貌也雲營者玄都之內百玉置立容堂之名也其堂在龍丘山之上流響者將明衆聖嘯詠響徹雲營宫中故云流響雲營也玉音攝氣靈風聚煙東曰玉音者玉光之章也飛天神人常乘碧霞之輦飛遊玉隆之天一日三時引天中大聖上朝匕寶之宫天王稱慶鳴玉扣鐘侍晨一嘯而靈風聚煙靈風既鼓音成洞章也幽棲曰玉音即太皇髙真嘯詠之音也言太皇嘯詠則玉音冠霄以攝氣靈風生虛以聚煙者也紫虛鬱秀輔翼萬仙東曰紫虛者紫微宫也鬱勃也秀出也紫微之館鬱勃出乎玉清之上中有沙籣之宫宫有新得度者受靈寶之人巨億萬衆功德未備停散其中劫運一交陀丘之衆計功之重而得升度朱陵之宫受福而升仙然後成至真也幽棲曰玉清中元號為紫清故亦呼為紫虛言此三尊雖各為一景之宗源並是玉清之品位但預是道君皆位入玉清且紫虛之宫自然鬱秀加以萬仙之曄翼故增衆聖之曦暉也少微曰紫虛紫微宫别名沙蘭宫宫館壯麗鬱然秀茂宫中有陀丘之衆巨億萬人皆新度者時運未舉且停散其中須運交則三部八景二十四真輔佐翼助升度南宫而受其仙者也千和萬合自然成真東曰和解也合聚也真人積學巳來經無數劫解形易體捨身受身隨運輪轉經粗入妙玉眸沃錬然後成真也幽棲曰言修誦之人若千真和神萬道合氣真與神混體道與氣合形自然而成真也少微曰夫升度者皆立三千善功萬行圓備然後三官校録升度南宫太和哺飴玉膏冶錬經歷和合然後成真也真中有神長生大君東曰長生宫中有長生之君也幽棲曰既與真合體即體中有真即真中有神即此大君及後諸神是也大君居臍下命門宫亦號為明堂之宫也少微曰此説度人本神也真中南真宫中也長生大君即度命君也字曰吁貟主鎮朽骸也無英公子白元尊神東曰左無英諱公子右白元諱洞陽號曰尊神幽棲曰無英白元二神名也共居洞房宫宫在眉間直入二寸無英亦時在肝一名公子白元亦時在肺尊神即重指白元非别號也太一司命桃康合延東曰太一諱務猶收司命上帝司命也諱理明初桃康命門中神也幽棲曰太一亦大君也大君為身中百靈之尊萬氣之主故稱太一亦名大君也司命者主生命也復謂司命桃康合延二神諱字與大君同共望其二君諱字乃交互而言非的正也少微曰太一諱務猷收司命字玄度卿桃君諱回孩康君諱精延玄英曰太一總領羣司為衆神之主司命等真官皆南上度人職司之位也執符把籙保命生根東曰公子執符司命把籙太一制魔以洞章舉度於長生之宫也幽棲曰大君常執八符以保人之命生人之根也玄英曰此明度人成道之時令公子執元始度人之符司命之官把度人名之籍太主制約羣魔共舉學人保命生根上遊上清出入華房東曰上清紫微宫也紫微在玉清之上華房者太極宫宫有青華門裏有曲房也幽棲曰此諸神本是上清太微宫中之神也分釋降氣下入人身之中故時復上遊上清出入華房即太微房也八冥之內細微之中東曰八冥八極也細微毫芥也遊於八極之外毫芥之內者也幽棲曰八冥八極之表冥昧不測故云八冥也言此諸神則大無不處細無不入或舒布於八冥之中或貫穿於一毫之末在人為道在物為生道性之氣也下鎮人身泥丸絳宫東曰泥丸腦也絳宫心也天尊在上清宫中號曰太一君下在人身為泥丸君開經藴呪曰天尊雖逺妙近緣泥丸君此之謂也幽棲曰明下鎮人身之中或在泥丸或處絳宫泥丸從眉間却入三寸絳宫即心也中理五氣混合百神東曰五氣者五藏氣也百神者百關也混和也調理百關和合神氣也少微曰華房玉清三華房也八冥八極也細微毫芒也泥丸腦也絳宫心也此等真神以太一為主則遊行三清出入三華之房周於八極之內遍於毫芒之中下鎮人身則太一在腦總衆神也司命處心納生元也無英在肝制三魂也白元在肺拘七魄也桃君住臍保精根也延康居腎守命門也中在空洞則理於氣和合百神表瑞靈文隨劫度人易曰神無方易無體隂陽不測之謂神也然則神無不在所在皆無不可以識智知不可以有無定或以為人身之內各有此神爰披衆經其理非一也按天老祕讖曰神有尊卑太一為貴上鎮三清下遊九宫洞神經曰太一名務猷收字歸會昌主諸天地其神最尊形黑上而赤下頭戴通天之冠縱目視也久久存之長生不死大洞玉經曰司命奉帝書號為玄度卿其形白上而青下面圓正等洞神三元記曰三元君者太素三元君也一女子耳首有頽雲三角髻餘髮散垂至腰著扶晨冠服紫浮雲錦帔腰九色龍錦羽裙帶流金火鈴虎符書坐中膝下出丹緑青三氣三元君生三素元君長女紫素元君生無英中女黃素元君生黃老小女白素元君生白元黃老白元無英號三元帝君帝君母號三素元君即三元君也朝禮精苦積年三元降房三素玉女先來降矣學道不識三元修行無效此三元皆是自然之神與元始同出萬人共感真氣遂各有其神也十轉回靈萬氣齊仙東曰萬氣者萬神也泥丸君説經十遍萬神俱仙三宫六府一切神靈各率所部億乘萬騎鬱然變化導從威儀乘雲騎龍共舉人身百寮宰官一切神明同得升仙也幽棲曰十轉者天關十轉也言一人得道天關為之十轉則回百靈以成性變萬氣以俱仙少微曰總彼七神慈憐兆庶十方輪轉回度生靈欲使萬氣流行齊成仙道也仙道貴生無量度人東曰無量者大聖衆像之尊神也天中有無量大聖衆皆統十方飛天並受其品量而得升遷也度人者飛天神也常以雞鳴之始上登玉臺之上仙堂之中採五方雲芽之精而仰咽日月三辰之光常簡學仙之人生死録籍開度九幽之魂升入法輪之門學者知此法能䇿神風以迅煙上升騫林之叢七祖出長夜之府而上登更生之宫也少微曰仙道所貴唯在於生故無量度人不可勝算也上開八門飛天法輪罪福禁誡宿命因緣東曰八門者天開八方法輪之門也中有罪福之場也太上道君開於八門以度學者生死之魂也故曰法輪幽棲曰既得生度即魔王上開八方法輪之門以度學者則自然升舉故得無拘於天門也少微曰八方罪福之門飛天人所司故曰飛天法輪道君八門問罪福飛天人對宿命説因緣事迹根由具在法輪經中也普受開度死魂生身東曰法輪之門罪福之場各有禁戒罪福所由具在法輪經中太上道君開大慈之化拔地獄宿對之魂責其罪目然後原赦得入法輪之門駕乘八景之輿升乎玉清之中上朝紫微之宫位及聖衆之賔謂死魂生身也幽棲曰七祖生我一身興此五業今既一身受度五業自然而亡七祖則鍊化更生五業則無根自落故云普受開度仰荷解脫之恩也身得受生上聞諸天東曰聞開也身得受生上開諸天也諸天之上各有生門東曰八門之中各有受生之門也幽棲曰既生身受度復死魂受生則三界五帝上奉諸天諸天之上亦著生録故云各有生門也少微曰死魂受生皆奏諸天諸天之上各有受生之門然後三官校録配入生處中有空洞謡歌之章魔王靈篇辭參髙真東曰空洞者三界也三界皆空魔王魔羅也常在三界之中謡歌雜曲辭參靈篇惑亂人心靈童轉八門之關衆真上朝郁馥一唱魔王束身人能誦靈音則名書於紫微宫法輪列籍於司命攬覺度魂於更生之宮也幽棲曰魔王既保舉諸天之上故有謡歌於諸天之中辭列髙真理契空洞誦之仙舉故曰靈篇也少微曰三界之中空洞之上魔王伏化奏唱謡歌靈篇善辭參合真聖也第一欲界飛空之音東曰欲界自黃曽天至上明七曜摩夷六天欲界之分也中有魔王字郁默作飛空之歌幽棲曰第一欲界者下界也謂居此世之上故云第一欲者染著也界者境界也欲界有六天言此天之人有形有欲觸物染著故云欲界魔王於此界空玄之中謡歌此章故云飛空之音也少微曰道教經曰凡人口業淨有十善功以上生欲界之天人道眇眇仙道莽莽東曰眇眇羣碎也莾莾暗昧也人道在羣小之中難可成也仙道莾莾昧昧難可曉了非可見也故云莽莽也幽棲曰目少曰眇逺而可見混漫曰莾杳然莫測言人道非逺力之而可致仙道冥昧不動而易沮鬼道樂兮當人生門東曰樂者歡樂也生門者三界命門也鬼道在三界之內導從鬼兵遏人生命枉暴殺人以為歡樂幽棲曰夫鬼道者縱心逐欲適性隨世故云樂也此即動之死地日喪其生生死門對故曰當人生門也少微曰鬼道以殺害為樂羣行凶暴常遏人生門生門三界受生之門也天道責生鬼道貴終東曰貴好也天道好生鬼道好殺也幽棲曰神仙之道在於長生久視湛然長存邪鬼之道務欲人歸太隂悉在終滅也仙道常自吉鬼道常自凶東曰好生者吉好殺者凶幽棲曰仙道既生故吉祥自兆鬼道既死故凶禍自應少微曰人道三界以下也仙道三清以上也鬼道酆都六天也髙上清靈爽悲歌朗太空東曰髙上者天王也名阿濫常乘景霄之輪遊觀九層之阿處玉樓之上明洞章以召魔上為仙真之館下為鬼神之家誦詠靈章悲歌朗徹響應太空也幽棲曰雖復髙真上聖爽氣清靈猶故哀愍悲歌朗徹空洞即五苦之頌是也玄英曰前明勸人成道此明讃美悲歌普度無窮發此言也明髙上玉皇愍傷三界常於三清之上詠此悲歌歌聲朗徹太空慈憐兆庶故曰悲歌朗太空靈爽者是玉皇精靈爽利之氣也唯願仙道成不欲人道窮東曰天王上雲樓之上吟詠無量之章看見下世學士不得度三界之難故誦之以制魔靈神魔即應響而束身羣鬼則詣座而伏形以度學者之身成其至真之道幽棲曰窮極也人道之窮極貴者也若仙道既成則衆妙斯會五濁之苦自滅三清之樂未央若人道雖極當時之榮萬樂斯須一苦永蔽少微曰髙上玉皇清明靈爽悲歌朗徹聲滿太空唯願仙道早成不欲人之窮苦北都泉曲府中有萬鬼羣東曰北都之山是六天神魔所治中有泉曲之府萬鬼羣衆在其中六天鬼者並是百魔凶暴醜惡之鬼常欲殺人也幽棲曰北都者在北方溟海之中北玄太帝之都也中有泉曲之府即九幽長夜之府也既是鬼之大都故有萬鬼羣也乃總言其萬豈唯萬哉但知據人便知鬼也但欲遏人算斷截人命門東曰六天魔鬼常欲遏截命算斷人生門欲令人死也幽棲曰夫鬼之為理常刻人算壽欲人早終截人生根斷人命門故上云鬼道貴終當人生門也阿人歌洞章以攝北羅酆東曰阿人者魔王自共語也誦詠詠洞章以召北酆之魔鬼不得妄為殺害有犯即斬以佐天治也幽棲曰阿者何也何人能歌此空洞之章攝御羅酆之鬼則無遏算之慮自逺天傷之患羅酆北都之山名也東送妖魔精斬馘六鬼峯東曰束縛也馘滅六天羣魔也峯者魔之總名也故祝六天魔鬼云天蓬天蓬九元殺童此之謂也魔王歌此曲掃滅衆魔精也幽棲曰束者拘録也送者斥逐也斬者截首也馘者割耳也若能歌誦此章則妖魔可以拘録可以斥逐可以截首割耳矣六鬼峯者即酆山有六峯峯各一宫既有六宫故云六鬼峯一宫周回千里也少微曰阿人魔王自稱也斷首曰斬截耳曰馘六鬼者六天鬼賊也鋒言其先鋒者鋒鋭也魔王言我受符命常歌洞章制攝酆都束送魔鬼有為祅害則刑戮絶之也玄英曰馘謂截其左耳也殺鬼衆多每於一身但割取其左耳獻上魔王明其殺數多少左耳屬陽故取之也諸天氣蕩蕩我道日興隆東曰蕩蕩清明也興隆者魔王謡歌飛空之中蕩除鬼氣以成其功故曰日興隆也幽棲曰既束勒妖魔之精斬馘六峯之鬼故得諸天真氣坦蕩而我道正化興弘也少微曰持此威刑斬馘魔鬼則六天邪氣蕩除三天正法興盛也第二色界魔王之章東曰色界自虛無越衡天至太安皇崖天合十二天是色界之分也魔王諱摩字羅也幽棲曰第二色界者中界也謂欲界之上故云第二也色者形質也界者境域也色界有十八天言此天之人有形無欲故云色界魔王既統管此界故因立此章也少微曰自虛元越衡天至無極曇誓天凡一十八天為色界道教經曰身業淨有三百善功得生色界魔王諱摩羅落落髙張明氣四騫東曰落落髙逺也明氣者清明也天氣髙逺清而明也故曰四騫也幽棲曰落落者廓落也騫者開也言十方諸天則廓落而高張明光之氣而四騫也少微曰騫回上也落落我界髙逺開張梵氣光明四方回上梵行諸天周回十方東曰梵者大梵之氣也十方者十方飛天神人也乘大梵之氣飛空三界之中遊乎十方也少微曰大梵之氣行匝諸天則十方神仙周回十過故曰周回十方如此神仙其數無量由我保度得成大仙故曰皆由我身也我有洞章萬遍成仙即此歌曲也無量大神皆由我身東曰無量者十方無量大神也魔五與諸天俱生學得道者皆由魔王保舉而得成真人也故曰皆由我身也幽棲曰梵行者至真之行也我者魔王自稱也言三十二天梵行真人至于十方無量大神莫不皆由我之保舉而得居于此天也我有洞章萬遍成仙東曰洞章者魔王歌曲也學士若能誦之萬遍魔王即保舉徑升上仙仙道貴度鬼道相連東曰仙道欲令人升度鬼道欲令人死亡更相連逮共入惡道也幽棲曰言我有此空洞之章誦詠萬遍皆得升仙夫仙道貴形神俱度鬼道貴生死相連升度則祖考亦度相連則子孫亦連也天地眇莽穢氣氛氛東曰眇莽者暗昧也穢惡也氛亂也天地髙逺無所不容真者處上濁者處下魔精惡氣滿於空中也幽棲曰天髙無涯地廣無際常穢氣氛合彌貫太虛也三界樂兮過之長存東曰三界者欲界色界無色界此非至樂若得過三界之上乃得仙道與劫輪轉更不生死故得長存也幽棲曰言三界之人若迷樂住樂則樂盡而渝墮若悟樂之非樂則超出而長存也身度我界體入自然幽棲曰若悟樂之非樂則不住樂而修進故得身度三界之難體入自然之境少微曰三界雖樂福盡則傾壽等塵沙終當死壞也此時樂兮薄由我恩東曰得入無色界之中至此歡樂我恩者魔王自稱我也爾皆由我保舉而得入仙品也故言薄由我恩也幽棲曰若入自然之境則自然之樂長存真樂三界之樂輪轉妄樂此之一樂則名同理殊人乖境異皆由魔王保舉而致此真樂之域故云薄由我恩少微曰過得三界始可為樂故曰此時樂兮由我恩保度得入三清故曰薄由我恩也龍漢蕩蕩何能别真東曰龍漢之年玉字始出大福堂國日月始明元始撰集玉文出法度人其國風雅非可稱名人民始治禮樂亦興人壽三萬六千歲蕩蕩大化劫運既終經於延康一淪億劫眇莽久逺的而不虛自非通玄究微莫能識也幽棲曰既錬質成仙修凡得聖出苦入樂去死登生故知道之靈化妙用致此當龍漢之際混沌未分天既未立空虛蕩蕩復何分别其真少微曰龍漢初劫人人淳朴同焉自得不知所求雖蕩蕩而平夷無能别得真偽我界多有試難故真偽可得而分也我界難度故作洞文東曰魔王言我從龍漢巳來功德至重而未得仙末學道淺求度我界實亦是難故歌此曲以勸學者令識真也幽棲曰言此界之難超非洞章之莫度故魔王津濟而立此文既荷舉保之恩復賴引援之德也少微曰我界羣魔多諸幻惑為此難度故作洞文變化飛空以試爾身東曰魔王在空虛之中飛行謡歌以試末學之心正與不正也幽棲曰猶恐趣道之不篤秉操之不堅故作變試於空中觀履水火而無惑少微曰飛行變化騁現神通試爾身心令失正道成敗懈退度者幾人東曰學士猶豫之心不固一至到者少不别真偽羣邪所惑致生懈怠至得度者萬無有一也幽棲曰既履水火之難則有成敗之流超然獨濟者寡渝變退落者衆度無一人笑爾不度故為歌音東曰爾汝也笑汝徒有希道之心而無得道之實雖復億劫輪轉不滅心不冥一終不得度也幽棲曰其成敗退者復嗟哂愍之故制此歌章欲使普令超度也第三無色界魔王歌曰東曰從顯定極風天至秀樂禁上天十天為無色界分也從無上常融天至太極平育賈奕天四天無色界上也幽棲曰第三無色界者謂在色界之上故云第三無色者無形質也界者域也無色界有四天言此天之人形欲俱空故云無色魔王歌者即此界魔王之謡歌也少微曰道教經曰心業淨有六百善功生無色界四天此界魔王諱韶也三界之上眇眇大羅東曰眇眇者髙逺也大羅者大羅之天也在三界之上也幽棲曰言三界之上即圓羅之外雖即未至太無亦通是大羅之域也少微曰眇眇髙逺也三界之上猶有四梵三清然後至於大羅今言三界之上有大羅者魔王作歌從省文也上無色根雲層峩峩東曰層者重疊也峩峩者髙峻也大羅之天不參色界在衆天之上結雲氣而成山上有九層雲樓髙而峩峩也幽棲曰此大羅之中都有五境上無躓閡之色下無固著之根皆妙氣之化成若景雲之沓煥此乃無狀之狀恍愡難名故云若存若亡也少微曰大羅之境結雲成山層臺九重峩峩髙峻瓊林空峙無根而生玄英曰此明大羅天上真空境界山林城宇宫殿臺榭皆結自然妙氣而為之非因造作肉眼不見謂之無色浮空而立謂之無根唯有元始浩劫之家東曰元始者天尊也浩劫者浩浩無數也元始之道經無數之劫常居大羅之天也幽棲曰此五境之宫闕皆元始之所居元始則元始無終既湛然常存故云浩劫之家也非五境之中盡皆元始謂每境之主以元始為尊少微曰元始天尊家住其境浩浩蕩蕩劫數難知部制我界統承玄都東曰部制者言大羅之天天尊所治並大聖在其上上有玄都之山七寶之臺臺有三寶神經大聖一日三時上朝七寶之臺旋行誦詠以制萬魔也幽棲曰元始非唯一境之道主亦制三界之魔王又總玄都敷弘萬化玄都玉京大羅之天者也有過我界身入玉虛東曰我界無色界也即體入玉虛之境無色既為上界即與玉虛鄰次玉虛者玉虛之氣也得度無色之上身入紫極之宫玉虛上帝治在其中也紫極者太極之别名也幽棲曰玉虛即玄都玉京也少微曰元始部制我界統承玄都紫微有過我界身入玉虛得過我無色界也既過色界四天即入玉虛萬氣上元三部八景皆結玉虛之氣為人也我位上王匡御衆魔東曰上王魔王之主也字韶自言我位上王制御衆魔故曰上王也幽棲曰王者即衆魔之上王也故言匡御衆魔匡正也御制也少微曰此界魔王最居上位下統三界制理羣魔空中萬變穢氣紛葩東曰紛亂也葩華也三界並空天魔鬼神變化紛亂華麗幻惑學者之心故曰紛葩也幽棲曰空中萬變謂試學者故云變化飛空以試爾身紛葩者亦氛氛也言世間俗境常穢氣氛氛衝隘空虛填塞宇宙也保真者少迷惑者多東曰保固也迷惑邪亂也固真者少邪亂者多幽棲曰痛乎世人保守真者鮮矣迷惑不悟者多況乎天下皆迷也仙道難固鬼道易邪東曰仙道無形故難守鬼道多欲故易邪也經曰不見可欲使心不亂此之謂也幽棲曰學仙之道則正性難固鬼道不學俗心已邪隨風順流靡靡而去故云鬼道易邪也人道者心諒不由他東曰人道廢本於心諒已度情而不由傍人也幽棲曰夫人道之理在於方寸或悟道修真或迷邪入鬼皆由自己之心肺信不由於他人諒信也仙道貴實人道貴華東曰仙道應於自然去浮華取至實人道貴榮華與仙道反也幽棲曰夫修仙之道道貴於真實行人之道道貴於浮華故經曰居其實不居其華爾不樂仙道三界那得過東曰爾汝也汝不專一那得度三界也幽棲曰言汝世人若不學仙道飛登五境即三界之難無由得過言出越其界非過止其所也其欲轉五道我當復奈何東曰五道者五苦之場也奈何悲痛之辭也魔王在三界而見學者身不得度為邪精所敗不能正見淪於惡道喪失前功方復經於五道之中諸惡備受甚可悲傷故深發此歎者也幽棲曰若不超越三界則自然流轉五道既自爾之身所致而我爭奈爾之何故云人道者心諒不由他五道之義以明於上也少微曰不樂三天輪轉五道貴華棄實吾奈之何也此三界之上飛空之中魔王歌音音參洞章東曰謂三界之上魔王於空中讃誦靈文還在三界之內參雜故云音參洞章也幽棲曰言魔王常在三界之上虛空之中而歌此章傷嗟世人痛歎之甚其音意參合乃逺符大洞魔王者是魔之王非王是魔故身為至靈辭參大洞也誦之百遍名度南宫誦之千遍魔王保迎萬遍道備飛升太空過度三界位登仙公幽棲曰言誦之百遍者乃專是此魔王之章非全經也百遍即名籍升度南上朱宫千遍即魔王保護出入送迎萬遍之道既備即駕龍升乎太清飛登太極遊行太空即身超三界之難位登仙公之格今人所有讀誦萬遍而不得依此旨者或善惡齊行功過相半或口誦心馳乖儀失法此乃更招墮墜何有望於升騰若心與經通行與經合唯善為一杜絶諸緣此即逮至數千便有髣佛亦奚必俟於萬遍之後升於太空也玄英曰仙公者太上髙真之位也若得飛度三界先到種人四天其上次有三清乃是仙公之位今言飛度三界位登仙公者文中略也有聞靈音魔王敬形玄英曰有聞靈音者謂聞靈寶本章也道君歎美三界魔王自作洞玄之歌人能誦持尚得成真入道況有聞我靈寶本章之人若能誦持悉得三界魔王敬其形體故云魔王敬形也勑制地祇少微曰太上勑之也博物志曰地祇位在崑崙山下也侍衛送迎幽棲曰儻有聞此靈章之音句即魔王勑勒土地祇靈居家則侍衛出入則送迎拔出地戶五苦八難七祖升遷永離鬼官幽棲曰拔七祖之升仙超八難之鬼謫永出玄夜之河長辭北府之官三塗五苦共為八難已注於前也魂度朱陵受鍊更生是謂無量普度無窮幽棲曰七祖既得升遷皆入南宫受鍊鍊化既畢遂得更生可謂普度無邊廣濟無量朱陵即南上朱陵宫也有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁幽棲曰若有能寶祕尊重此文則諸天帝衆聖尊神共所欽敬若輕漏泄慢則身謝三官殃及七祖經既終畢故重有戒言此二章也道言此二章並是諸天上帝及至靈魔王隱祕之音東曰道言者道君自序也二章者一是元始洞玄章二是元洞玉曆章名為二章也諸天大神上帝魔王名諱隱奧故云隱祕之旨也幽棲曰復此後每章皆稱道言者亦是道君之言也與前序同此二章本經即元始所説前序後述復太上所加前章有三十二天帝之隱諱後章有三界魔王之祕音皆是大梵之言非世上常辭幽棲曰既元始所説太上所敷皆諸天祕章靈魔隱韶固冝是大梵之至理豈世上尋常之辭也言無韶麗曲無華宛故謂玄奧難可尋詳幽棲曰既非世上常辭故無韶麗天中奧旨故無華宛自非真人通玄究微莫能詳察也言者辭説曲者章句也少微曰玄深也奧隱也此二章天名帝諱及魔王名稱皆言無音韻美麗曲無華豔宛約有此深隱所以難詳上天所寶祕於玄都紫微上宫幽棲曰既諸天上聖共所崇重故祕於言都玉京之上太極玉清上清三境各有紫微之宫也依玄科四萬劫一傳東曰上天者即是上境諸天也明此經乃是上境諸天聖人所寶重祕在玄都紫微宫中依玄科四萬劫一傳也玄者天也此是上天之期限人間則四十年一傳故稱玄科也又云學道受經四十年得傳一人延壽者四百年得地仙四千年得天仙四萬年得無上至真之道全言四萬劫幽棲曰既云萬劫即如昨夜此是上天道之期也千春如今朝則四萬劫一傳亦非久逺此乃天真之格故云依玄科却不説至人傳授之期限也若有至人齎金寶質心依舊格告盟十天然後而付焉東曰前云上天有期限其中有至信之人心耽大法能用金寶之信以質其心來欲請受者然後冒禁告盟十天方可傳付也幽棲曰前序及此俱云齎金寶復不言多少之量既此質心則至人之心一假多也隨其豐儉以告十方誓盟諸天金寶雖微盟約復重既前序已説今經後復盟恐人忽略冥科故此再三曉諭也道言夫天地運度亦有否終東曰運度者有四也一生人二死人三禳災四功德利益又云天一地二天三地四運是劫運度是度數陽九百六皆是度數之休否故天地雖大猶有傾廢之期即其義也幽棲曰天屯為陽九之災地否為百六之禍故云天地運度亦有否終也少微曰小則百六陽九大則三界消亡玄英曰否終者否謂陽九百六終謂三界消亡陽九百六者按周易大演十九年為一章四章為一部二十部為一統三統為一元一元四千六百二十年其中通有五十四年水旱陽九者陽數竒極於九災應之時大則九年之旱其次即七年五年三年一年之火也隂數偶極於八災應之時則八年六年四年二年之水也百六者初入元一百六十年陽數竒有小旱之災故云百六之災也通論陽九百六之會者初入元三百年為小陽九小百六九百年為大陽九大百六大則大旱九年大水八年也漢書云四千六百一十七年為一元數盡三元為大劫之終天地消亡也三元合一萬三千八百五十一年初入元一百六十年為一小災故云百六否終之義略舉如前也日月五星亦有虧盈東曰日中則昊月滿則虧星宿停關不轉亦是天道之期皆自然理數也幽棲曰寒三三十七日月有薄蝕虧盈五星有經緯錯度也至聖神人亦有休否東曰至聖未是大聖亦猶文王囚於羑里孔子厄於陳蔡皆是休否之辰幽棲曰唯聖與神猶有休盛否泰況乎凡俗何可勝言末學之夫亦有疾傷東曰天地聖人尚有休否末學之類寧無疾傷幽棲曰至於微生末學理冝疾病災傷儻有遭遇甘之勿怨凡有此災同氣皆當齊心修齋少微曰同氣同法也同稟妙氣之法故曰同氣六時行香十遍轉經福德立降消諸不祥無量之文普度無窮幽棲曰若有此災則召同學同志齊心齊力修齋禮懴六時行道轉誦此經令周十遍福德之報立應不祥之禍自消故知靈文功用弘普廣濟天下者也道言夫末學道淺或仙品未克運應滅度身經太隂東曰云死者皆過太隂之官如此之人皆為轉經行道幽棲曰末學者或宿運功微今緣德薄遂使趣道之心不篤墮業之障易侵仙品之格莫登鬼録之編已著於是玄運所引應當奄終魂歸太隂尸偃后土也少微曰鬼道為太隂也臨過之時同學至人為其行香誦經十遍以度尸形如法幽棲曰同盟同學至人至友能為精心修齋誦經十遍臨終之際共度尸形則存者獲濟拔之功亡者得度魂之福言如法者咸依五煉生尸之法也魂神徑上南宫東曰明滅度之人臨將命過同學者復為行香誦經以度尸形魂神即升南宫受自然之福也隨其學功計日而得更生轉輪不滅便得神仙東曰功滿三千即白日升天幽棲曰既作度尸之法則魂神上升於朱陵之宫受錬於流火之庭隨其修學功業之深淺凖其年歲日月之多少時限既畢則神歸復形便得更生外雖終殁經時積稔有如睡頃不覺稽久從茲已往便得神仙此亦得尸解之道者也道言夫天地運終亦當修齋行香誦經東曰以禳災運也幽棲曰天地屯否運數將終即當修齋禮懴讀誦此經以鎮禳也星宿錯度日月失昏亦當修齋行香誦經東曰以保安寧也幽棲曰五星經緯錯度日月薄蝕失昏即當修齋禮懴讀誦此經以整復也四時失度隂陽不調亦當修齋行香誦經東曰以理隂陽也幽棲曰春夏秋冬寒暑不遷隂陽律吕氣候乖錯即當修齋禮懴讀誦此經以調理也國主有災兵革四興亦當修齋行香誦經東曰以保衛護也幽棲曰國有災運兵戈四起即當修齋禮懴讀誦此經以消其災運也疫毒流行兆民死傷亦當修齋行香誦經東曰以用消伏也幽棲曰疫癘之毒時行疾病死傷萬民即當修齋禮懴讀誦此經以除其災也玄英曰天子曰兆民諸侯曰萬民十億為兆舉其多也即明國主有災故知傷害兆民也師友命過亦當修齋行香誦經東曰師徒朋友命過之時行香誦經十過以濟度魂靈也幽棲曰師主道友臨終之時依前章法修齋以度尸形令得神仙也夫齋戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民幽棲曰夫修齋持戒行香誦經功德既深福報亦重上可以消滅天災保鎮帝王之祚下可以禳除毒害普度蒼生之厄少微曰每歲十二月大陵積尸星其氣下地下丘墓朽骸其氣上屬鬼乘之因行寒熱之病謂之疫毒誦經可以消蕩不死藉鄉人之儺也生死受賴其福難勝故曰無量普度天人幽棲曰生賴者即身得道白日升天也死賴者魂度朱陵受錬仙化也天人登坐三清之樂世人立超八難之苦廣濟之功既大普度之德尤深少微曰諸言齋者謂黃籙等齋皆用五文鎮謝非常俗之齋也三時啓奏所以感天動地降福禳災也元始無量度人上品妙經四注卷之三
