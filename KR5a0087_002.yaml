front:
  text: 元始無量度人上品妙經四注卷之二寒二
  hash: sha256:026a45351ad780e1cf5814f706df6aa3eff03c683f2735d7c2de699cd0c4a550
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0087_HFL_002-001a, image: hfl/0038/0038-080.png}
body:
  text: 齊嚴東唐薛幽棲李少微成玄英注宋陳景元集元始無量度人上品妙經幽棲曰前題兼稱太上洞玄靈寶此題直云元始無量度人序題太上欲明太上所序經前則都總部秩之名後則單指一經之目上品妙經義同首注少微曰前是道君序經故以道言標首此是天尊自説故書元始為題又自然已前亦是道君小序混沌已後方是天尊本章也元始洞玄靈寶本章東曰元者先也先天而生故曰先也亦曰大也大無不包故曰大也亦曰氣也細無不入故曰氣也亦曰無也無形無影故曰無也亦曰靈也能變能化故曰靈也亦曰道也經曰道可道非常道也明常道無形不可得而名故略云其狀始結也元氣始結故言結也亦初也玉字初開故曰初也亦化也化生天地故曰化也亦端也為萬物之首故曰端也亦終也終乎無終故曰終也經曰無名天地始又曰天下有始以為天下母又曰始制有名故曰始生一一天也天從始而生明始亦元也會歸於元元生之時無天無地無神無鬼溟涬濛鴻無所分别元氣始結而成玉字玉者自然之精精出而發光以成天地日月星辰所以化成元始尊神者明其有靈也所以化生天地日月星辰者欲以生養萬物也所以天地萬物生後而有號者明元始造化也所以號元始者示人知始終之歸趣也洞明也洞照無極故曰明也亦通也通達無窮故曰通也玄空也杳然空洞故曰空也元氣始結而成玉字在空玄之中通達照乎四方顯乎龍漢隱乎延康先乎赤明耀乎開皇逺至上皇也靈者衆聖之通稱也寶者衆聖之所珍也章者文章也玉字始出本形如印八角垂芒文彩煥耀洞應無窮在天曰靈在地曰寶空玄為靈入藏為寶故曰靈寶太上道君説其所由也少微曰元始微言通同玄妙靈文寶貴音韻成章上品妙首十回度人東曰上品者元氣始凝結青黃白三氣置上元三宫其第一宫名玄都元陽七寶紫微宫始陽之氣總主上真自然玉虛髙皇上帝諸天帝五上聖大神其宫皆五億五萬五千五百五十五萬重青陽之氣其中官寮亦有五億五萬五千五百五十五萬衆皆結自然青陽之氣而為人也衣則青羽飛衣宫中有延生符八方之氣欻然而到便成人也毀符焚身即隨煙而化還為氣也太玄上府紫微宫有左右中三府左府主生宫太陽火官考右府主死宫太隂水官考中府主生死罪録風刀之考三府各領官寮九千萬衆總統生死罪福一十二曹其左宫名太玄都元黃太極左宫則元黃之氣總主上真已得道及未得道修真男女生命録籍其宫有招靈之符右宫名太玄都洞白太極右宫則天元洞白之氣總主上真已得道及未得道修真男女滅度仙録及罪簿死籍宫中有明真之府其中官寮品格具如紫微宫之儀也上元品天官凡有三宫宫有三府宫統十二曹三宫合三十六曹並治元陽之上太空之中自然之號普統上真已得道三元日集校隂陽水火風刀三府考官三十六曹青黑二簿列奏紫微太微左右中三宫其事自具出三元品戒中今略舉一隅昔龍漢之年玉字始出日月始明天地亦分衆真列位元始出法度人説經十遍周回十方度人無量之數元始因撰作十部妙經以紫筆書著空青之林衆聖所崇為經之祖宗故曰上品妙首也幽棲曰此演經之時故亦都敘題目之旨趣也明誦之十過即能度人故元始説之十過以召十方每以十過為法所以前序言凡誦是經十過億曽萬祖皆即受度亦是回法輪十轉之義也少微曰即此章句言約事弘是謂上品真經妙道之首十回輪轉廣度天人也玄英曰上品者群經品秩之中此品最為第一也妙首者此經有度人之法為衆妙之宗故稱妙首也十回度人者天尊誦經度人皆有遍數十遍為一過百遍為十過也百魔隱韻離合自然東曰百魔神霄王等隱玉字也韻調也魔王與諸氣俱生參於洞章隱其韻調合於自然之書以為經也幽棲曰即諸魔王隱名及三界祕章隱顯離合同符自然也少微曰于時天人鬼神莫不服化故三界大魔率其羣魔隱括聲韻來朝元始離飛玄之氣合自然之音鼓以靈風皆成歌詠太上貴重列於經文也玄英曰此明天尊誦經感得三界羣魔飛行空中歌隱韻之音俱來朝會隱韻者明此靈章皆是諸天上聖自然隱祕之音非世所知謂之隱韻屬對成文曰韻五聲相和為音合而言之謂之隱韻自然者言此靈文皆諸天妙氣靈風鼓奏自成歌詠之音非關造作而成故云自然也離合者謂三界魔王公自歌其天中自然妙氣以為歌詠之曲謂之為離其音與洞章相參理合自然之妙故云合參猶雜也音辭雖雜理合自然故云離合自然也又解云離者天尊所説魔王亦説各各自説謂之為離説音不同理合真妙謂之離合自然也混洞赤文無無上真東曰混大也洞通也赤文赤書大洞之經通明龍漢淪於延康元始開運於洞陽之宫火鍊玉字洞陽氣赤故號赤文出法度人玉清治鍊真中之真故曰無無上真也幽棲曰混者混沌之名洞者洞陽之氣赤文者赤書真文也言赤書真文齊混沌之初在天地之先凝化空洞之上鬱結太無之中太無之無亦無其無既無其無是謂無無故云無無上真也元始鍊之以洞陽之氣治之於流火之庭洞陽氣赤故曰赤書也少微曰混洞是髙上玉皇九億萬氣也言玉皇之氣混沌通同成其赤書真文乃於無無未有之時分布五方元始用之度人皆登上真之位也元始祖劫化生諸天東曰祖先也元始未受號之先已化生天地但龍漢久逺劫運始開天地亦分自此已前不可記識是故觀古可以知今則古今無異幽棲曰言赤書真文開運祖始之劫化生三十二天祖劫者赤明之劫也少微曰祖始也玄元始氣於始劫之初欻然而造化能生五億諸天按天地一成一敗謂之一劫言始劫者是世界初生未經成敗也開明三景是為天根東曰三景三光也三光既明天地乃分萬物乃生神靈得治長為天根也又能光明日月朗耀衆星少微曰二儀分形三光垂耀皆稟始氣故為天根玄英曰景光也此明諸天位成即有三光列耀通照字宙謂之開明俱稟妙氣而成故為天之根本也上無復祖唯道為身東曰祖宗也上無所宗唯道氣結精而後成其身也幽棲曰既齊混沌之物復在天地之先故云上無復祖也真文之質即道真之體為文故云唯道為身也玄英曰此舉真文之體為諸天之根本稟元始妙氣之自然而化成大道之法身妙氣自成不復更有先祖也西升經云虛無生自然自然生道今云上無復祖者道以虛無為宗以自然為本以道為身然此三者悉無形相尋考其理乃是真空真中有精本無名稱聖人將立教迹不可無宗故舉虛無為道之祖其實三體俱會一真形相都無能通衆妙故云上無復祖復猶别也别無先祖也五文開廓普植神靈幽棲曰五文者即真文五篇也以應五方五老之所償録者既開朗三光亦開廓五篇玉字真文各植神靈者也少微曰妙本自成無復先祖括囊無外盡是道身五篇真文開廓形狀普生天地安置神靈也無文不光無文不明東曰光三光也明分明也玉字不出則日月無光天地不分明也無文不立無文不成東曰立形也成生也玉文不出天地無以形萬物無以生也無文不度無文不生東曰度升也生化也真文不出魂神無以升萬物無以化也少微曰若無真文開廓則日月不得光星辰不得明乾坤不得立世界不得成幽魂不得度枯骨不得生玄英曰謂三塗八難五苦幽魂若不得此真文則不得超度三界亦明修學之人無此真文則不得成真入道是為大梵天中之天東曰大梵者則風澤大梵之氣結而成天在空虛之中抗舉澄清髙而洞浮懸而不落在衆天之上故謂天中之天也幽棲曰既生成之功浩汗造化之用彌綸故云是為大梵梵者道中之道也道即玄文故云道中之道玄中之玄天者玄也少微曰範法也所能開明三景安置五文皆元始天尊運行大法在諸天之上故曰天中之天也鬱羅蕭臺玉山上京東曰鬱盛也羅大羅也大羅之天上有玉京之山山有七寶玄臺臺在七寶城城中有玉清之殿髙上玉皇治乎其中也幽棲曰言玉清之上有九層之臺窮於髙際參於太無故映鬱大羅之上蕭然九層之臺太無即大羅也以玉為山故云玉山山上有京故云上京亦有名玉京亦名玉清皆因玉以得名也此即通謂玄都玉京也少微曰自此十句皆説玄都境中宫殿壯麗玉京山在諸境之上故曰上京山有玉城城中有臺號曰蕭臺城闕山林鬱然羅布皆髙上玉皇所理之處也玄英曰鬱羅者謂蕭臺四面城闕山林鬱茂光華羅落其處故云鬱羅上極無上大羅玉清東曰大羅之天在衆天之上紫微之宫處乎玉清之上煥乎紫虛之中明道既彰大羅之天則鬱然澄清七寶之樹各生一方彌覆一天八樹彌覆八天包羅衆天故曰大羅也幽棲曰言玉京之上極乎無極窮乎無窮唯大羅之玉清耳大羅即虛景玉清即宫闕者也少微曰大羅玉清境窮髙極逺更無一物在其上能包羅衆天故曰大羅其上無塵豁然太空無為之道場也玄英曰本相經曰大羅之上無色無塵是無上也眇眇劫刃若亡若存東曰眇眇者髙逺也一劫者如有巨石方圓四百里又如空城方圓四百里上下齊等滿中芥子天人每百年一度取一芥子又羅衣拂巨石石消芥子盡名為一劫七尺曰刃存有亡無也七寶玄臺臺髙芥子無數之仭步虛云仰觀劫仭臺此之謂也七寶之臺非地仙所見而況凡人乎覩之則言有不見則言無故言若亡若存也幽棲曰刃者仭也古之字少以刃為仭天真以劫計仭世人以尺計仭即玉清九層之臺復謂之劫仭臺也既髙逺眇邈隱化無方故云若亡若存非定相也亦雖有形而無其體真精造化自然而然也少微曰按真一自然經云玉山一名劫仭臺言以仭量之如彼劫數故曰劫仭形而不礙若存若亡也三華離便大有妙庭東曰三華者即太極宫青華門名也離布三便之殿則三界門名也三華在三界之上上有梵天神人飛遊太極之上玄歌無量洞章曲爽靈風之氣拂揚洞章之曲太和玉女於華都之門而和神人之歌慶大有於元始欣衆真於妙庭不離三界故曰離便也幽棲曰夫入宴三清之宫則必逺離三便之門即三界門也三華宫即玉清三元宫也上元玉華中元金華下元九華皆三元上皇道君居之大有者大道也義同大塊理齊有物言三華之宫既天尊大道君居之故云大有妙庭耳金闕玉房森羅淨霐東曰天中有金闕玉房以界三便之門森長也羅大羅也上有騫林之樹覆蔭東華之宮騫林之葉有大洞之章紫書玉字煥乎上清淨霐者都監之神內名也治紫微宫曲房之內下有扶桑之樹上有騫林之叢碧雞鳴其蓋青霞翠其峯神風流反香之草以鼓桑林百籟之音神風一鼓空生洞章之音也幽棲曰言玉清之境以黃金為城闕以白玉為宫室黃金之闕則森然煥邈以周羅白玉之房則精潔嚴凝以霐瑩也少微曰言繞三便之殿循大有之宫皆金闕玉房騫林紫樹森聳羅列淨潔霐澄也玄英曰闕者門也此明玉京成內華飾妙麗積金為闕纍玉為房周繞大有之宫三便之殿又植騫林紫樹羅列森聳清淨霐澄安居其上勝妙殊絶故云淨霐也大行梵氣周回十方東曰大行者天元綱紀也維羅八極總大梵之氣通明龍漢之闕龍漢推數而自開赤明待運而敷辰赤明既開三十二天並有神靈置中元二品地官元洞混靈之氣凝黃之精置中元三宫其第一宫名洞靈清虛宫總主五帝五嶽諸真人及地上神仙已得道一號明晨武成宫置左右中三府左府號耐犯明晨府主生官太陽火官考右府號紂絶隂天府主死官太隂水官考中府號七非恬照府主生死罪録風刀之考三府各領官寮五千萬人統生死罪福一十四曹並治山洞空虛之中係大梵之氣也幽棲曰玉清真道梵氣大行於十方之域周流於諸天之境也少微曰總五億之諸天混八圓之經緯下窮九壘上際大羅皆是梵氣流行周回不息故得億千世界髙而洞浮懸而不落其狀似風非風似水非水維而持之若有情信中有度人不死之神東曰度人更生之神也名飛生學士能誦洞章諸天稱慶飛生即為開不死之門流長生之氣下鍊三魂三魂之神被鍊八景存焉八景備守共舉人身上飛九層之臺遊於騫林之中上升玄都之宫也幽棲曰謂諸天十方有此之神主司度世不死之事非言神不死者也中有南極長生之君東曰南極者南極真人也中元二品左宫名洞陽宫一號宗天宫總主地上九土土皇四維八極諸靈官混黃之氣其中土府地上官寮九萬九千九百九十九萬衆皆是死者有功之魂受度而補其局其宫置左右中三府其左府號諒事府右府號宗靈府中府號靈如神府三府考官如上法主生死一十四曹中元二品右宫名北酆宫一號隂天宫總主地上諸靈官置左右中三府左府號連宛泉曲府右府號泰殺九幽府中府號罪氣咸池府主生死中元二品地上三官左右中各三府統一十四曹並治山洞空玄之中皆自然之號地上五嶽四維八極神仙真人以八節日下詣清靈洞陽北酆三宫集校諸地上生死功過罪福衆官齊到三宫九府四十二曹考召官屬各操生死青黑二簿列言三宫南極真人治洞陽宫中下有流火之庭學人得道者皆詣流火之庭受鍊而成真然後進入洞陽宫中長生者宫中有度命之君字吁員得入南宫吁員即為鍊度朽骸也幽棲曰南方主生故復有南極主司長生之名簡者也少微曰流火之庭廣八十萬里中有度世司馬大神東曰南宫中有度世司馬大神者十方飛天神王並治宫中也幽棲曰司馬大神主司度世之録籍司馬官位也少微曰南宫又有度世司馬亦有度世大神並治宫中長生不死也中有好生韓君丈人東曰好生君諱猷治南上宫中也韓君司命司録也治九幽酆都人有善功者大聖開玄夜之戶酆都度八難之場七祖於是而還幽魂於是而光上帝育飬始生之神司録則度算於南宫也幽棲曰復有韓君丈人監長生籍與南極事同神中之尊謂之丈人韓君官司之號也少微曰韓君是上帝闕下司録仙籍度人南宫也玄英曰丈人長老之稱也好樂也明其南宫之中復有樂人長生不死之君録人善功出三界之苦中有南上司命司録東曰南上宫名也九華真人治在其中主九幽之中宿對死魂司命主壽算之神司録主簿録之神並南上帝君司官也常校學仙之名上言玄都之宫有知八字之音應得度者至災劫交之時則司命使鳥母迎以鳳車上登昆崘之墟也玄英曰南上者洞陽宫之别名也延壽益算東曰延申也算紀也九靈之母治東海扶桑湯谷之淵常總地機轉輪元氣上應天關天關轉地機動周天一度水則湧三千三百度九海溟合坤母出東海之上以召鳥母使申劫會於帝君延壽益其算紀度學仙之人也度厄尊神東曰南上宫中有益壽延年度厄尊神上帝君也諱育常乘象輪之車遊行九玄之門轉九機之度以應劫會之期天運之終而日童停光拔度學仙之人灌以水毋之精導以太和之氣度其災厄鍊長夜之尸幽棲曰復有南方司命司録二尊神司命尊神主延壽益算司録尊神主過災度厄也回骸起死無量度人東曰無量則大衆之始神也總統飛天之衆既樂天中有無量品衆大聖衆皆受其品量而得升度死骸受氣而更生為人也幽棲曰夫延壽益算過度災厄及回死骸之形已死之尸者皆由乎司命司録之二君也故云無量度人也少微曰總彼真官各司其職並能回骸復命起死成生劫運頻交度人無量也玄英曰此二句通結上文從中有度人至此諸司真官皆能回骸起死度脫生靈回骸者骨為骸骸形也能令死骸白骨更起成人也起死者謂新死之人更令得活也無量度人者凡於劫劫之中度人成道非可算數故云無量度人此明元始垂慈死生通濟置立金宫玉殿總彼真官照臨三界之中弘度九天之內人則存亡獲慶萬物則動植銜恩劫劫之中長生久視今日校録諸天臨軒東曰校録校生死之録也臨軒宴會也玉帝在南昌之宫中校度生死録籍普得開赦幽棲曰今日校録謂校量持誦之人建功立行之名簡應合升度之録籍故諸天十方無量神真乘輿御輦上詣帝前少微曰今日者赤明開圖日也校録者校死生録籍也凡校録之日皆可借言今日耳是時元始天尊校死生録籍諸天聖衆並臨軒宇而朝也東方無極飛天神王長生大聖無量度人東曰太上説玄都玊京山八方諸天有三千大千世界東方無極諸天安太堂鄉大千納善之世界也幽棲曰即前序云説經一遍東方大神浮空而至也南方無極飛天神王長生大聖無量度人東曰南方無極諸天宛梨城境大千棄賢世界也幽棲曰此説經二遍南方大神浮空而至也西方無極飛天神王長生大聖無量度人東曰西方無極諸天福堂洲大千咸行世界也幽棲曰此説經三遍西方大神浮空而至也北方無極飛天神王長生大聖無量度人東曰北方無極諸天鬱亶野大千清淨世界也幽棲曰此説經四遍北方大神浮空而至也東北無極飛天神王長生大聖無量度人東曰東北方無極諸天福集都大千長安世界也幽棲曰此説經五遍東北大神浮空而至也東南無極飛天神王長生大聖無量度人東曰東南方無極諸天元福田大千用賢世界也幽棲曰此説經六遍東南大神浮空而至也西南無極飛天神王長生大聖無量度人東曰西南方無極諸天延福鄉大千仁靜世界也幽棲曰此説經七遍西南大神浮空而至也西北無極飛天神王長生大聖無量度人東曰西北方無極諸天福德野大千延賢世界也幽棲曰此説經八遍西北大神浮空而至也上方無極飛天神王長生大聖無量度人東曰上方無極無巔玄都玉府紫微之中無鞅之衆飛天神王也幽棲曰此説經九遍上方大神浮空而至也下方無極飛天神王長生大聖無量度人東曰下方無極五嶽五帝洞陽清靈北酆都諸宫府之中也幽棲曰此説經十遍下方大神浮空而至也十方至真飛天神王長生度世無量大神東曰十方大羅之天有玊京山山有八方上下合為十方各有無極無窮飛天神王長生度世君無量大神無鞅之衆並到帝前也幽棲曰此十方真神並主司監得道成真長生度世之事故云長生大聖無量度人並乘飛雲丹輿緑輦羽蓋瓊輪東曰飛雲者三素雲也丹赤也緑碧也羽旄也蓋覆也瓊玉也十方大聖飛天神王各乘丹霞之輿碧霞之輦朱寉鳳凰以為輿輦之蓋七寶輪轂也玄英曰丹是赤色之霞緑是碧霄之氣此明十方大聖來朝元始之時皆結太上三素飛雲丹霞碧霄為其車乘故云丹輿緑輦參駕朱鳳五色玄龍東曰參雜也雜駕朱雀鳳凰五色之龍白虎玄武也幽棲曰羽蓋蔭輿輦之上飛雲騁輪轂之下未鳳則參輦玄龍則駕輿於是鳳輦雲輿雲氣雙邁羽蓋者仙禽靈鳥之羽為蓋也瓊輪者以圭璧琬琰之寶為輪玄英曰龍有五色而言玄者玄猶天也謂天龍也又云玄是衆色之主故特舉以明之建九色之節十絶靈幡東曰節蓋也幡華幡也九色者青赤白黃黑緑紅紫紺也上真執九色之旄節玉女把十絶之靈幡幽棲曰夫上真皆建三七九色節紫旄節靈幡節以十色間錯色各一絶故云十絶節在幡前皆左右持執以導前少微曰十方大聖並乘三素飛雲丹霄之輦鳳凰羽蓋瓊玉之輪參雜也又雜駕以朱鳳玄龍文耀五色玉女建九光之節真人持十絶之幡文物威儀異方同軌玄英曰十絶靈幡者以十色之素橫幅剪斷謂之為絶又分間其色接而縫之其幅通者十接謂之十絶繫於竿首謂之為幡幡者以轉為名令人轉禍為福也執節使刑罰有度罪無濫刑持幡使悔過修真化惡為善大聖所建曉示愚迷使真人執幡玉女持節其旌節貴賤隨法髙低如上清真人建紫毛之節其餘等級具列科儀此不兼載前嘯九鳳齊唱後吹八鸞同鳴東曰雄曰鳳雌曰凰赤色五彩曰鸞前導九部之鳳後從八部之鸞侍晨一嘯九鳳齊唱西靈真人吹九鳳之簫則八鸞同鳴也幽棲曰前有嘯歌則九鳳與之齊唱後吹管籥則八鸞與之同鳴玄英曰八九者前部屬陽陽數竒故九也後部屬隂隂數偶故八也師子白鶴嘯歌雍雍東曰雍雍和鳴也鳳唱鸞鳴衆音並作也幽棲曰師子作虎嘯白鶴為鳳歌和鳴諧合二音雍穆也少微曰此天鈞樂也前部嘯歌則九鳳齊唱後部流吹則八鸞同鳴洞神經曰天一左宫有天鈞樂器子日玉女能吹笙竽丑日玉女能嘯歌寅日玉女能鼓瑟卯日玉女能擊築辰日玉女能鼓琴已日玉女能撞鐘擊磬午日玉女能吹簫未日玉女能吹笳申日玉女能為九音之歌酉日玉女能為六變之歌戍日玉女能作百獸鳴亥日玉女能為天下新聲之曲天鈞樂器名也名與世同音與俗異俗音悽思以促命天音和暢以延生玄英曰此明師子白鶴從駕而行天樂一張則百獸率舞故得齊聲唱和嘯歌雍雍五老啓塗羣仙翼轅東曰五老五帝也啓開也塗道也翼侍也轅輿輦轅也十方飛天無極大神臨軒於始青天中五帝開道羣仙侍引也幽棲曰五老啓塗以前引羣仙則侍轅之左右五老即五老帝君掌領五篇真文也少微曰五老五帝也十方大聖道位尊髙乃感五帝前驅羣仙驂乘五符本行經云東方安寶華林青靈始老號曰青帝姓閻諱開字靈威仰服色尚青駕蒼龍建翠旗從羣神九十萬人和春氣生萬物南方梵寶昌陽丹靈真老號曰赤帝姓洞浮諱極炎字赤熛弩服色尚赤駕赤龍建朱旗從羣神三十萬人和夏氣長萬物中央玉寶元靈元老號曰黃帝姓通班諱元氏字含樞紐服色尚黃駕黃龍建黃旗從羣神十二萬人和土氣上載九天西方七寶金門皓靈皇老號曰白帝姓上金諱昌開字耀魄寶服色尚白駕白龍建素旗從羣神七十萬人和秋氣成萬物北方洞隂朔單鬱絶五靈玄老號曰黑帝姓黑節諱靈會字隱侯局服色尚黑駕黑龍建玄旗從羣神五十萬人和冬氣藏萬物五老帝君皆天真自然之神故曰元始五老非後學而成真者自受符命各治一方大劫交周其位仍易也億乘萬騎浮空而來東曰萬萬曰億也乘鳳車也騎龍麟也飛仙並乘龍駕無鞅之衆鳳車羽蓋浮空而到也幽棲曰億乘萬騎明其多也浮空而來非履地也傾光回駕監真度生東曰傾蓋也光日也度生真人也字扶羲常主教九幽之録善惡之因善者則受其開度惡者則極其對根爾時十方大聖蓋天而來下障翳日光回駕於諸天之境傾光於上帝之前監諸修誦成真之至士度祖考應生之魂魄者也玄英曰傾動也光者車輿章服輝耀也回駕者衆聖臨軒既受天尊符命訖遂乃傾動光儀回其車駕各歸本國監領羣真度脫得仙之人故云監真度生也諸天丞相南昌上宫東曰丞相大羅天之神公也上宫朱陵宫也丞相為受度更生之賔定命籍於朱宫削罪根於三官也幽棲曰九宫有上相二真之位輔弼諸天之事故居於南昌上官即九宫之南赤明和陽天中者也韓司主録東曰韓司司命也應得度者司命即執主録算度於南宫而得受鍊度者也監生大神東曰監生大神主領長夜之宫校學道簿録度九幽之魂大神者十方飛天神王也常在飛玄之上而誦洞玄之經以自然之氣拔度學道之人也幽棲曰韓司即前韓君之司也主録即主監長生之録故云監生大神也執録把籍齊到帝前東曰十方大神各領司録執持録籍以到玉帝之前玉帝諱廓奕治玉京玄臺之中與元始同生為玄元之範開滅度之門教學仙之人也幽棲曰十方至真與諸天丞相及監生大神並抱執算度之録籍俱會帝前以遷舉也少微曰韓司主録門下司録也主人録籍故曰主録監生大神更生真人也字扶羲領長夜之府度九幽之魂是時諸天帝主各領丞相齊到陛下校度死生帝者天尊自謂也天尊一號玉帝按龍蹻經元始有十號一曰自然二曰無極三曰大道四曰至真五曰太上六曰老君七曰髙皇八曰天尊九曰玉帝十曰陛下隨所應度嚴校諸天東曰學士若能明八字之音則神公開長明之戶十方幽魂並得度入更生之門上登玉京之臺歡樂紫極之宫中有神嬰之童一歌無量之章立得反形於三鍊之房身受自然之氣歡樂無極之齡幽棲曰隨所在修誦之人應合得度者校勘諸天之名簿籍句會功滿之録也少微曰皆隨功輕重應事開度嚴校諸天罔有遺失普告三界無極神鄉東曰三界者欲界色界無色界也無極者十方無極世界也普告十方無極無窮之神普令知聞也幽棲曰告勑三界五帝之魔王逮及無極無窮之神域有司必告無幽不聞也少微曰玉帝告也三界者欲界六天色界十八天無色界四天諸神之鄉無有限極故曰無極神鄉泉曲之府北都羅酆東曰北都玉都也羅酆山名也羅酆之山在天地之北北海之外山髙二千六百里內外皆七寶宫室天地鬼神之所處三界六天北帝大魔王治乎其中凡六宫皆六天鬼神之治洞中有六宫亦相像如一下元三品水官結風澤之氣凝晨浩之精置下元三宫第一名湯谷洞泉宫一號清華方諸宫總主水帝湯谷神王九江水府河伯神仙諸真人水中諸大神已得道過去及未得道有功之魂受度而升其宫置左右中三府左號青元靈淵府右號九氷寒夜府中號朔單青靈府簿録並封九河洞室其下元左宫名清泠宫一號南水會宫總主水中萬精蛟龍鯨鯢入會水母龍門各五億萬重風澤金剛之氣其宫置左右中三府中號靈寶劫刃府左號齡劫府右號長夜寒庭府主水中萬靈下元右宫名北酆都宫一名羅酆宫總主水中積夜死魂謫役之劫其左府號開度劫量府右府號泉曲鬼神府中府號通靈大劫府下元三品水官三宫宫統一十四曹三宫合四十二曹並治九江洞室皆自然之號並統三河四海九江水府一切神靈已得道及未得道并地上五嶽真仙玉女常以太歲甲子庚申之日下詣湯谷清泠北酆都三宫校集九府生死簿録昔天地改運淪於延康冥冥無開飛天啓光於是散暉諸天受氣灑靈玄都故云玉都亦大聖之號北帝上真治乎玄靈之宫下有寒氷夜庭又有八難之場故曰泉曲府也幽棲曰泉曲府即九幽長夜之鬼府北都羅酆即酆都北帝之鬼都羅酆是北海九幽之山名鬼都即在羅酆幽山之上者也少微曰此下元右宫也按真誥云北酆在天地之北外癸地一名酆都泉曲府酆都右府也羅酆是北都上山名也髙二千六百里周回三萬里下有洞天周回萬五千里內外皆有七寶宫室有上中下三宫各八獄合二十四獄皆天地鬼神所處也三官九署十二河源東曰三官者天地水三官也上元天官有三宫宫統一十二曹合三十六曹中元地官亦有三宫宫統一十四曹合四十二曹下元水官亦有三宫宫統一十四曹合四十二曹三官都合一百二十曹主領鬼神人天地水三官合為九署及九海三河十二川源之中生死圖籍無淵無底無極神仙一切神靈普皆宣告也幽棲曰三官即酆都三官酆都有六宫二宫立一官六宫故立三官也一官有三署三官有九署左為火官右為水官中為女官並隨事源主司考掠如世上之六曹十二河源即水府也事與三官九署相符三官九署亦十二也且屬北方與北俱是隂位故取二六之數以置十二官也此亦舉主宰耳其餘小位不復言也少微曰三官者上元天官中元地官下元水官主九署九府署司也十二河源者月為太隂之精諸水之母井是天河之源衆水之泉一月一周天一年十二月每月皆過於東井沃黃水之華濯天人之容若先祖未生皆蒙鍊度以成仙真事見三五順行經按三元品戒經説上元天官隸玉清境結青黃白三氣置上元三官玄氣為中宫始氣為左宫元氣為右宫其中宫名元陽七寶紫微宫結青元始陽之氣總主上真自然玉虛髙皇上帝諸天帝王上聖大神其宫皆五億五萬五千五百五十五億萬重其中神仙官寮亦有五億五萬五千五百五十五億萬衆皆結自然青元之氣而為人也衣則青羽飛衣紫微宫中有延生之符出符以置八方則八方之氣欻然響應皆即成人藏符則復化為氣宫置左右中三府左府主生官太陽火官考右府主死官太隂水官考中府主生死罪福風刀之考考者核實其事大福三年考中福九年考小福二十四年考三府各領官寮九千萬衆總統生死罪福一十二曹其左宫名太玄都元黃太極左宫即玉清左相宫也結元黃之氣而成總主千真已得道及男女生命籙籍宫數官寮不異中宫亦結自然元黃之氣而為人衣則黃羽飛衣太極左宫有招靈之符用之亦如延生符也左宫亦置三府主考罪福一同中宫也右宫亦名太玄都洞白太極右宫是清微宫也結天元洞白之氣而成總主上真已得道未得道百姓男女仙籙罪籍宫數官寮亦不異中宫其人亦結自然洞白之氣而成衣則白羽飛衣宫中有明真之符用之亦同延生招靈也左右中三府主考罪福一同中宫上元三宫宫統三府府統四曹九府共三十六曹並治元陽之上太空之中有功德滿足應合仙者言名紫微宫有敬信宗奉大法者言名太極左宫應死者言名右宫中元二品地官者隸上清境結元洞混靈之氣凝極黃之精而成其中宫名洞靈清虛宫總主五帝五嶽諸真人及諸地神仙已得道者其宫皆五億五萬五千五百五十五億萬重其中神仙官寮有九萬九千九百九十九萬衆此皆死者有功德之魂非自然之氣也受度得神仙地官之任各有年限功滿德進升為天府仙官功未滿者還生人中中宫置左右中三府左號耐犯明晨府右號紂絶隂天府中號七非恬照府主考罪福隂陽年數不異上元也左宫名南極洞陽宫主地上九土土皇八極諸靈宫及生命籙籍宫數官寮不異清虛宫也宫置三府左號連宛曲泉府右號大煞九幽府中號罪氣咸池府主考罪福年數不異左宫中元三宫三府共統一十四曹九府合四十二曹並治山洞空中言奏善惡不異上元也下元三品水官隸太清境結風澤之氣凝晨浩之精而成其中宫號湯谷洞泉宫一曰青華方諸宫總主水帝湯谷神王九江水府河伯神仙水中諸大神及仙籙簿籍宫數官寮與中元同也官寮亦是有功德之魂補之宫置三府左府號青元靈泉府右號九泉寒夜府中號朔單青靈府主考年限罪福不異中元左宫名清靈宫生水中萬精鮫龍鯨鯢又會水毋龍門度數之期及人命籙籍生死功過氣是風澤金剛之氣官寮宫數不異中宫右宫置三府左號靈劫府右號長夜府中號靈寶劫刃府主考罪福亦如中宫也總主水中精魂百鬼萬靈氣是風澤梵行之氣宫數官寮亦同中元也右名酆都宫置三府左號開度劫量府中號通靈大劫府右號泉曲鬼神府主考罪福亦同中元也下元三宫宫統三府九府合四十二曹三府共一十四曹並治九室總統八海四瀆水帝神王水中一切靈祇三元總九宫二十七府百二十曹左主生事右主死事有功書左府青簿有罪書右府黑簿若罪中涉福福中涉罪則不專一曹也得道奉中宫有功奏左宫有罪奏右宫每到三元八節日絶滅惡根也玄英曰此明黃水月華鍊度死魂之事十二者年中十二月也河源者河即天河也天有二十八宿東井星是天河之源衆水之泉月為太隂之精諸水之母月行則每月一周天皆經東井吐水灌注故云十二河源若死魂受生皆蒙黃水鍊度以成真仙此文開度死魂故舉十二河源以明其事且三元八節勸在修行學者若得輕升亦能超度先祖謂下文上解祖考億劫種親幽棲曰解脫纍代祖考之幽魂原宥億劫之宗親也少微曰每三官校録因子孫有大功玉帝即為上解億劫祖考一切種親度生諸天也疾除罪簿落滅惡根東曰疾速也簿録也速除罪録絶滅惡根也幽棲曰速除其罪謫之黑簿急落其惡對之深根者也不得拘留逼合鬼羣東曰拘閉也逼強也不得閉繫魂爽強聚鬼庭之中遏塞正教也幽棲曰既賴經功以拔度復沐道恩以解脫豈更有拘繫留滯之艱混合羣鬼之中少微曰約勑三官有功德者不得拘留魂爽逼合鬼羣也元始符命時剋升遷北都寒池部衛形魂東曰元始天尊説經之時命召十方無極世界地獄之中一刻之時幽夜之中寒氷夜庭三官九府一時各部領鬼神侍衛將從得出長夜之府並皆開度得見光明也幽棲曰元始降符勑命畫時剋以升超北帝告寒池受形之魂部領出泉曲之府寒池者刑罰之池也少微曰酆都下有寒池諸鬼神有舒慢者玉帝即用符命一時一刻寒氷夜庭三官九府各部領幽魂移出長夜之府並承開度得見光明制魔保舉度品南宫東曰三界魔王常作謡歌以亂學者之心心固者魔王保舉徑升黃笳天中詣金華山受太一之信以制大魔之試然後得度當爾之時符制魔王使保度南宫也幽棲曰既勑北帝出鬼魂於北府即制魔王度仙品於南宫死魂受鍊仙化成人東曰南宫者長生之宫也度命君治在其中諱吁員得入南宫之中吁員即鍊度朽骸生童即灌其生津著生契於四極給自然之羽童生童者日中靈童也幽棲曰死魂舉度於南宫則以流火之膏鍊其鬼質從茲改化便得仙也生身受度劫劫長存東曰生身者魂受鍊度而還得遷人值元始開化身升長生之宫億劫長存者也隨劫輪轉與天齊年東曰輪轉不滅與天地等年也幽棲曰若即此生身便受升度則與天齊久與道同存劫始劫終從劫至劫劫自成敗而我獨存者天地世界一期運終是名為一劫也玄英曰隨劫輪轉者劫有大小若大劫交周即是天地敗壞劫火起時是也小劫是人之生死一期之盡謂之為劫隨劫者謂度死魂受鍊成人不能無死死後託化更生為人是隨劫也劫劫得生人道故云與天齊年永度三徒五苦八難東曰永長也三徒者三惡門名也第一名色欲門一名上尸道一名天徒界第二名愛欲門一名中尸道一名人徒界第三名貪欲門一名下尸道一名地徒界此為三惡門一名三尸道一名三徒界常居人身中塞人三關之口斷人三命之根遏人學仙之路抑人飛騰之魂五苦者一名五道門第一名色纍苦心門一曰太山地獄苦道第二名愛纍苦神門一曰風刀苦道第三名貪纍苦形門一曰提石負山苦道第四名華競苦精門一名填海作河苦道第五名身纍苦魂門一名吞火食炭鑊湯苦道故經曰吾所以有大患者為吾有身及吾旡身吾有何患此五苦五道常居人身係人命根遏人招真之路斷人修仙之門三徒五苦合為八難為罪之本而不解形於五道之上滅迹於五苦之下衆纍不斷沈淪罪田夫學諸上道當先斷諸纍絶滅苦道真氣自降神仙自成剋得變形遊行三清身入長生之府無復八難之患也超凌三界逍遙上清東曰超升也凌髙也飛升南宫神王即勑羽林監簡上生簿受符而升仙遊行雲宫之中身著結雲之衣徑入朱陵之宫受福於天堂與飛天合景飛行雲中神王妙成天王也字育生總統十方飛天之神羽林監字邈學知天中之音三界所稱地祇奉迎洞明神鬼坐知自然飛行三界遊乎上清也幽棲曰既與天齊年復與道合形永出三徒之役長離五苦之謫超八難於鬼都登九天之真域三徒者一曰長夜徒二曰寒池徒三曰摙石徒五苦者一曰刀山苦二曰劒樹苦三曰鑊湯苦四曰爐炭苦五曰考謫苦八難者三徒五苦共為八難也少微曰三徒者三官徒役也一曰天官徒役奔雷走電二曰地官徒役擔山負石三曰水官徒役摙汲溟波五苦者登刀山履劒樹入鑊湯抱銅柱吞火食炭也八難者八門幽曠之難道君所問飛天對之也上清之天天帝玉真無色之景梵行東曰上清之天有天帝玉真字陀與五篇真文結氣俱明在雲阿之嶺號曰妙成之天者是也玉真在上清之天不參色界乘大梵之氣遊行入太黃皇曽之天也幽棲曰上清之天天帝即三十六天帝最尊極之位道齊元始位列玉清故云玉真此即上清已下四境境有九天四九合三十六天此不同三十二天也無色天景則有景無色故云梵行此後即明後四方之天方有八天四八合三十二天謂之四梵天也景者身也色者質也言三十二天上帝髙尊形相宛然有景無質雖有真相猶如虛空出入無間不閡於物故云梵行梵者道中之道也此三清五境三十六天謂之大羅四方四梵三十二天內種民四天謂之中羅其欲色無色三界二十八天謂之小羅也少微曰上清天帝名玉真字陀與號曰紫晨天帝君不參色界無有三景故曰無色之景唯有大梵之氣流行混成圖云諸天各有一日一月上清至大羅自生九色光明不假日月故謂無色之景梵行也太黃皇曽天帝鬱繿玉明東曰東第一屬清微天帝位元陽之氣少微曰此天色黃氣係西北方梵氣帝諱觀覺主長生籙天中人壽九百萬歲六根俱染是名欲界玄英曰凡言梵氣者皆是四維之天維是角也其四方正面之天名係二十八宿之氣其四維之天不屬正宿但得兩邊宿氣相假而成故云梵氣梵是泛雜之名無係著之貌也如皇曽一天承奎壁二宿之氣故云梵氣已下三天倣此其三十二天之中天人壽命從此天向上每天皆一倍因之數可知矣又從皇曽已下三十二天經文之中從天字向上皆是其天之稱號從帝字向下即是天帝之號也太明玉完天帝須阿那田東曰東第二屬禹餘天帝位上陽之氣少微曰此天色緑氣係北方壁宿帝諱攬覺主度魂更生天中人壽一千八百萬歲一欲根粗淨五欲根粗染清明何童天帝元育齊京東曰東第三屬大赤天帝位太陽之氣少微曰此天色黑氣係北方室宿帝諱大覺主敷布政教度脫天人天中人壽三千六百萬歲二欲根粗淨四欲根粗染玄胎平育天帝劉度內鮮東曰東第四屬元景天帝位九天第一清陽氣少微曰此天色赤氣係北方危宿帝諱育王主召魔舉仙天中人壽七千二百萬歲三欲根粗淨三欲根粗染元明文舉天帝醜法輪東曰東第五屬無量壽天帝位九天第二洞陽氣少微曰此天色蒼氣係北方虛宿帝諱梵雲主通行元氣天中人壽一萬四千四百萬歲四欲根粗淨二欲根粗染上明七曜摩夷天帝恬懀延東曰東第六屬上監天帝位通陽之氣少微曰此天色黑氣係北方須女宿帝諱玉真主開度幽難天中人壽二萬八千八百萬歲五欲根粗淨一欲根粗染以上六天謂之欲界太真科曰初下二天果報尚粗猶以身交為欲次二天以執手為欲第五天以口説為欲第六天以眼視為欲今緣六欲感此六天一根粗淨上進一天六欲總淨超出欲界上登色界宗君曰言有色欲交接隂陽人民胎生故為欲界也虛無越衡天帝正定光東曰東第七屬兜術天帝位建陽之氣少微曰此天色碧氣係北方牽牛宿帝諱無上主明無上之道天中人壽五萬七千六百萬歲六色塵俱染初出欲界猶染色塵太極濛翳天帝曲育九昌東曰東第八屬不驕樂天帝屬東方極陽之氣少微曰此天色紫氣係北方斗宿帝諱吁員主鍊度朽骸天中人壽十一萬五千二百萬歲一色塵粗淨五色塵粗染赤明和陽天帝理禁上真東曰南第一屬化應聲天帝位始陽之氣少微曰此天色白氣係東北方梵氣在箕斗之間帝諱煥明主鍊仙成真天中人壽二十三萬四百萬歲二色塵粗淨四色塵粗染玄明恭華天帝空謡醜音東曰南第二屬梵寶天帝位陽暉之氣少微曰此天色黃氣係東方箕宿帝諱世元主應化一切天中人壽四十六萬八百萬歲三色塵粗淨三色塵粗染耀明宗飄天帝重光明東曰南第三屬摩夷迦天帝位洞陽之氣少微曰此天色緑氣係東方尾宿帝諱落覺王劫終納學仙之人天中人壽九十二萬一千六百萬歲四色塵粗淨二色塵粗染竺落皇笳天帝摩夷妙辨東曰南第四屬答惒皇天帝位陽明之氣少微曰此天色青氣係東方心宿帝諱韶主魔試學仙之人天中人壽一百八十四萬三千二百萬歲五色塵粗淨一色塵粗染也玄英曰此前六天是色塵之天學者若修極此天即色塵俱盡超入細塵天中謂下文也細塵有六天虛明堂曜天帝阿𨚧婁生東曰南第五屬梵明天帝位陽演之氣少微曰此天色赤氣係東方房宿帝諱雲上主開度天地天中人壽三百六十八萬六千四百萬歲六色塵粗淨六細塵染觀明端靜天帝鬱密羅千東曰南第六屬摩雜惒天帝位陽明之氣少微曰此天色蒼氣係東方氐宿帝諱淨生主度學者之身天中人壽七百三十七萬二千八百萬歲一細塵淨五細塵染玄明恭慶天帝龍羅菩提東曰南第七屬億羅天帝位陽浩之氣少微曰此天色黑氣係東方亢宿帝諱鏡主度得道之人天中人壽一千四百七十四萬五千六百萬歲二細塵淨四細塵染太煥極瑶天帝宛梨無延東曰南第八屬那首明天帝位陽極之氣少微曰此天色碧氣係東方角宿帝諱廓奕主教學仙之人天中人壽二千九百四十九萬一千二百萬歲三細塵淨三細塵染元載孔升天帝開真定光東曰西第一屬染梨恭首天帝位少陽之氣少微曰此天色紫氣係東南方梵氣在軫角之間帝諱猷主鍊度死魂更生天中人壽五千八百九十八萬二千四百萬歲四細塵淨二細塵染太安皇崖天帝婆婁阿貪東曰西第二屬首來天帝位太陽之氣少微曰此天色白氣係南方軫宿帝諱宛王開度善人天中人壽一萬一千七百九十六萬四千八百萬歲五細塵淨一細塵染玄英曰此前六天是細塵之天學者修極此天即細塵都盡升入輕塵天中謂下文也輕塵有六天顯定極風天帝招真童東曰西第三屬首為稽那天帝位浩陽之氣少微曰此天色黃氣係南方翼宿帝諱流主度有善功之魂天中人壽二萬三千五百九十二萬九千六百萬歲六細塵淨六輕塵染始黃孝芒天帝薩羅婁王東曰西第四屬阿那波邏迦天帝位洞隂之氣少微曰此天色緑氣係南方張宿帝諱易邈主披夜開幽天中人壽四萬七千一百八十五萬九千二百萬歲一輕塵淨五輕塵染太黃翁重浮容天帝閔巴狂東曰西第五屬波羅離和天帝位開隂之氣少微曰此天色青氣係南方星宿帝諱阿濫主召魔集真天中人壽九萬四千三百七十一萬八千四百萬歲二輕塵浮四輕塵染無思江由天帝明梵光東曰西第六屬梵明元黃天帝位玄隂之氣少微曰此天色赤氣係南方栁宿帝諱阿丘主開度善魂天中人壽一十八萬八千七百四十三萬六千八百萬歲三輕塵淨三輕塵染上揲阮樂天帝勃勃監東曰西第七屬蔡濘元天帝位昊隂之氣少微曰此天色蒼氣係南方鬼宿帝諱無量主品類天人等級天中人壽三十七萬七千四百八十七萬三千六百萬歲四輕塵淨二輕塵染玄英曰等級者貴賤貧富壽命也無極曇誓天帝飄弩穹隆東曰西第八屬天阿梨惒天帝位極隂之氣少微曰此天色黑氣係南方井宿帝諱曇主度一切仙人天中人壽七十五萬四千九百七十四萬七千二百萬歲五輕塵淨一輕塵染以上十八天謂之色界太真科曰無色界之中至真無情不交隂陽人民化生但噉香氣無復形質之患也玄英曰然此前一十八天通名色界若從此天升上即至無色界天形色都無亦得同彼天人壽命前明色界天中猶有輕塵為纍此明無色之界形相都無學者修至此天唯存心識以入氣觀皓庭霄度天帝慧覺昏東曰北第一屬阿答惒天帝位隂生之氣少微曰此天色碧氣係西南方梵氣在參井之間帝諱育主拔度學人天中人壽一百五十萬九千九百四十九萬四千四百萬歲色塵俱淨形相都如虛空也唯存心識以入氣觀氣觀道成即升入元洞天也淵通元洞天帝梵行觀生東曰北第二屬扇明民天帝位隂化之氣少微曰此天色紫氣係西方參宿帝諱上主度學仙之人天中人壽三百一萬九千八百九十八萬八千八百萬歲尚有心識勞動便作捨識意修得生妙成天也玄英曰又以心識為患若能捨除心識以至無為即得升入妙成天中也太文翰寵妙成天帝那育醜瑛東曰北第三屬梨那天帝位隂明之氣少微曰此天色白氣係西方觜宿帝諱陀主統理神王天中人壽六百三萬九千七百九十七萬七千六百萬歲前因都忘心識即居此天此天不使都忘故應用即有不為即無若有若無即升禁上天也玄英曰此天不使兼忘若令空有都無即失真中之應以其空中有真真中有應生成萬象皆出於空萬法在心亦無形相應用則有有即非無將令學者觀心若有若無即生禁上天也太素秀樂禁上天帝龍羅覺長東曰北第四屬明梵括大招天帝位隂洞之氣少微曰此天色黃氣係西方畢宿帝諱隗主領録魔王天中人壽一千二百七萬九千五百九十五萬五千二百萬歲氣觀轉妙結習都忘若洞入自然即升居種民天也以上四天謂之無色界太真科曰無色界中人身微妙無復形色或復形長數百丈而人不見唯真人能見之以其無形可見故云無色但三界之人生死之根未斷隂陽之氣猶存故有壽盡之數或升入上境或下生人中隨功厚薄輪轉無窮得道乃已也玄英曰此四天是無色界天修學之者若至此天更能進修即生四種民天也太虛無上常融天帝總監鬼神東曰北第五屬阿尼姤天帝位隂靈之氣少微曰此天色緑氣係西方昴宿帝諱極主校學者之功天中人壽二千四百一十五萬九千一百九十一萬四百萬歲初出三界清淨無染喜樂無為也太釋玉隆騰勝天帝眇眇行元東曰北第六屬須達天帝位隂魂之氣少微曰此天色青氣係西方胃宿帝諱浮黎主召集仙聖天中人壽四千八百三十一萬八千三百八十二萬八百萬歲龍變梵度天帝運上玄玄東曰北第七屬元梵須帶太昏天帝位隂結之氣少微曰此天色赤氣係西方婁宿帝諱惡奕主進仙成聖天中人壽九千六百六十三萬六千七百六十四萬一千六百萬歲隨氣升降無復結習太極平育賈奕天帝大擇法門東曰北第八屬釋繟自然天帝位隂極之氣少微曰此天色蒼氣係西方奎宿帝諱精上主度學者之身天中人壽一萬九千三百二十七萬三千五百二十八萬三千二百萬歲以上四天為四民天亦謂之種民天一云此四天人出二氣之外無年壽之限喜樂清淨也本際經云結習已盡超種民位謂煩惱為結學業為習太真科曰上升四天洞入道境隨氣升降災所不及以上三十二氣及係星宿帝諱主掌皆見洞神經人壽歲數根塵染淨見龍蹻經三十二天三十二帝東曰四八三十二天也內名隱諱皆多相類梵語難解别有訣解凡有三十二天各有一帝合為三十二帝諸天隱諱諸天隱名東曰經中所説並是諸天內名隱諱者也幽棲曰此四方之天即東方九氣青天南方三氣丹天西方七氣素天北方五氣玄天一方八天四八三十二天也在三景之上九宫之下四極之方與四維上下通為十方其天名帝號既稱隱諱隱名不可注釋少微曰隱諱帝諱隱名天名也天中空洞自然靈章東曰空玄也洞虛也靈章玉字也玄虛之中有自然玉字故云靈章也幽棲曰言此經是太極空洞之真詞虛無自然之靈奧者也少微曰空洞靈章即八會靈書自然玉字也本其所出皆結空洞之氣自然成章非世上言詞是諸天音韻也玄英曰空洞者謂諸天太空虛無之中也靈者即八會靈文自然玉字是也章者言詞合會蔭映成文謂之為章八會者八方之氣也自然者明此靈章之本迹皆結空洞之中八方真妙之氣靈風鼓奏自然成此言章非因造作而成故曰自然靈章也諸天隱韻天中之音東曰韻調也音章也諸天各有八字之章隱其調韻文旨玄奧難可尋詳故曰隱韻也幽棲曰亦是諸天隱微之韻十方幽祕之音也玄英曰音蔭也單出為聲五聲相蔭而成文謂之音禮記樂記曰聲成文謂之音天中之尊天中之神東曰天中亦有至尊又有大神也幽棲曰尊者即三十二天之帝尊神者即十方飛天之神王也天中大魔天中之靈東曰大魔者即三界魔王也靈即司命司録監度諸靈官也九和十合變化上清東曰和解也合會也天王昔在龍漢之中諸緣並盡而得過度三界之庭身入太虛之館受九仙鍊度而得進大聖之號赤明開運元始錫為梵度天王奕奕而升靈門上登玉清之宫也幽棲曰此明諸天神靈大魔皆是舉度之主録籍之司若九和十合共相保舉立能應時變化飛登上清也少微曰尊是上聖髙尊也神是飛天神王也大魔是三界魔王也靈是五帝靈章也玉字所出是尊神魔靈和九氣之精合十方之音變化上清之天流布三十二境玉訣云五帝靈章五帝真文五老同生統九天之氣也玄英曰此明真文玉字之緣起皆是諸天上聖之髙尊及飛天大神三界魔王五方大帝等和九氣之精合十方之音變化上清天中之妙流布三十二天成其靈章之文也九氣者九天之氣也無量之奧深不可詳東曰奧隱也詳審也無量之文其義隱奧難可詳審也幽棲曰此經既能變凡入聖鍊粗入妙乃出離五濁飛步三清則幽奧難詳忘言理絶敷落神真普度天人東曰敷布也落置也元始隨運度人布置神真以立三十二天安鎮五嶽普度天人也幽棲曰敷張也落廓也敷張開設之貌廓落廣大之旨言此經神真仙化敷張廓落人間天上普度無窮玄英曰言天尊布落玉䇿真文普度天人神鬼也今日欣慶受度歷關諸天東曰道君昔於始青天中寶珠之內受十部妙經元始爾時引十方大聖飛天神王無鞅之衆俱入寶珠之中説經都竟衆真監度以授道君當爾之時喜慶難言三十二天普遍關盟十方國土並皆受度惡對罪根一時開赦也幽棲曰既沐神真監舉則永賴升度之恩上關三十二天下告九幽之府此時欣慶何可勝言也請滅三惡斬絶地根東曰三惡三徒也第一色欲第二愛欲第三貪欲為三惡門也地根地獄也請滅三惡之道斬絶地獄之根也飛度五戶名列太玄東曰五戶五道門也前章已説今重再解一色纍苦心二愛纍苦神三貪纍苦形四華競苦精五身纍苦魂出門由戶故云戶耳太玄太玄都也人稟自然隂陽淳和無欲不履三惡五欲飛度五苦之門徑升玄都之宫也幽棲曰五戶者五道之門戶五道者以前三惡加以故氣人道共為五道既斬絶三惡之趨復超五道之門則酆都落鬼録之名太玄剋仙籍之簡太玄即玄中九宫上清之境魔王監舉無拘天門東曰拘礙也人得魔王保舉徑升三清得經天門無所拘礙逍遙上清也少微曰天尊賜升天之劵魔王保舉而奉之所到天門無敢拘礙執問也洞神經升天劵出人皇文中第六十八字以青素書帶身道士臨升天之日五嶽不得此劵則拘入魂魄不使同升江河淮海不得此劵則留人血液不使同升地官不得此劵則拘人之形不使升度天官不得此劵則拘閉天門不使升進天門吏士訶禁求劵得劵即前入太一紫府見大道君然後一切諸神不敢拘制也東斗主算西斗記名東曰東華天中有散華之臺四斗真人治在其中主録算生死功德有功者西斗記其名也幽棲曰東斗者即斗之第一星主增算壽西斗者即斗之第二星主記録其功名也北斗落死南斗上生東曰南北二斗主人生死有善功者三官列言南斗即度三界之難拔九幽之苦宣告魔王不使破敗人之行惡三官即列言北斗即告下魔王魔王即收人魂付九幽之役萬劫無期長淪惡緣當爾之時無善無應北斗除死籍南斗上生名幽棲曰北斗者即斗之第六星主落其死籍南斗者即斗之第五星主上其生録也中斗大魁總監衆靈東曰魁大也靈神也斗中有靈童字郁馥常運育輪於太無回十轉以召真總統十方天關十轉十方大聖上朝玉宫萬神髙真衆靈同到則郁馥唱焉幽棲曰魁首也中斗者斗之第七星為四斗之首總統一身衆靈此五方之斗是北斗五星以主五方既是斗星故言云東斗西斗非方方各有斗也少微曰此明五方斗宿各受元始職司東方七宿主人壽算西方七宿記人罪名北方七宿落人死籍南方七宿上人生契中方即今人所謂北斗也天官書曰斗為帝車運于中央臨制四鄉以察妖祥又張衡靈憲曰一居中央故知是斗斗中極也以神州之人居極之南自北而視故謂北斗北極也論之實同王命布於四方則天心於是乎見矣言中斗為氣之大帥總監一切神靈生死罪福也疏曰真一口訣云斗中自有五斗陽明為東斗隂精為西斗丹元為南斗北極為北斗天關一星為中斗恐非此也今解東斗即是東方七宿角亢等少陽之職主人生之算今人上功名也西斗即西方七宿奎婁等太隂之職主記人善名也北斗即北方七宿斗牛等太隂之職又主死故削落死名南斗即南方七宿井鬼等太陽之職又主生故上生録也中斗即魁𩲃等七宿所謂中斗而總監四斗一切衆靈生死罪福之事也青帝護魂白帝侍魄赤帝養氣黑帝通血東曰青帝君姓閻諱開明字靈威仰常主人魂白帝君姓上金諱昌開字耀魄寶常主人魄赤帝君姓洞浮諱極炎字赤熛怒主洞陽之氣在於心府黑帝君姓黑節諱靈會字隱侯局主於血氣統於腎上清真人云青帝君姓常諱精明白帝君姓混名蓐收赤帝君姓炎諱洞丹黑帝君姓玄諱明萌幽棲曰青帝位東主木管肝魂藏於肝故曰護魂白帝位西主金管肺魄藏於肺故曰侍魄赤帝位南主火管氣氣從火生故曰養氣黑帝位北主水管血血歸於水故云通血也黃帝中主萬神無越東曰黃帝君姓通班諱元成字含樞紐主土氣鎮於脾上清真人云姓麻諱忠愼幽棲曰黃笳天中金華之山山上有五帝之宫五帝神王治宫中常生五色之雲日月俠乎左右飛仙翼其軒五帝在天主領飛仙在地鎮於五嶽主領鬼神在人主五藏主領五神肝藏魂肺藏魄心藏氣腎藏血脾處中宫主於肌肉故人法地地法天天法道道法自然神有所歸故云無越錯三合以成其德也少微曰此明五老帝君各受赤書符命在天則主領五方神仙在地則主領五嶽神鬼在人則主領五藏精神各有所主故無錯越告命次第具在真文也青天魔王巴元醜伯東曰青天魔王姓斌諱齒成巴青天魔王與元始同生統御九天醜伯亦三界之魔王也主領三界之中學人識其音則享福不識其音則被殃若得魔王保舉者身入三清也幽棲曰事連青帝上四言位號中二言諱下二言字其餘並同此義也赤天魔王負天擔石東曰赤天魔王姓弗諱由肅勢能揭天力能傾山飛空三界中遏人功德制伏衆魔也幽棲曰事連赤帝白帝魔王反山六目東曰白天魔王姓赤諱張市一頭六目能破山反石總統六天鬼神斷人生生之路也幽棲曰事連白帝黑天魔王監醜朗馥東曰黑天魔王姓徐諱直事為性凶醜而好殺害也幽棲曰事連黑帝黃天魔王橫天擔力東曰黃天魔王姓天門諱波狂大魔王身衣玄文之衣頭戴橫天之冠腰佩龍頭之劒常乘羽輪之車飛行雲中常作謡歌有三千言亂敗後學太上故書其曲在消魔寶經也幽棲曰事連黃帝其位號名字並同青帝主保護學人驅除魔試者也少微曰次明魔鬼亂人受命誅戮宗君曰天魔身者皆是前生持戒布施勇猛精進不免嫉妬勝己故斯報也五帝大魔萬神之宗東曰青帝魔王姓迫落諱萬刑赤帝魔王姓赭諱上柏白帝魔王姓鄧諱吁兒黑帝魔王姓梟諱公孫黃帝魔王姓宛躬諱産生各領官屬三萬八千人與六天同生也主領三界功等諸天為鬼神之宗也幽棲曰此五方天帝五天大魔並統領五天五方一切神祇故云宗也飛行鼓從總領鬼兵玄英曰此明五帝大魔常部領鬼兵飛行大虛之中以音聲鼓吹之從故云飛行鼓從也麾幢鼓節遊觀太空東曰導從鬼神麾幢曲蓋五色玄黃飛行雲中遊看十方周遊太空也幽棲曰飛天靈魔乘虛駕浮前導後從統押鬼兵持幢執節鳴鼓把麾出入真境遊歷太空少微曰玉清隱書云五帝魔王各帶虎頭鞶囊領官屬三萬八千人與天同生常惱亂學人不欲成道又自矜與諸天上帝齊其聖功後因龍漢開圖乃服於元始之化故步虛頌云魔王敬受事故能朝諸天也玄英曰夫大聖遊行皆列威儀服飾麾者以指撝為義注羽毛於竿首狀似旌旗之類也王者執之以誓衆誓者宣勑約之詞如今之人君處分事是也幢者旗韣之類也鼓節者擊鼓流吹以為音樂節奏也此明五天魔王各自部領萬衆建立麾幢鼓節遊觀太虛之中騎從駢闐恣意所欲自號赫奕諸天齊功東曰導從赫奕威儀具足諸天敵勢故曰齊功玄英曰既能備此威儀又自稱為赫奕侍以尊貴上天度人嚴攝北酆東曰魔王在三界統乘玄都常檢校北酆鬼府宿對死魂以上言玄都保應得度者幽棲曰既前導後從即麾幢鼓節故自號赫奕也復舉學度者以制攝精魔故與諸天齊功也赫奕者貴盛貌也少微曰天尊在始青天度人時乃攝召北帝使宣告魔王斬馘鬼神勿行災害每劫度人法令如此神公受命普掃不祥東曰神公者大羅天丞相也字廓奕在始陽之臺主品人神得度大千世界升無量之堂不祥不善也爾時受天尊符命掃蕩萬魔之精不善之鬼拔三官之府度更生之賔定命籍於朱宫削死根於九祖受景福於真人披幽夜於萬劫受更生於神公也幽棲曰神公即大羅之神公也受命即降五帝大魔之命也使防衛學者掃除不祥也八威吐毐猛馬四張東曰八威者龍麟虎豹師子丹蛇天馬猛獸吐毐四張也幽棲曰八威者八威之神龍也猛馬者即天靈之陸馬也神龍吐毐以攝祅氛陸馬奔張以逐邪魅也天丁前驅大帥仗幡東曰天丁五丁力士也大帥都督殺伐將軍也導從天兵節蓋仗幡威儀侍從左右前後誅除不祥翦滅鬼祅也幽棲曰天丁即天鄒甲卒也故導前以驅除大帥即大魔鬼帥故仗幡以辟斥也擲火萬里流鈴八衝東曰左右流金火鈴一擲萬里流光煥爛交錯八衝充滿空虛之中消魔滅鬼也幽棲曰擲火流鈴者流金火鈴也擲之有聲聞乎太極光振千里故徹萬里以交煥達八方以衝擊則真人常持之以制御魔精少微曰洞真經曰火鈴有光而無質一擲萬里也敢有干試巨遏上真東曰萬魔藏形百鬼豈敢當拒巨者拒也幽棲曰謂不遏上真也持此經者則為上真也金鉞前戮巨天後刑東曰鉞者似斧也巨天者力士也則金鉞於前而斧戮巨天於後以刀刑金者亦鐵之總名或云以金飾鉞故云金鉞也又云天丁力士前誅後斬除滅鬼精者也少微曰若有鬼神敢行干觸自縱凶害塞我上真則使彼天丁前誅後斬也屠割鬼爽風火無停東曰屠割破裂也爽魂也風火者風刀火山也破裂鬼魂於風刀火山也幽棲曰屠鬼之爽割魔之精其急如風其速如火故云風火無停千千截首萬萬翦形東曰首頭也形身也言其有罪鬼魂千千萬萬斬其頭首解剔身形也幽棲曰千千萬萬言其多也非即定數或斬其首或解其形以爾者夫有真則有邪有善即有惡故邪能遏真惡能喪善也魔無干犯鬼無妖精東曰百魔伏形萬妖喪精既屠精割爽復截首翦形則何有能干豈敢更犯也幽棲曰用此威刑翦除鬼賊所以百魔伏匿羣妖喪精也二官北酆明檢鬼營東曰三官天地水三官也北酆北部剌姦也酆都九府之中有九部剌姦也又有九都使者本是龍漢後一劫九氣各生一獸以害惡民其劫既開九獸改號為九醜之鬼北帝上真在酆都之上立九醜以輔三官數極九九八十一萬度天氣交九醜轉號為九都使者常檢校三官九府之中善惡之魂不得隱匿也幽棲曰三官即六宫之三官也六宫在北酆之上三官統萬鬼羣故令檢守營域不得干犯學仙者也不得容隱金馬驛呈東曰金馬金龍也檢校善惡驛馬飛馳以呈其事也幽棲曰有所容其隱匿即金馬驛來呈奏金馬者言堅徑如金剛之馬也故言金馬驛呈少微曰懼其威武明檢鬼營若有逃藏不敢容隱每驛龍關奏急赴前呈者如世間驛馬有呈限也普告無窮萬神咸聽東曰普告天上地下一切神靈咸使聽伏幽棲曰天上天下無幽無冥有告遐邇莫不咸聽也三界五帝列言上清東曰神公受命之時普告三界五帝神王一切神靈解遣地獄之中惡對死魂並列言上清也幽棲曰三界即三界之魔王五帝即五帝與大魔並列言舉功保度學者上登上清之闕朝奏太上之前也少微曰神公耿介普告無窮五帝萬神咸來聽命魔軍已喪列奏上清玄英曰三界者此前色欲等天之界也元始無量度人上品妙經四注卷之二
